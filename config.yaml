# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE — Central Configuration
#  v12.15.1
#  Change strategy/risk/thresholds here. No code changes needed.
# ═══════════════════════════════════════════════════════════════

mode: paper          # paper | live — auto-switches trade module

instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

strategy:
  timeframes: [1, 3, 5, 15]
  primary_signal: 1
  confirmation: 3
  trend: [5, 15]

  lookback:
    1m: 50
    3m: 60
    5m: 10

  rsi:
    1m_low: 30
    1m_high_normal: 50
    1m_high_strong: 65
    1m_high_dte0: 70
    3m_low: 42
    3m_high: 72

  adx:
    min_trend: 20
    choppy_bypass: 15
    multi_tf_bonus: 25

  spread:
    ce_min: 1
    pe_min: 1
    ce_min_dte0: 1
    pe_min_dte0: 1

  strike:
    step: 100
    step_expiry: 50
    premium_min: 100
    premium_min_dte0: 50
    premium_max: 400

  scoring:
    session_min:
      OPEN: 5
      MORNING: 5
      AFTERNOON: 5
      LATE: 6
    excellence_bypass: 6
    loss_streak_gate: 5

  3min_gate:
    min_conditions: 2
    body_pct_min: 40

risk:
  sl_multiplier: 2.0
  sl_max: 25
  sl_dte0: 15
  sl_candles: 5
  max_hold_dte0: 5
  stale_entry_candles: 3
  stale_entry_peak: 5.0
  max_daily_trades: 999
  max_daily_losses: 999
  profit_lock_pts: 150
  reentry_cooldown_min: 5
  risk_free_rate: 0.065
  max_positions: 1

trail:
  drawdown_pct: 25
  drawdown_pct_expiry: 20
  ema_candles_fail: 2
  profit_floors:
    10: 5
    20: 12
    30: 20
    50: 60          # percentage — peak 50 → floor at 60% of peak
  adaptive_ema:
    low:            # running < 15
      timeframe: 5minute
      candles: 2
    mid:            # running 15-25
      timeframe: 3minute
      candles: 2
    high:           # running > 25
      timeframe: minute
      candles: 1

dte0:
  enabled: true
  skip_3min_gate: true
  spike_mode: true
  spike_pct: 10
  spike_candles: 2

zones:
  file: ~/state/vrl_zones.json
  enabled: true

ml:
  enabled: false
  model_path: ~/state/ml_model.pkl
  score_weight: 0.5

market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

expiry:
  consol_candles: 5
  consol_range: 15
  breakout_min: 10
  trail_pct: 20
  start_hour: 9
  start_min: 45
  cutoff_hour: 15
  cutoff_min: 0
  fib_proximity: 20

lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

web:
  port: 8080
  auth: false

