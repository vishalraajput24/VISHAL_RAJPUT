# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE v13.0 — Central Configuration
#  Minimal strategy: EMA gap + RSI entry, 2-lot execution
# ═══════════════════════════════════════════════════════════════

version: "v13.2"
bot_name: "VISHAL RAJPUT TRADE"
mode: paper

instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

lots:
  count: 2
  size: 65

cooldown:
  after_win: 10          # minutes: same-dir cooldown after peak >= 10pts
  after_loss: 6          # minutes: same-dir cooldown after peak < 10pts

entry:
  ema_gap_min: 3        # EMA9 - EMA21 minimum pts
  rsi_min: 50           # RSI floor
  rsi_max: 72           # RSI hard cap — blowoff territory, never enter
  rsi_must_rise: true   # RSI > previous candle
  momentum_pts: 15      # price must rise 15pts in N candles (Path B)
  momentum_candles: 3   # lookback period for momentum
  momentum_rsi_min: 45  # RSI floor for momentum entry

exit:
  hard_sl: 12           # initial SL points
  stale_candles: 5      # was 3, gives trade 2 more minutes to develop
  stale_peak_min: 3     # minimum peak to not be stale

profit_floors:
  - peak: 10
    lock: 2
  - peak: 20
    lock: 12
  - peak: 30
    lock: 22
  - peak: 40
    lock: 32

rsi_exit:
  split_at: 70          # split lots at RSI 70
  sell_spike: 75        # sell lot 1 at RSI 75-80
  blowoff: 80           # sell everything above 80

trail:
  method: atr
  atr_multiplier: 1.5
  adaptive_ema:
    low:
      timeframe: 5minute
      candles_below: 2
    mid:
      timeframe: 3minute
      candles_below: 2
    high:
      timeframe: minute
      candles_below: 1

strategy:
  lookback:
    1m: 50
    3m: 60
    5m: 10
  rsi:
    1m_low: 30
    1m_high_normal: 60
    1m_high_strong: 70
    1m_high_dte0: 70
    3m_low: 42
    3m_high: 72
  adx:
    choppy_bypass: 15
    multi_tf_bonus: 25
  spread:
    ce_min: 0
    pe_min: 0
    ce_min_dte0: 0
    pe_min_dte0: 0
  strike:
    step: 100
    step_expiry: 50
    premium_min: 100
    premium_min_dte0: 50
    premium_max: 400
  scoring:
    session_min:
      OPEN: 4
      MORNING: 4
      AFTERNOON: 4
      LATE: 5
    excellence_bypass: 5
    loss_streak_gate: 4
  3min_gate:
    min_conditions: 2
    body_pct_min: 30

strike:
  step_normal: 100
  step_dte0: 50
  tolerance_normal: 40
  tolerance_dte0: 20
  lock_shift: 150
  gap_relock_threshold: 200

risk:
  sl_multiplier: 2.0
  sl_max: 25
  sl_dte0: 15
  sl_candles: 5
  max_hold_dte0: 5
  stale_entry_candles: 3
  stale_entry_peak: 3.0
  max_daily_trades: 999
  max_daily_losses: 999
  profit_lock_pts: 150
  reentry_cooldown_min: 5
  risk_free_rate: 0.065
  max_positions: 1

market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

expiry:
  consol_candles: 5
  consol_range: 15
  breakout_min: 10
  trail_pct: 20
  start_hour: 9
  start_min: 45
  cutoff_hour: 15
  cutoff_min: 0
  fib_proximity: 20

dte0:
  enabled: true
  skip_3min_gate: true
  spike_mode: true
  spike_pct: 10
  spike_candles: 2

zones:
  file: ~/state/vrl_zones.json
  enabled: true

ml:
  enabled: false
  model_path: ~/state/ml_model.pkl
  score_weight: 0.5

lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

web:
