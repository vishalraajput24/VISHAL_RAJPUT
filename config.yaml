# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE v16.7 (Vishal Clean) — Central Configuration
#  3-gate entry  +  4-rule exit chain  +  peak-driven SL ladder
# ═══════════════════════════════════════════════════════════════

version: "v16.7"
bot_name: "VISHAL RAJPUT TRADE"
mode: paper
lots_fixed: 2

# ── v15.2.5 BUG-Q: verify_order_fill timeouts (seconds) ─────────
# Previously hardcoded in VRL_TRADE.place_entry / place_exit.
# Tune these without a code edit if Kite latency changes.
trade:
  verify_timeout_entry: 8    # LIMIT entry fill wait
  verify_timeout_exit:  5    # LIMIT exit fill wait before MARKET fallback

# ── Instrument ─────────────────────────────────────────────────
instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

# Legacy compat for existing accessors (lots.count / lots.size)
lots:
  count: 2
  size: 65

# ── v16.7 Entry configuration (Vishal Clean — 3 gates) ─────────
# 3 hard gates: GREEN candle, close > EMA9_low, body >= body_pct_min.
# Time window (warmup/cutoff) is an operational rail, not a strategy
# gate. Slope and band width are display-only — they DO NOT block
# entry, but EMA9_low slope drives the in-trade FLAT_2X exit.
entry:
  ema9_band:
    body_pct_min: 40
    warmup_until: "09:35"
    cutoff_after: "15:10"
    cooldown_minutes: 5
    # Display-only — kept so dashboard / pulse can show band info.
    band_width_min: 7
    # Per-candle slope lookback (1 bar) — used by FLAT_2X exit.
    ema9_slope_lookback: 1
    # ── v16.7 Anti-spike limit-pullback entry ──
    # After 3-gate signal fires at candle close, target entry is set to
    # close - spike_buffer_pts. Bot polls LTP for spike_wait_secs;
    # fills at current LTP if it touches target (better entry, avoids
    # buying the top of a spike). If timeout, skip — wait for fresh setup.
    # Set buffer or wait to 0 to disable.
    spike_buffer_pts: 2
    spike_wait_secs: 60
    # ── v16.7+ Cross-leg divergence GATE ──
    # Backtest (5 days, 72-78 trades): with anti-spike on, V3 (both
    # filters) +570 pts vs V1 (anti-spike only) +514 pts — net +56 pts
    # gain from also blocking FAIL signals. Promoted to hard gate.
    # Set false to revert to display-only mode.
    xleg_gate_enabled: true
    # Multi-candidate strike scanning (ATM-50/ATM/ATM+50). When enabled,
    # evaluates all 6 CE/PE candidates per scan and picks the best by
    # (body × gap). Disabled by default to keep WS token count low.
    multi_candidate_enabled: false
    multi_candidate_strike_range: 50

# ── v16.7 Exit configuration ──────────────────────────────────
# 4 rules: EMERGENCY_SL, FLAT_2X, EOD_EXIT, VISHAL_TRAIL.
# Trail logic in VRL_ENGINE.compute_trail_sl
# (INITIAL / LOCK_3 / LOCK_5 / LOCK_8 / LOCK_15 / LOCK_DYN).
exit:
  ema9_band:
    emergency_sl_pts: -10
    eod_exit_time: "15:20"
    # FLAT_2X: 2 consecutive candles with EMA9_low slope <= flat_slope_max
    # exit the trade. Default 3 pts — slope between (-inf, +3] is "not
    # rising strongly enough". Set higher to be more lenient (rare exits)
    # or lower to be tighter (more frequent exits).
    flat_slope_max: 3

# ── Strike selection ───────────────────────────────────────────
strike:
  step_normal: 50
  step_dte0: 50
  tolerance_normal: 20
  tolerance_dte0: 20
  lock_shift: 150
  gap_relock_threshold: 200

# ── Risk ───────────────────────────────────────────────────────
risk:
  reentry_cooldown_min: 5
  max_positions: 1

# ── Market hours (IST) ─────────────────────────────────────────
market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

# ── Data collection (untouched per refactor scope) ────────────
lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

# ── Telegram + Web ─────────────────────────────────────────────
notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

web:
  port: 8080
  auth: false

websocket:
  reconnect_delay: 5
  tick_stale_secs: 8
  # Cap on the exponential-backoff reconnect delay (seconds). During a
  # prolonged Kite outage, reconnect attempts stop doubling past this.
  max_reconnect_delay: 300
