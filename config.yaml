# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE v15.2 — Central Configuration
#  EMA9 Band Breakout + Tiered Straddle Filter + VWAP Display + BE+2 (peak≥10)
# ═══════════════════════════════════════════════════════════════

version: "v15.2"
bot_name: "VISHAL RAJPUT TRADE"
mode: paper
lots_fixed: 2

# ── Instrument ─────────────────────────────────────────────────
instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

# Legacy compat for existing accessors (lots.count / lots.size)
lots:
  count: 2
  size: 65

# ── v15.2 Entry configuration (nested structure) ──────────────
entry:
  ema9_band:
    body_pct_min: 30
    cooldown_minutes_same_dir: 5
    warmup_until: "09:45"
    cutoff_after: "15:10"
    min_band_width_pts: 8
    # v15.2.4: fresh-breakout lookback window (3-min candles).
    # Fires entry if ANY of the last N bars had close <= its ema9_high
    # AND the current bar's close > its ema9_high. N=3 recovers from
    # a restart that lands mid-move; N=1 is the strict immediate cross.
    fresh_breakout_lookback: 3
  filters:
    # Tiered straddle expansion filter (Gate 7). Hard gate.
    straddle_expansion:
      enabled: true
      lookback_minutes: 15
      thresholds:
        opening: {start: "09:45", end: "10:30", min_delta: 1}
        midday:  {start: "10:30", end: "14:00", min_delta: 5}
        closing: {start: "14:00", end: "15:10", min_delta: 3}
    # VWAP confluence — display only, never blocks
    vwap_bonus:
      enabled: true
      mode: display_only

# ── v15.2 Exit configuration (nested structure) ──────────────
exit:
  ema9_band:
    emergency_sl_pts: -20
    stale_candles: 5
    stale_peak_max: 3
    eod_exit_time: "15:30"
    breakeven_lock_peak_threshold: 10
    breakeven_lock_offset: 2

# ── Strike selection ───────────────────────────────────────────
strike:
  step_normal: 50
  step_dte0: 50
  tolerance_normal: 20
  tolerance_dte0: 20
  lock_shift: 150
  gap_relock_threshold: 200

# ── Risk ───────────────────────────────────────────────────────
risk:
  max_daily_trades: 999
  max_daily_losses: 999
  profit_lock_pts: 150
  reentry_cooldown_min: 5
  max_positions: 1

# ── Market hours (IST) ─────────────────────────────────────────
market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

# ── Data collection (untouched per refactor scope) ────────────
lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

# ── Telegram + Web ─────────────────────────────────────────────
notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

web:
  port: 8080
  auth: false

websocket:
  reconnect_delay: 5
  tick_stale_secs: 8
