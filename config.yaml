# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE v16.7 (Vishal Clean) — Central Configuration
#  4-gate entry (V5)  +  3-rule exit chain  +  peak-driven SL ladder
# ═══════════════════════════════════════════════════════════════

version: "v16.7"
bot_name: "VISHAL RAJPUT TRADE"
mode: paper
lots_fixed: 2

# ── v15.2.5 BUG-Q: verify_order_fill timeouts (seconds) ─────────
# Previously hardcoded in VRL_TRADE.place_entry / place_exit.
# Tune these without a code edit if Kite latency changes.
trade:
  verify_timeout_entry: 8    # LIMIT entry fill wait
  verify_timeout_exit:  5    # LIMIT exit fill wait before MARKET fallback

# ── Instrument ─────────────────────────────────────────────────
instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

# Legacy compat for existing accessors (lots.count / lots.size)
lots:
  count: 2
  size: 65

# ── v16.7 Entry configuration (Vishal Clean V5 — 4 gates) ────────
# 4 hard gates: GREEN candle, close > EMA9_low, body >= body_pct_min,
# open > EMA9_low (entire body above band).
# Time window (warmup/cutoff) is an operational rail, not a strategy
# gate. Slope and band-width are tracked for dashboard display only —
# they never gate entry or trigger exits in v16.7 final.
entry:
  ema9_band:
    body_pct_min: 40
    warmup_until: "09:35"
    cutoff_after: "15:10"
    cooldown_minutes: 5
    # Display-only — kept so dashboard / pulse can show band info.
    band_width_min: 7
    # Per-candle slope lookback (1 bar) — display-only.
    ema9_slope_lookback: 1
    # ── v16.7-final Candle/2 limit-pullback entry ──
    # After 3-gate signal fires at candle close, target entry is set to
    # the MIDPOINT of the signal candle's range — (high + low) / 2.
    # This adapts the buffer to candle volatility: wide spike candle =
    # bigger required pullback, narrow consolidation candle = smaller
    # buffer. Bot polls LTP for spike_wait_secs; fills at min(target,
    # ltp) if reached. If timeout → skip, wait for fresh setup.
    # Replaces previous fixed-2pt anti-spike logic.
    # spike_buffer_pts retained (legacy back-compat) but not used.
    spike_buffer_pts: 2
    spike_wait_secs: 60
    # ── v16.7+ Cross-leg divergence GATE ──
    # Backtest history is SPLIT on x-leg's value:
    #   Apr 20-24 sweep: x-leg ADDED +56 pts (V3 vs V1)
    #   Apr 21-27 sweep: x-leg HURT  -69 pts (Vrx vs Vfull)
    # Within sample noise. Live data on Apr 27-28 also showed x-leg
    # blocking entries that would have won. Disabling for now to
    # collect more honest data — signal still computed + logged so
    # /xleg accuracy report keeps building, just doesn't block trades.
    # Set true to re-enable hard gating.
    xleg_gate_enabled: false
    # ── v16.7+ Early loss-cap tier (LOCK_M5) ──
    # When peak >= 5, move SL from entry-10 up to entry-5. Caps the
    # max loss at -5 once the trade has shown any meaningful traction.
    # Backtest sweep (5d, 12 variants): buf=2 + early-5 = +575.6 pts
    # vs +570.2 baseline (+5.4 improvement, INIT trades 18→8).
    # Set false to revert to plain INITIAL → LOCK_3 ladder.
    early_lock_5_enabled: true
    # ── v16.7-final ATM lock hysteresis + neighbor pre-warm ──
    # Hysteresis buffer (pts) — only relock to a new ATM strike when
    # spot has crossed the strike midpoint by at least this many pts.
    # Default 10: spot must be 25+10 = 35 pts from current locked
    # center before relock fires. Slow drift stays on the same strike
    # (indicators stay warm). Set higher for stickier, lower for jitterier.
    lock_shift_pts: 10
    # Multi-candidate strike scanning (ATM-50/ATM/ATM+50). When enabled,
    # evaluates all 6 CE/PE candidates per scan and picks the best by
    # (body × gap). Disabled by default to keep WS token count low.
    multi_candidate_enabled: false
    multi_candidate_strike_range: 50

# ── v16.7 Exit configuration ──────────────────────────────────
# 3 rules: EMERGENCY_SL, EOD_EXIT, VISHAL_TRAIL.
# Trail logic in VRL_ENGINE.compute_trail_sl
# (INITIAL / LOCK_M5 / LOCK_3 / LOCK_5 / LOCK_8 / LOCK_15 / LOCK_DYN).
exit:
  ema9_band:
    # ── v16.7+ Loosened from -10 → -18 (slmax backtest, 5d Apr22-28) ──
    # 5d sweep showed -10 was kicking out trades that dipped intra-candle
    # then recovered. Plateau at -18 (trades that survive past -18 never
    # come back in this dataset, so deeper floors add no benefit). Result:
    #   -10 (old): +521.8 pts, 87.1% WR, avgL -7.9
    #   -18 (new): +569.6 pts, 88.7% WR, avgL -4.7  (+47.8 pts/5d)
    # The 3-min close-based trail (-10) still catches genuinely dying
    # trades — emergency -18 is now a true catastrophic backstop.
    # Max single-trade loss: 18 × 2 × 65 = ₹2,340 (was ₹1,300).
    emergency_sl_pts: -18
    eod_exit_time: "15:20"

# ── Strike selection ───────────────────────────────────────────
strike:
  step_normal: 50
  step_dte0: 50
  tolerance_normal: 20
  tolerance_dte0: 20
  lock_shift: 150
  gap_relock_threshold: 200

# ── Risk ───────────────────────────────────────────────────────
risk:
  reentry_cooldown_min: 5
  max_positions: 1

# ── Market hours (IST) ─────────────────────────────────────────
market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

# ── Data collection (untouched per refactor scope) ────────────
lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

# ── Telegram + Web ─────────────────────────────────────────────
notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

web:
  port: 8080
  auth: false

websocket:
  reconnect_delay: 5
  tick_stale_secs: 8
  # Cap on the exponential-backoff reconnect delay (seconds). During a
  # prolonged Kite outage, reconnect attempts stop doubling past this.
  max_reconnect_delay: 300
