# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE v15.1 — Central Configuration
#  Dual EMA9 Band Breakout + BE+2 lock after peak ≥ 10
#  Entry: option 3m close > EMA9-of-highs (fresh) + green + body ≥ 30%
#  Exit:  BREAKEVEN_LOCK (peak≥10) | EMA9-of-lows close break
# ═══════════════════════════════════════════════════════════════

version: "v15.1"
bot_name: "VISHAL RAJPUT TRADE"
mode: paper

# ── Instrument ─────────────────────────────────────────────────
instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

lots:
  count: 2
  size: 65

# ── v15.0 Entry: Dual EMA9 Band Breakout ──────────────────────
entry_ema9_band:
  body_pct_min: 30
  cooldown_minutes: 5
  warmup_until: "09:45"
  cutoff_after: "15:10"

# ── v15.1 Exit: dynamic system + breakeven lock ─────────────
exit_ema9_band:
  emergency_sl_pts: -20
  stale_candles: 5
  stale_peak_max: 3
  eod_exit_time: "15:30"
  breakeven_lock_peak_threshold: 10   # v15.1: lock activates when peak >= 10 pts
  breakeven_lock_offset: 2            # v15.1: SL locks at entry + 2

cooldown:
  same_direction: 5            # legacy compat (also read from entry_ema9_band)

# ── Strike selection ───────────────────────────────────────────
strike:
  step_normal: 50
  step_dte0: 50
  tolerance_normal: 20
  tolerance_dte0: 20
  lock_shift: 150
  gap_relock_threshold: 200

# ── Risk ───────────────────────────────────────────────────────
risk:
  max_daily_trades: 999
  max_daily_losses: 999
  profit_lock_pts: 150
  reentry_cooldown_min: 5
  max_positions: 1

# ── Market hours (IST) ─────────────────────────────────────────
market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

# ── Data collection (untouched per refactor scope) ────────────
lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

# ── Telegram + Web ─────────────────────────────────────────────
notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

web:
  port: 8080
  auth: false

websocket:
  reconnect_delay: 5
  tick_stale_secs: 8
