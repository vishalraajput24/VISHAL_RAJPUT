# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE v14.0 — Central Configuration
#  3-min RSI 40-55 + ADX≥15 + body≥20% + TRENDING regime
# ═══════════════════════════════════════════════════════════════

version: "v14.0"
bot_name: "VISHAL RAJPUT TRADE"
mode: paper

# ── Instrument ─────────────────────────────────────────────────
instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

lots:
  count: 2
  size: 65

# ── Strategy ───────────────────────────────────────────────────
entry_3min:
  rsi_min: 40
  rsi_max: 55
  adx_min: 15
  body_pct_min: 20
  allowed_regimes: ["TRENDING", "TRENDING_STRONG"]

cooldown:
  same_direction: 5            # minutes — opposite always immediate

exit:
  candle_close_sl: 12          # close-based SL (CANDLE_SL)
  max_sl: 20                   # absolute emergency (EMERGENCY_SL)
  spike_recovery: 8            # SPIKE_ABSORBED tolerance
  stale_candles: 5
  stale_peak_min: 3

profit_floors:
  - { peak: 5,  lock: -6 }     # damage control
  - { peak: 10, lock: 2 }      # breakeven+
  - { peak: 20, lock: 12 }
  - { peak: 30, lock: 22 }
  - { peak: 40, lock: 32 }
  - { peak: 50, lock: 42 }

profit_trail:
  activate_at: 15
  keep_normal: 0.75
  keep_warning: 0.85
  min_lock: 2

rsi_exit:
  blowoff: 80

# ── Strike selection ───────────────────────────────────────────
strike:
  step_normal: 50
  step_dte0: 50
  tolerance_normal: 20
  tolerance_dte0: 20
  lock_shift: 150
  gap_relock_threshold: 200

# ── Risk ───────────────────────────────────────────────────────
risk:
  max_daily_trades: 999
  max_daily_losses: 999
  profit_lock_pts: 150
  reentry_cooldown_min: 5
  max_positions: 1

# ── Market hours (IST) ─────────────────────────────────────────
market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

# ── Data collection (untouched per refactor scope) ────────────
lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

# ── Telegram + Web ─────────────────────────────────────────────
notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

web:
  port: 8080
  auth: false

websocket:
  reconnect_delay: 5
  tick_stale_secs: 8
