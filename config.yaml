# ═══════════════════════════════════════════════════════════════
#  VISHAL RAJPUT TRADE v16.6 — Central Configuration
#  EMA9 Band Breakout (7 gates) + strict 3-rule exit chain
# ═══════════════════════════════════════════════════════════════

version: "v16.6"
bot_name: "VISHAL RAJPUT TRADE"
mode: paper
lots_fixed: 2

# ── v15.2.5 BUG-Q: verify_order_fill timeouts (seconds) ─────────
# Previously hardcoded in VRL_TRADE.place_entry / place_exit.
# Tune these without a code edit if Kite latency changes.
trade:
  verify_timeout_entry: 8    # LIMIT entry fill wait
  verify_timeout_exit:  5    # LIMIT exit fill wait before MARKET fallback

# ── Instrument ─────────────────────────────────────────────────
instrument:
  name: NIFTY
  exchange_nfo: NFO
  exchange_nse: NSE
  lot_size: 65
  spot_token: 256265
  vix_token: 264969

# Legacy compat for existing accessors (lots.count / lots.size)
lots:
  count: 2
  size: 65

# ── v16.6 Entry configuration ──────────────────────────────────
# 7 hard gates: time window, close>ema9_low, gap>=3, green, body>=40%,
# floor test (low within 3pts of ema9_low), fresh breakout.
entry:
  ema9_band:
    body_pct_min: 40
    warmup_until: "09:30"
    cutoff_after: "15:10"
    cooldown_minutes: 5
    # Fresh-breakout lookback window (3-min candles). Fires entry if ANY
    # of the last N bars had close <= its ema9_low. N=3 recovers from
    # a restart that lands mid-move; N=1 is the strict immediate cross.
    fresh_breakout_lookback: 3
    # v15.2.5: multi-candidate strike scanning (ATM-50/ATM/ATM+50).
    # When enabled, every scan cycle evaluates all 6 CE/PE candidates
    # and picks the best fired one by (straddle_delta, body_pct, -|Δstrike|).
    # Disabled by default — enable after confirming the 6-token subscription
    # load is acceptable on the production Kite quota.
    multi_candidate_enabled: false
    multi_candidate_strike_range: 50
  filters:
    # v15.2.5 Fix 5: straddle is DISPLAY ONLY — same policy as VWAP below.
    # Never rejects entry. Engine classifies delta into STRONG/NEUTRAL/WEAK/NA
    # and annotates the result dict + logs + trades table for analysis.
    straddle_display:
      enabled: true
      mode: display_only
      lookback_minutes: 15
    # VWAP confluence — display only, never blocks
    vwap_bonus:
      enabled: true
      mode: display_only

# ── v16.6 Exit configuration ──────────────────────────────────
# 3 rules: EMERGENCY_SL, EOD, VISHAL_TRAIL. Trail logic is in
# VRL_ENGINE.compute_trail_sl (patient: INITIAL/TRAIL_70/VISHAL_MAX/TRAIL_90).
exit:
  ema9_band:
    emergency_sl_pts: -10
    eod_exit_time: "15:20"

# ── Strike selection ───────────────────────────────────────────
strike:
  step_normal: 50
  step_dte0: 50
  tolerance_normal: 20
  tolerance_dte0: 20
  lock_shift: 150
  gap_relock_threshold: 200

# ── Risk ───────────────────────────────────────────────────────
risk:
  reentry_cooldown_min: 5
  max_positions: 1

# ── Market hours (IST) ─────────────────────────────────────────
market_hours:
  open_hour: 9
  open_min: 15
  close_hour: 15
  close_min: 30
  trade_start_hour: 9
  trade_start_min: 15
  entry_cutoff_hour: 15
  entry_cutoff_min: 10

# ── Data collection (untouched per refactor scope) ────────────
lab:
  collection_hours: [10, 11, 12, 13, 14]
  collection_window_start: 40
  collection_window_end: 55
  forward_fill: [3, 5, 10]
  retention_days: 30

logs:
  retention_days: 30
  error_retention_days: 90
  backup_count: 30

# ── Telegram + Web ─────────────────────────────────────────────
notifications:
  telegram: true
  trade_alerts: true
  error_alerts: true
  daily_summary: true

# ── v15.2.5 Pre-entry awareness alerts (learning mode) ───────
# Educational Telegram alerts when setups form. Never trigger trades.
# Runtime toggle via /alerts_on and /alerts_off (persists in state).
alerts:
  pre_entry:
    enabled: true
    rate_limit_per_key_minutes: 15   # max 1 alert per (strike, side, type) per N min
    global_hourly_cap: 10            # absolute cap across all keys per hour
    approaching_breakout_gap_pts: 3  # B: close must be within this many pts of ema9_high
    signal_types:
      reversal_building: true        # A 🔔
      approaching_breakout: true     # B ⏰
      ready_to_fire: true            # C ⚡
      blocked_setup: true            # D ⚠️

web:
  port: 8080
  auth: false

websocket:
  reconnect_delay: 5
  tick_stale_secs: 8
  # Cap on the exponential-backoff reconnect delay (seconds). During a
  # prolonged Kite outage, reconnect attempts stop doubling past this.
  max_reconnect_delay: 300
