<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>VISHAL RAJPUT TRADE v16.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0f;--card:rgba(255,255,255,0.96);--card-glass:rgba(255,255,255,0.10);
--gn:#10b981;--gn2:#34d399;--gn-bg:rgba(16,185,129,0.14);--gn-bd:rgba(16,185,129,0.42);
--rd:#ef4444;--rd2:#f87171;--rd-bg:rgba(239,68,68,0.14);--rd-bd:rgba(239,68,68,0.42);
--or:#f97316;--or2:#fb923c;--or-bg:rgba(249,115,22,0.14);--or-bd:rgba(249,115,22,0.42);
--bl:#60a5fa;--bl2:#3b82f6;--bl-bg:rgba(96,165,250,0.14);--bl-bd:rgba(96,165,250,0.42);
--pu:#a78bfa;--pu-bg:rgba(167,139,250,0.14);
--yl:#fbbf24;--yl2:#d97706;--yl-bg:rgba(251,191,36,0.14);
--tx:#f8fafc;--tx2:#cbd5e1;--tx3:#94a3b8;--tx4:#64748b;
--ctx:#0f172a;--ctx2:#334155;--ctx3:#64748b;--ctx4:#94a3b8;
--bd:rgba(255,255,255,0.12);--bd2:rgba(255,255,255,0.20);
--cbd:rgba(0,0,0,0.06);--cbd2:rgba(0,0,0,0.10);
--sh:0 4px 16px rgba(0,0,0,0.30);--sh-lg:0 8px 32px rgba(0,0,0,0.40);
--sh-gn:0 6px 24px rgba(16,185,129,0.30);--sh-rd:0 6px 24px rgba(239,68,68,0.28);
--sh-or:0 6px 24px rgba(249,115,22,0.30);
--or-grad:linear-gradient(135deg,#f97316,#fb923c);
--gn-grad:linear-gradient(135deg,#10b981,#34d399);
--bl-grad:linear-gradient(135deg,#3b82f6,#60a5fa);
}
html{background:var(--bg);color:var(--tx);font-family:'Outfit',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  min-height:100vh;position:relative;overflow-x:hidden;
  background:linear-gradient(180deg,rgba(10,10,15,0.55) 0%,rgba(10,10,15,0.72) 35%,rgba(10,10,15,0.86) 100%),url('/static/bg.jpg') center top / cover no-repeat fixed;
}
.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:"tnum"}
.gn{color:var(--gn2)}.rd{color:var(--rd2)}.yl{color:var(--yl)}.bl{color:var(--bl)}
.container{max-width:540px;margin:0 auto;padding-bottom:80px}
@keyframes lp{0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,0.40)}50%{box-shadow:0 0 0 9px rgba(16,185,129,0.05)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:0;height:0}

/* ── HEADER (Part 2) ───────────────────────── */
.hdr{
  padding:14px 16px 12px;
  background:linear-gradient(180deg,rgba(10,10,15,0.78),rgba(10,10,15,0.55));
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:50;animation:fadein 0.4s ease;
}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-logo{display:flex;align-items:baseline;gap:8px;min-width:0}
.hdr-logo h1{font-size:15px;font-weight:900;letter-spacing:0.4px;white-space:nowrap;color:var(--tx)}
.hdr-logo h1 b{background:var(--or-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-ver{font-size:9px;font-weight:800;color:#fff;background:var(--or-grad);padding:3px 11px;border-radius:20px;box-shadow:0 4px 14px rgba(249,115,22,0.45);letter-spacing:0.5px}
.hdr-live{width:11px;height:11px;border-radius:50%;background:var(--gn);animation:lp 2s infinite;flex-shrink:0}
.hdr-live.stale{background:var(--rd);animation:pulse 1.4s infinite;box-shadow:0 0 0 3px rgba(239,68,68,0.35)}
.hdr-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tag{padding:4px 11px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.4px;border:1px solid;white-space:nowrap;backdrop-filter:blur(10px)}
.tag.tp{color:var(--bl);background:var(--bl-bg);border-color:var(--bl-bd)}
.tag.tl{color:var(--gn);background:var(--gn-bg);border-color:var(--gn-bd)}
.tag.td{color:var(--tx2);background:var(--card-glass);border-color:var(--bd2)}
.tag.tk{color:var(--or);background:var(--or-bg);border-color:var(--or-bd)}
.tag.tv{color:var(--yl);background:var(--yl-bg);border-color:rgba(251,191,36,0.42)}
.tag.tbull{color:var(--gn);background:var(--gn-bg);border-color:var(--gn-bd)}
.tag.tbear{color:var(--rd);background:var(--rd-bg);border-color:var(--rd-bd)}
.tag.tpu{color:var(--pu);background:var(--pu-bg);border-color:rgba(167,139,250,0.42)}
.tag.tw{color:#fcd34d;background:rgba(251,191,36,0.18);border-color:rgba(251,191,36,0.45);animation:pulse 2s infinite}

/* ── (Parts 3-8 styles will replace below — kept legacy temporarily) ── */

/* ── STATS ROW (Part 3) ───────────────────── */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 12px 0;animation:slideup 0.5s ease}
.stat{
  background:var(--card);color:var(--ctx);
  border-radius:18px;padding:14px 10px;text-align:center;
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:var(--sh);overflow:hidden;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:transform 0.25s ease;
}
.stat:active{transform:scale(0.97)}
.stat .la{font-size:9px;color:var(--ctx3);text-transform:uppercase;letter-spacing:1.2px;font-weight:800}
.stat .va{font-size:23px;font-weight:900;margin-top:4px;letter-spacing:-0.6px;line-height:1.05;color:var(--ctx)}
.stat .va.sm{font-size:18px}
.stat .su{font-size:9.5px;color:var(--ctx2);margin-top:3px;font-weight:600;line-height:1.3}
.stat .va.gn{color:var(--gn2);text-shadow:0 1px 2px rgba(16,185,129,0.10)}
.stat .va.rd{color:var(--rd);text-shadow:0 1px 2px rgba(239,68,68,0.10)}
.st-up{
  background:linear-gradient(150deg,rgba(220,252,231,0.95) 0%,rgba(187,247,208,0.92) 100%);
  border-color:rgba(16,185,129,0.55);
  box-shadow:var(--sh-gn);
}
.st-dn{
  background:linear-gradient(150deg,rgba(254,226,226,0.95) 0%,rgba(252,165,165,0.92) 100%);
  border-color:rgba(239,68,68,0.55);
  box-shadow:var(--sh-rd);
}
.st-trade{
  background:linear-gradient(150deg,rgba(254,243,199,0.95) 0%,rgba(253,230,138,0.92) 100%);
  border-color:rgba(251,191,36,0.55);
  box-shadow:0 6px 24px rgba(251,191,36,0.30);
}

/* ── TAB BAR (Part 3) ─────────────────────── */
.tbar{
  display:flex;gap:2px;margin:14px 12px;padding:4px;
  background:rgba(15,15,25,0.55);border:1px solid var(--bd);
  border-radius:16px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:var(--sh-lg);
  position:sticky;top:84px;z-index:40;
}
.tb{
  flex:1;padding:11px 0;text-align:center;
  font-size:10.5px;font-weight:700;color:var(--tx3);
  letter-spacing:0.3px;cursor:pointer;border-radius:12px;
  transition:all 0.25s ease;user-select:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.tb:hover{color:var(--tx2);background:rgba(255,255,255,0.05)}
.tb.on{
  color:#fff;background:var(--or-grad);
  box-shadow:0 4px 14px rgba(249,115,22,0.45);
  transform:translateY(-1px);
}
.tb-ico{font-size:13px;line-height:1}
.tc{display:none;animation:fadein 0.4s ease}
.tc.show{display:block}

/* ── REFRESH BAR ───────────────────────────── */
.ref{
  text-align:center;padding:10px 12px 4px;
  font-size:9.5px;color:var(--tx3);font-weight:600;letter-spacing:0.3px;
}
.rd2{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--gn);margin-right:5px;animation:lp 2s infinite;
  vertical-align:middle;
}

/* ── POSITION CARD (Part 4) ────────────────── */
.pos2{
  margin:14px 12px;border-radius:22px;padding:18px 16px;
  background:var(--card);color:var(--ctx);
  border:1px solid rgba(255,255,255,0.55);
  box-shadow:var(--sh-lg);
  position:relative;overflow:hidden;
  animation:slideup 0.4s ease;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.pos2::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;border-radius:22px 22px 0 0;
}
.pos2.up::before{background:linear-gradient(90deg,var(--gn2),var(--gn),var(--gn2))}
.pos2.dn::before{background:linear-gradient(90deg,var(--rd2),var(--rd),var(--rd2))}
.pos2.up{box-shadow:var(--sh-gn),var(--sh-lg)}
.pos2.dn{box-shadow:var(--sh-rd),var(--sh-lg)}
.pos2-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pos2-sym{font-size:15px;font-weight:900;letter-spacing:0.3px;display:flex;align-items:center;gap:8px;color:var(--ctx)}
.pos2-emj{font-size:18px;line-height:1}
.pos2-bdg{
  font-size:8.5px;font-weight:800;letter-spacing:0.7px;
  padding:4px 10px;border-radius:12px;color:#fff;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  box-shadow:0 3px 10px rgba(251,191,36,0.35);
}
.pos2-pnl{font-size:46px;font-weight:900;letter-spacing:-2px;line-height:1;font-feature-settings:"tnum"}
.pos2-pnl.up{color:var(--gn2)}.pos2-pnl.dn{color:var(--rd)}
.pos2-pnl small{font-size:18px;font-weight:800;margin-left:4px;letter-spacing:-0.5px}
.pos2-rs{font-size:15px;color:var(--ctx2);font-weight:700;margin-top:2px}
.pos2-meta{
  margin-top:12px;padding:10px 12px;
  background:rgba(15,23,42,0.04);border:1px solid var(--cbd);
  border-radius:12px;font-size:11px;color:var(--ctx2);font-weight:600;
  line-height:1.6;
}
.pos2-meta b{color:var(--ctx);font-weight:800;font-family:'JetBrains Mono',monospace}
.pos2-meta .arr{color:var(--ctx3);margin:0 4px;font-weight:400}
.pos2-meta .sub{display:block;margin-top:3px;color:var(--ctx3);font-size:10px;font-weight:600}

/* Smart Trail v2+ Ladder */
.trail-card{
  margin-top:14px;border-radius:14px;overflow:hidden;
  border:1px solid var(--cbd2);background:rgba(15,23,42,0.03);
}
.trail-hd{
  padding:9px 14px;display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,rgba(15,23,42,0.06),rgba(15,23,42,0.02));
  border-bottom:1px solid var(--cbd);
  font-size:10px;font-weight:800;letter-spacing:0.6px;color:var(--ctx);
}
.trail-hd .ico{font-size:13px;line-height:1}
.trail-tbl{display:grid;grid-template-columns:auto 1fr auto;font-size:10.5px}
.trail-row{display:contents}
.trail-row > div{
  padding:7px 12px;border-bottom:1px solid rgba(15,23,42,0.05);
  display:flex;align-items:center;color:var(--ctx2);
}
.trail-row:last-child > div{border-bottom:none}
.trail-row .tn{font-weight:800;color:var(--ctx);gap:5px}
.trail-row .tp{font-family:'JetBrains Mono',monospace;color:var(--ctx3);font-weight:700;justify-content:center}
.trail-row .ts{font-family:'JetBrains Mono',monospace;color:var(--ctx2);font-weight:700;justify-content:flex-end}
.trail-row.active > div{
  background:linear-gradient(135deg,rgba(16,185,129,0.18),rgba(16,185,129,0.10));
  color:var(--gn2);
}
.trail-row.active .tn{color:var(--gn2)}
.trail-row.active .ts::after{content:' ◀';color:var(--gn2);font-weight:900;margin-left:6px}
.trail-row.passed > div{opacity:0.50}

.trail-sl{
  margin-top:10px;padding:11px 14px;
  background:linear-gradient(135deg,rgba(16,185,129,0.10),rgba(16,185,129,0.04));
  border:1px solid rgba(16,185,129,0.30);border-radius:12px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--ctx);font-weight:700;
  flex-wrap:wrap;gap:6px;
}
.trail-sl b{font-family:'JetBrains Mono',monospace;color:var(--gn2);font-weight:800}
.trail-sl .sep{color:var(--ctx4);margin:0 2px}
.trail-sl.dn{
  background:linear-gradient(135deg,rgba(239,68,68,0.10),rgba(239,68,68,0.04));
  border-color:rgba(239,68,68,0.30);
}
.trail-sl.dn b{color:var(--rd)}

/* ── CE/PE SIGNAL CARDS (Part 5) ───────────── */
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px;animation:slideup 0.5s ease}
.sig-card{
  background:var(--card);color:var(--ctx);
  border:1px solid rgba(255,255,255,0.55);
  border-radius:18px;overflow:hidden;
  box-shadow:var(--sh);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}
.sig-card.fired{
  border-color:rgba(16,185,129,0.55);
  box-shadow:0 0 0 3px rgba(16,185,129,0.15),var(--sh-gn);
  transform:translateY(-2px);
}
.sig-hdr{
  padding:12px 13px 10px;
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px solid var(--cbd);
}
.sig-strk{font-size:13.5px;font-weight:900;letter-spacing:0.3px;color:var(--ctx)}
.sig-ltp{font-size:13.5px;font-weight:800;color:var(--ctx);font-family:'JetBrains Mono',monospace}
.sig-blk{padding:10px 13px;border-bottom:1px solid rgba(15,23,42,0.05)}
.sig-blk-t{
  font-size:8.5px;color:var(--ctx3);text-transform:uppercase;
  letter-spacing:1.2px;font-weight:800;margin-bottom:7px;
}
.sig-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;line-height:1.5;
}
.sig-row .lab{display:flex;align-items:center;gap:6px;color:var(--ctx2);font-weight:600;flex-shrink:0}
.sig-row .lab .ico{font-size:11px;opacity:0.85}
.sig-row .val{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--ctx);text-align:right}
.sig-row.high .lab{color:var(--rd)}
.sig-row.low  .lab{color:var(--bl)}
.sig-row.cls  .lab{color:var(--ctx)}
.sig-row.cls  .lab{font-weight:800}
.sig-gap{font-size:10px;color:var(--ctx3);font-weight:600;margin-left:4px}
.sig-gap.up{color:var(--gn2)} .sig-gap.dn{color:var(--rd)}

/* Golden 4 gate rows */
.sig-g4-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;padding:5px 0;
}
.sig-g4-row .lab{color:var(--ctx2);font-weight:700;display:flex;align-items:center;gap:6px}
.sig-g4-row .lab .ico{font-size:12px;line-height:1}
.sig-g4-row .val{
  font-family:'JetBrains Mono',monospace;font-weight:800;
  font-size:10.5px;display:flex;align-items:center;gap:4px;
}
.sig-g4-row .val.ok{color:var(--gn2)}
.sig-g4-row .val.no{color:var(--rd)}
.sig-g4-row .val.flat{color:var(--yl2)}
.sig-g4-row .val.muted{color:var(--ctx4);font-weight:600}

/* Verdict footer */
.sig-vd{
  padding:12px 13px;text-align:center;
  font-size:11px;font-weight:800;letter-spacing:0.4px;
  line-height:1.3;
}
.sig-vd.fire{
  color:#fff;background:var(--gn-grad);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);
}
.sig-vd.ready{color:var(--gn2);background:var(--gn-bg)}
.sig-vd.wait{color:var(--ctx3);background:rgba(15,23,42,0.04)}
.sig-vd.reject{color:var(--rd);background:var(--rd-bg)}
.sig-vd.cool{color:var(--or2);background:var(--or-bg)}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 12px}
.sc{border-radius:18px;overflow:hidden;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh);transition:all 0.3s}
.sc.fired{border-color:var(--gn-bd);box-shadow:0 0 0 3px rgba(16,185,129,0.12),var(--sh-gn)}
.sh2{padding:14px 14px 8px;display:flex;justify-content:space-between;align-items:center}
.st2{font-size:14px;font-weight:900;letter-spacing:0.3px}.sl2{font-size:14px;font-weight:700}

.ms{margin:6px 12px 8px;padding:12px;border-radius:14px;background:var(--bg);border:1px solid var(--bd)}
.mt2{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;font-weight:800;margin-bottom:8px}
.mr{display:flex;align-items:center;margin:5px 0;font-size:10px}
.ml{min-width:56px;font-weight:700}.ml.f{color:var(--or2)}.ml.c{color:var(--bl)}.ml.e{color:var(--tx4)}
.mb{flex:1;margin:0 8px;height:6px;border-radius:3px;background:var(--bg2);overflow:hidden}
.mf{height:100%;border-radius:3px;transition:width 0.6s}
.mf.or{background:var(--or-grad)}.mf.bl{background:var(--bl-grad)}.mf.gy{background:var(--tx4)}.mf.re{background:linear-gradient(90deg,var(--rd),#f87171)}
.mv{min-width:34px;text-align:right;font-weight:700;font-size:9px}

.sr{display:flex;justify-content:space-between;align-items:center;padding:5px 14px;font-size:11px}
.sk{color:var(--tx3);font-weight:600}.sv{font-weight:700;display:flex;align-items:center;gap:4px}
.ok{color:var(--gn2)}.fl{color:var(--rd)}

.db{margin:6px 12px 8px;padding:10px;border-radius:12px;font-size:10px;font-weight:700;text-align:center}
.dok{background:var(--gn-bg);color:var(--gn2);border:1.5px solid var(--gn-bd)}
.dbd{background:var(--rd-bg);color:var(--rd2);border:1.5px solid var(--rd-bd)}

.vd{padding:12px 14px;text-align:center;font-size:11px;font-weight:800;letter-spacing:0.5px;border-top:1px solid var(--bd);margin-top:4px}
.vf{color:#fff;background:linear-gradient(135deg,var(--gn),var(--gn2))}.vr{color:var(--gn2);background:var(--gn-bg)}
.vw{color:var(--tx3);background:var(--bg2)}.vc{color:var(--or2);background:var(--or-bg)}

.pos{margin:12px;border-radius:20px;padding:20px;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh-lg);position:relative;overflow:hidden}
.pos::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0}
.pos.profit{border-color:var(--gn-bd)}.pos.profit::before{background:linear-gradient(90deg,var(--gn),#34d399,var(--gn))}
.pos.loss{border-color:var(--rd-bd)}.pos.loss::before{background:linear-gradient(90deg,var(--rd),#f87171,var(--rd))}
.ph{display:flex;justify-content:space-between;align-items:center;margin:4px 0 4px}
.ps{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
.pd{width:10px;height:10px;border-radius:50%;animation:lp 2s infinite}
.pd.g{background:var(--gn)}.pd.s{background:var(--or)}
.bg{font-size:8px;padding:4px 10px;border-radius:20px;font-weight:800;letter-spacing:0.5px;color:#fff}
.bg.bf{background:var(--or-grad);box-shadow:var(--sh-or)}.bg.bc{background:var(--bl-grad);box-shadow:0 4px 12px rgba(59,130,246,0.2)}
.pp{font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1}.pp.gn{color:var(--gn)}.pp.rd{color:var(--rd)}
.pr{font-size:15px;color:var(--tx2);font-weight:700;margin-top:2px}
.pe{font-size:11px;color:var(--tx3);margin-top:6px}
.pl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.lt{padding:14px;border-radius:14px;background:var(--bg);border:1px solid var(--bd)}
.ll{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px}
.lv{font-size:12px;font-weight:700;margin-top:4px}
.ls{font-size:10px;color:var(--tx2);margin-top:3px;font-weight:600}

.rb{margin-top:16px}.rl{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-bottom:5px;font-weight:600}
.rt{height:10px;border-radius:5px;background:var(--bg2);overflow:hidden;position:relative}
.rf{height:100%;border-radius:5px;transition:width 0.8s}
.rm{position:absolute;top:-1px;bottom:-1px;width:3px;background:var(--or);border-radius:2px;box-shadow:0 0 6px rgba(249,115,22,0.4)}

.fls{display:flex;gap:0;margin-top:16px;align-items:center;padding:0 8px}
.fd{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
.fd.h{background:var(--gn-bg);border:2px solid var(--gn);color:var(--gn2);box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.fd.n{background:var(--bg2);border:2px solid var(--bd2);color:var(--tx4)}
.fln{flex:1;height:3px;border-radius:2px;background:var(--bg2)}.fln.h{background:linear-gradient(90deg,var(--gn),var(--gn-bd))}
.pm{display:flex;gap:16px;margin-top:14px;font-size:10px;color:var(--tx3)}.pm b{color:var(--tx2);font-weight:700}

.sum{margin:10px 12px;padding:20px;border-radius:20px;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh);text-align:center;position:relative;overflow:hidden}
.sum::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sum.up::before{background:linear-gradient(90deg,transparent,var(--gn),transparent)}
.sum.dn::before{background:linear-gradient(90deg,transparent,var(--rd),transparent)}

.tr{margin:6px 12px;padding:14px 16px;border-radius:16px;background:var(--white);border:1px solid var(--bd);display:flex;align-items:center;gap:14px;box-shadow:var(--sh)}
.tr.w{border-left:4px solid var(--gn)}.tr.l{border-left:4px solid var(--rd)}
.tp2{font-size:22px;font-weight:900;min-width:72px;letter-spacing:-0.5px}.tp2.gn{color:var(--gn)}.tp2.rd{color:var(--rd)}
.ti{flex:1}.tn{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.tt{font-size:9px;color:var(--tx3);margin-top:3px}.tre{font-size:8px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--bg);color:var(--tx2);border:1px solid var(--bd)}

.ms2{margin:8px 12px;border-radius:18px;overflow:hidden;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh)}
.mh{padding:14px 16px;font-size:10px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bd);background:var(--bg)}
.mw{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd)}
.mw:last-child{border:none}.mk2{font-size:11px;color:var(--tx3)}.mv2{font-size:12px;font-weight:700}

.ff{margin:6px 12px;padding:16px 18px;border-radius:16px;background:var(--white);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:var(--sh)}
.fi2{font-size:20px}.fn{font-size:13px;font-weight:700;flex:1}
.fi3{margin:4px 12px;padding:10px 14px;border-radius:10px;background:var(--white);border:1px solid var(--bd);display:flex;justify-content:space-between;font-size:12px;text-decoration:none;color:var(--tx)}
.fi3:active{background:var(--or-bg)}.fsz{color:var(--tx3);font-size:10px}
.bk{margin:8px 12px;padding:10px 16px;border-radius:10px;background:var(--white);border:1px solid var(--bd);color:var(--or);font-size:12px;font-weight:700;cursor:pointer;display:inline-block}

.ft{text-align:center;padding:24px 12px;font-size:9px;color:var(--tx4);letter-spacing:0.5px}

.cb{margin:10px 12px;padding:12px 16px;border-radius:12px;text-align:center;background:var(--yl-bg);border:1px solid rgba(245,158,11,0.3);color:#b45309;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div class="container">
<header class="hdr" id="hdr"></header>
<div class="stats" id="stats-area">
  <div class="stat" id="st-pnl-card">
    <div class="la">Day P&amp;L</div>
    <div class="va mono" id="st-pnl">+0.0</div>
    <div class="su" id="st-rs">₹0</div>
  </div>
  <div class="stat" id="st-trd-card">
    <div class="la">Trades</div>
    <div class="va mono" id="st-trades">0</div>
    <div class="su" id="st-wl">— —</div>
  </div>
  <div class="stat" id="st-status-card">
    <div class="la">Status</div>
    <div class="va sm" id="st-icon">⚡</div>
    <div class="su" id="st-status">SCANNING</div>
  </div>
</div>
<div class="tbar">
  <div class="tb on" data-t="sig" onclick="stab(0)"><span class="tb-ico">⚡</span>Signals</div>
  <div class="tb" data-t="mkt" onclick="stab(1)"><span class="tb-ico">📊</span>Market</div>
  <div class="tb" data-t="trd" onclick="stab(2)"><span class="tb-ico">📋</span>Trades</div>
  <div class="tb" data-t="fil" onclick="stab(3)"><span class="tb-ico">📁</span>Files</div>
</div>
<div class="ref"><span class="rd2"></span>Auto-refresh 10s · <span class="mono" style="font-size:9px" id="ts">--:--:--</span></div>
<div id="pos-area"></div>
<div class="tc show" id="p-sig"></div>
<div class="tc" id="p-mkt"></div>
<div class="tc" id="p-trd"></div>
<div class="tc" id="p-fil"></div>
<div class="ft">VISHAL RAJPUT TRADE · Powered by data, driven by discipline</div>
</div>
<script>
function stab(n){document.querySelectorAll('.tb').forEach(function(t,i){t.classList.toggle('on',i===n)});document.querySelectorAll('.tc').forEach(function(t,i){t.classList.toggle('show',i===n)});if(n===3)loadFiles('')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(v){v=parseFloat(v||0);return(v>=0?'+':'')+v.toFixed(1)}
function rs(p){var v=Math.round(parseFloat(p||0)*65*2);return '\u20B9'+(v>=0?'':'-')+Math.abs(v).toLocaleString('en-IN')}
function tagC(b){if(!b)return'td';b=String(b).toUpperCase();if(b.includes('BULL'))return'tbull';if(b.includes('BEAR'))return'tbear';return'td'}
function regC(r){if(!r)return'td';if(r.includes('TREND'))return'tbull';if(r==='NEUTRAL')return'tpu';return'tw'}
function shortSym(sym,dir,strike){if(strike>0)return(dir||'')+ ' '+strike;return sym||''}

function renderHeader(d){
  var mk=d.market||{};
  var mode=String(d.mode||'PAPER').toUpperCase();
  var dte =mk.dte!=null?mk.dte:'?';
  var ce  =mk.locked_ce||mk.atm||'?';
  var pe  =mk.locked_pe||mk.atm||'?';
  var vix =mk.vix?Number(mk.vix).toFixed(1):'?';
  var bias=String(mk.bias||'').toUpperCase();
  var reg =String(mk.regime||'').toUpperCase();
  var per =String(d.period||'').toUpperCase();
  var live=mk.market_open!==false;
  var warm=mk.indicators_warm===false&&mk.market_open;
  var ver =String(d.version||'v16.6').replace(/^v/,'');
  var tg='';
  tg+='<span class="tag '+(mode==='LIVE'?'tl':'tp')+'">'+mode+'</span>';
  tg+='<span class="tag td">DTE '+dte+'</span>';
  tg+='<span class="tag tk">CE '+ce+' \u00B7 PE '+pe+' \uD83D\uDD12</span>';
  tg+='<span class="tag tv">VIX '+vix+'</span>';
  if(bias==='BULL')tg+='<span class="tag tbull">'+bias+'</span>';
  if(bias==='BEAR')tg+='<span class="tag tbear">'+bias+'</span>';
  if(reg)         tg+='<span class="tag tl">'+reg+'</span>';
  if(per)         tg+='<span class="tag tpu">'+per+'</span>';
  if(warm)        tg+='<span class="tag tw">WARMUP '+(mk.warmup_progress||0)+'/'+(mk.warmup_needed||14)+'</span>';
  document.getElementById('hdr').innerHTML=
    '<div class="hdr-row">'+
      '<div class="hdr-logo">'+
        '<h1><b>VISHAL RAJPUT</b> TRADE</h1>'+
        '<span class="hdr-ver">v'+ver+'</span>'+
      '</div>'+
      '<span class="hdr-live '+(live?'':'stale')+'" title="'+(live?'Market open':'Market closed')+'"></span>'+
    '</div>'+
    '<div class="hdr-tags">'+tg+'</div>';
}

function render(d,trades,zones,mtf){
if(!d)return;
var mk=d.market||{},pos=d.position||{},ce=d.signals_ce||d.ce||{},pe=d.signals_pe||d.pe||{},cd=d.cooldown||{},td=d.today||{};
renderHeader(d);

// Stats: P&L (with open) + Trades + Smart Status (Part 3)
var _realized=parseFloat(td.pnl||0);
var _open=pos.in_trade?parseFloat(pos.pnl||0):0;
var dp=_realized+_open;
var dc=dp>=0?'gn':'rd';

document.getElementById('st-pnl').className='va mono '+dc;
document.getElementById('st-pnl').textContent=(dp>=0?'+':'')+dp.toFixed(1);
var _rs_main=rs(dp);
var _rs_sub=_rs_main;
if(pos.in_trade&&_open!==0){
  _rs_sub=_rs_main+'<br><span style="font-size:8px;color:var(--ctx3);font-weight:600">R '+fmt(_realized)+' \u00B7 O '+fmt(_open)+'</span>';
}
document.getElementById('st-rs').innerHTML=_rs_sub;
document.getElementById('st-pnl-card').className='stat '+(dp>=0?'st-up':'st-dn');

// Trades card with W/L bars + win%
var _w=td.wins||0,_l=td.losses||0,_tc=td.trades||0;
document.getElementById('st-trades').textContent=_tc;
var wlh='';
if(_tc>0){
  var _maxBars=6;
  var _wShow=Math.min(_w,_maxBars),_lShow=Math.min(_l,_maxBars);
  for(var i=0;i<_wShow;i++)wlh+='<span style="display:inline-block;width:11px;height:5px;border-radius:2px;background:var(--gn2);margin:0 1px"></span>';
  for(var i=0;i<_lShow;i++)wlh+='<span style="display:inline-block;width:11px;height:5px;border-radius:2px;background:var(--rd);margin:0 1px"></span>';
  var _wr=Math.round(_w/_tc*100);
  wlh+='<br><span style="font-size:8.5px;color:var(--ctx3);font-weight:700">'+_w+'W \u00B7 '+_l+'L \u00B7 '+_wr+'%</span>';
}else{
  wlh='<span style="color:var(--ctx3)">no trades yet</span>';
}
document.getElementById('st-wl').innerHTML=wlh;

// Smart Status: 5 states
var _stIcon='\u26A1',_stText='SCANNING',_stCard='stat',_stSub='';
if(td.paused){
  _stIcon='\u23F8\uFE0F'; _stText='PAUSED'; _stCard='stat st-dn';
}else if(pos.in_trade){
  _stIcon=pos.direction==='CE'?'\uD83D\uDFE2':'\uD83D\uDD34';
  _stText='IN TRADE'; _stCard='stat st-trade';
  var _sym=(pos.direction||'')+' '+(pos.strike||'');
  var _pn=parseFloat(pos.pnl||0);
  _stSub=esc(_sym)+' '+(_pn>=0?'+':'')+_pn.toFixed(1);
}else if(cd&&cd.remaining>0){
  _stIcon='\u23F3'; _stText='COOLDOWN';
  _stSub=Math.ceil(cd.remaining)+'m \u00B7 '+(cd.direction||'');
}else if(mk.market_open===false){
  _stIcon='\uD83D\uDCA4'; _stText='MARKET CLOSED';
}else if(!mk.indicators_warm&&mk.market_open){
  _stIcon='\u231B'; _stText='WARMING UP';
  _stSub=(mk.warmup_progress||0)+'/'+(mk.warmup_needed||14);
}
document.getElementById('st-icon').textContent=_stIcon;
document.getElementById('st-status-card').className=_stCard;
document.getElementById('st-status').innerHTML=
  '<span style="color:var(--ctx2);font-weight:800">'+_stText+'</span>'+
  (_stSub?'<br><span style="font-size:8.5px;color:var(--ctx3);font-weight:700">'+esc(_stSub)+'</span>':'');

// Position card (Part 4) — Smart Trail v2+ tier ladder
var pa='';
if(pos.in_trade){
  var sym=(pos.direction||'')+' '+(pos.strike||'');
  var pn=parseFloat(pos.pnl||0);
  var pk=parseFloat(pos.peak||0);
  var en=parseFloat(pos.entry||0);
  var lt=parseFloat(pos.ltp||0);
  var cn=pos.candles||0;
  var et=pos.entry_time||'';
  var prs=Math.round(pn*65*2);
  var emj=pos.direction==='CE'?'\uD83D\uDFE2':'\uD83D\uDD34';
  var clsUp=pn>=0?'up':'dn';

  pa+='<div class="pos2 '+clsUp+'">';
  pa+='<div class="pos2-hd">'+
        '<div class="pos2-sym"><span class="pos2-emj">'+emj+'</span>'+esc(sym)+'</div>'+
        '<span class="pos2-bdg">IN TRADE</span>'+
      '</div>';

  pa+='<div class="pos2-pnl '+clsUp+' mono">'+(pn>=0?'+':'')+pn.toFixed(1)+'<small>pts</small></div>';
  pa+='<div class="pos2-rs mono">'+(prs>=0?'\u20B9':'-\u20B9')+Math.abs(prs).toLocaleString('en-IN')+'</div>';

  pa+='<div class="pos2-meta">'+
        'Entry <b>\u20B9'+en.toFixed(2)+'</b><span class="arr">\u2192</span>'+
        '<b>\u20B9'+lt.toFixed(2)+'</b><span class="arr">\u00B7</span>'+
        'Peak <b>+'+pk.toFixed(1)+'</b>'+
        '<span class="sub">Hold <b>'+cn+'</b> candles \u00B7 since '+esc(et)+'</span>'+
      '</div>';

  // Smart Trail v2+ tiers
  var tiers=[
    {k:'INITIAL',   icon:'',          range:'<5',    sl:'entry-10',  min:0,  max:5},
    {k:'BREAKEVEN', icon:'\uD83D\uDEE1\uFE0F', range:'5-8',  sl:'entry',     min:5,  max:8},
    {k:'TRAIL_60',  icon:'\uD83D\uDD12',     range:'8-15', sl:'+60% peak', min:8,  max:15},
    {k:'TRAIL_75',  icon:'\uD83D\uDD12\uD83D\uDD12', range:'15-30',sl:'+75% peak', min:15, max:30},
    {k:'VISHAL_MAX',icon:'\uD83D\uDD12\uD83D\uDD12', range:'30-45',sl:'+85% peak', min:30, max:45},
    {k:'TRAIL_90',  icon:'\uD83D\uDD12\uD83D\uDD12\uD83D\uDD12', range:'45+',  sl:'+90% peak', min:45, max:9999},
  ];
  var curTier=String(pos.active_ratchet_tier||pos.trail_tier||'').toUpperCase();
  // Fallback: derive from peak if engine hasn't populated yet
  if(!curTier||curTier==='NONE'){
    for(var ti=tiers.length-1;ti>=0;ti--){if(pk>=tiers[ti].min){curTier=tiers[ti].k;break}}
    if(!curTier)curTier='INITIAL';
  }

  var rows='';
  var hitActive=false;
  for(var ti=0;ti<tiers.length;ti++){
    var T=tiers[ti];
    var isActive=(T.k===curTier);
    var isPassed=(!isActive&&!hitActive);
    if(isActive)hitActive=true;
    else if(hitActive)isPassed=false;
    var cls=isActive?'active':(isPassed?'passed':'');
    rows+='<div class="trail-row '+cls+'">'+
            '<div class="tn">'+(T.icon?'<span>'+T.icon+'</span>':'')+T.k+'</div>'+
            '<div class="tp">peak '+T.range+'</div>'+
            '<div class="ts">'+T.sl+'</div>'+
          '</div>';
  }

  pa+='<div class="trail-card">'+
        '<div class="trail-hd"><span class="ico">\uD83D\uDD12</span>SMART TRAIL v2+</div>'+
        '<div class="trail-tbl">'+rows+'</div>'+
      '</div>';

  // SL / Lock / Room line
  var sl=parseFloat(pos.active_ratchet_sl||pos.trail_sl||pos.stop||0);
  if(sl<=0)sl=Math.round((en-10)*100)/100;
  var lock=Math.round((sl-en)*10)/10;
  var room=lt>0?Math.round((lt-sl)*10)/10:0;
  var slDn=lock<0;
  pa+='<div class="trail-sl '+(slDn?'dn':'')+'">'+
        '<span>SL <b>\u20B9'+sl.toFixed(2)+'</b></span>'+
        '<span class="sep">\u00B7</span>'+
        '<span>Lock <b>'+(lock>=0?'+':'')+lock.toFixed(1)+'</b></span>'+
        '<span class="sep">\u00B7</span>'+
        '<span>Room <b>'+(room>=0?'+':'')+room.toFixed(1)+'</b></span>'+
      '</div>';

  pa+='</div>';
}
document.getElementById('pos-area').innerHTML=pa;

// Signals (Part 5) — CE/PE Golden 4 cards
var sh='';
if(cd&&cd.remaining>0){
  sh+='<div style="margin:12px;padding:10px 14px;border-radius:12px;text-align:center;background:rgba(249,115,22,0.18);border:1px solid rgba(249,115,22,0.42);color:#fdba74;font-size:11px;font-weight:700">'+
       '\u23F3 COOLDOWN '+Math.ceil(cd.remaining)+'min \u00B7 '+(cd.direction||'')+' blocked</div>';
}
sh+='<div class="sig-grid">';
[['CE',ce],['PE',pe]].forEach(function(p){
  var t=p[0],s=p[1]||{};
  var sk=s.strike||(t==='CE'?(mk.locked_ce||mk.atm||''):(mk.locked_pe||mk.atm||''));
  var ltp=parseFloat(s.ltp||0);
  var fired=!!s.fired;

  // Reject reason translation (matches engine reject_reason values)
  function friendly(r){
    if(!r)return '';
    if(r==='close_below_ema9_low')return 'Close below EMA9-low';
    if(r==='red_candle')return '(stale) Red candle';
    if(r==='not_fresh_breakout')return '(stale) Not fresh breakout';
    if(r==='insufficient_3m_data')return 'Warming up\u2026';
    if(r.indexOf('tight_band_')===0)return 'Band too narrow ('+r.split('_').pop()+'pts < 7)';
    if(r.indexOf('ema9_low_falling_')===0)return 'EMA9 falling ('+r.split('_').pop()+')';
    if(r.indexOf('weak_body_')===0)return 'Body '+r.replace('weak_body_','').replace('pct','')+'% < 40%';
    if(r.indexOf('before_')===0)return 'Pre-warmup (before '+r.replace('before_','')+')';
    if(r.indexOf('after_')===0)return 'Past entry cutoff ('+r.replace('after_','')+')';
    return r;
  }

  // EMA9 band values
  var eh=parseFloat(s.ema9_high||0);
  var el=parseFloat(s.ema9_low||0);
  var cl=parseFloat(s.close||0);
  var bw=parseFloat(s.band_width||(eh-el));
  var gap=cl-el;
  var sl=parseFloat(s.ema9_low_slope||0);
  var bd=parseFloat(s.body_pct||0);
  var pos=String(s.band_position||'').toUpperCase();
  var rj=s.reject_reason||'';

  // Golden 4 gate evaluation
  var g_time=!rj||(rj.indexOf('before_')!==0&&rj.indexOf('after_')!==0);
  var g_band=(cl>el)&&(bw>7);
  var g_slope=sl>=-0.05;
  var g_body=bd>=40;
  var g_slopeFlat=Math.abs(sl)<0.05;

  // Verdict
  var vd_html='';
  if(fired){
    vd_html='<div class="sig-vd fire">READY TO FIRE \uD83D\uDD25</div>';
  }else if(rj){
    vd_html='<div class="sig-vd reject">'+esc(friendly(rj))+'</div>';
  }else if(cd&&cd.remaining>0&&cd.direction===t){
    vd_html='<div class="sig-vd cool">COOLDOWN '+Math.ceil(cd.remaining)+'m</div>';
  }else if(g_time&&g_band&&g_slope&&g_body){
    vd_html='<div class="sig-vd ready">READY</div>';
  }else{
    vd_html='<div class="sig-vd wait">WAITING</div>';
  }

  sh+='<div class="sig-card '+(fired?'fired':'')+'">';
  sh+='<div class="sig-hdr"><span class="sig-strk">'+t+' '+esc(sk)+'</span><span class="sig-ltp">\u20B9'+ltp.toFixed(1)+'</span></div>';

  // EMA9 band block
  sh+='<div class="sig-blk">';
  sh+='<div class="sig-blk-t">EMA9 Band ('+bw.toFixed(1)+'pts)</div>';
  sh+='<div class="sig-row high"><span class="lab"><span class="ico">\u25B2</span>High</span><span class="val">\u20B9'+eh.toFixed(1)+'</span></div>';
  var gapCls=gap>=0?'up':'dn';
  sh+='<div class="sig-row cls"><span class="lab"><span class="ico">\u25CF</span>Close</span><span class="val">\u20B9'+cl.toFixed(1)+'<span class="sig-gap '+gapCls+'">('+(gap>=0?'+':'')+gap.toFixed(1)+')</span></span></div>';
  sh+='<div class="sig-row low"><span class="lab"><span class="ico">\u25BC</span>Low</span><span class="val">\u20B9'+el.toFixed(1)+'</span></div>';
  sh+='</div>';

  // Golden 4 gates
  sh+='<div class="sig-blk">';
  sh+='<div class="sig-blk-t">GOLDEN 4</div>';
  // Time
  sh+='<div class="sig-g4-row"><span class="lab"><span class="ico">\u23F0</span>Time</span><span class="val '+(g_time?'ok':'no')+'">'+(g_time?'\u2713':'\u2717')+'</span></div>';
  // Close + Band
  var cbCls=g_band?'ok':'no';
  var cbVal=g_band?('\u2713 '+bw.toFixed(0)):(cl<=el?'\u2717 below':'\u2717 narrow '+bw.toFixed(0));
  sh+='<div class="sig-g4-row"><span class="lab"><span class="ico">\uD83C\uDFAF</span>Close+Band</span><span class="val '+cbCls+'">'+cbVal+'</span></div>';
  // Slope
  var slLab,slCls;
  if(g_slopeFlat){slLab='\u2192 flat ('+(sl>=0?'+':'')+sl.toFixed(1)+')';slCls='flat'}
  else if(sl>0){slLab='\u2713 rising ('+(sl>=0?'+':'')+sl.toFixed(1)+')';slCls='ok'}
  else{slLab='\u2717 falling ('+sl.toFixed(1)+')';slCls='no'}
  sh+='<div class="sig-g4-row"><span class="lab"><span class="ico">\uD83D\uDCC8</span>Slope</span><span class="val '+slCls+'">'+slLab+'</span></div>';
  // Body
  var bdLab,bdCls;
  if(bd<=0){bdLab='\u2014 n/a';bdCls='muted'}
  else if(g_body){bdLab='\u2713 '+bd.toFixed(0)+'%';bdCls='ok'}
  else{bdLab='\u2717 '+bd.toFixed(0)+'%';bdCls='no'}
  sh+='<div class="sig-g4-row"><span class="lab"><span class="ico">\uD83D\uDCCA</span>Body</span><span class="val '+bdCls+'">'+bdLab+'</span></div>';
  sh+='</div>';

  sh+=vd_html;
  sh+='</div>';
});
sh+='</div>';
document.getElementById('p-sig').innerHTML=sh;

// Market
var mh='';
mh+='<div class="ms2"><div class="mh">\uD83D\uDCC8 Spot</div>';
mh+='<div class="mw"><span class="mk2">Price</span><span class="mv2 mono">'+mk.spot+'</span></div>';
var spc=parseFloat(mk.spot_ema9||0)>parseFloat(mk.spot_ema21||0)?'color:var(--gn)':'color:var(--rd)';
mh+='<div class="mw"><span class="mk2">EMA9</span><span class="mv2 mono" style="'+spc+'">'+Number(mk.spot_ema9||0).toFixed(1)+'</span></div>';
mh+='<div class="mw"><span class="mk2">EMA21</span><span class="mv2 mono">'+Number(mk.spot_ema21||0).toFixed(1)+'</span></div>';
var sprc=parseFloat(mk.spot_spread||0)>0?'color:var(--gn)':'color:var(--rd)';
mh+='<div class="mw"><span class="mk2">Spread</span><span class="mv2 mono" style="'+sprc+'">'+Number(mk.spot_spread||0).toFixed(1)+'</span></div>';
mh+='<div class="mw"><span class="mk2">RSI 3m</span><span class="mv2 mono">'+Number(mk.spot_rsi||0).toFixed(1)+'</span></div>';
mh+='<div class="mw"><span class="mk2">Hourly RSI</span><span class="mv2 mono">'+Number(mk.hourly_rsi||0).toFixed(1)+'</span></div>';
var gc=parseFloat(mk.gap||0)>0?'color:var(--gn)':'color:var(--rd)';
mh+='<div class="mw"><span class="mk2">Gap</span><span class="mv2 mono" style="'+gc+'">'+(parseFloat(mk.gap||0)>0?'+':'')+Number(mk.gap||0).toFixed(0)+'pts</span></div>';
mh+='</div>';

// Multi-TF
if(mtf&&(mtf.spot&&mtf.spot.length||mtf.ce&&mtf.ce.length)){
  mh+='<div class="ms2"><div class="mh">\uD83D\uDD0D Multi-TF</div>';
  var tfs=mtf.spot||[];
  tfs.forEach(function(r){
    mh+='<div class="mw"><span class="mk2">'+esc(r.tf||'')+'</span><span class="mv2 mono" style="color:'+(parseFloat(r.spread||0)>0?'var(--gn)':'var(--rd)')+'">'+Number(r.spread||0).toFixed(1)+' | RSI '+Number(r.rsi||0).toFixed(0)+'</span></div>';
  });
  mh+='</div>';
}

// v15.2 Part 4: silent 1-min shadow strategy — one-line A/B comparison
var _sh=d.shadow||{};
var _shn=parseInt(_sh.trades||0),_shw=parseInt(_sh.wins||0);
var _shp=parseFloat(_sh.pnl||0);
var _shc=_shp>=0?'var(--gn)':'var(--rd)';
mh+='<div class="ms2"><div class="mh">\uD83C\uDF17 Shadow 1-min (silent A/B)</div>';
mh+='<div class="mw"><span class="mk2">Today</span><span class="mv2 mono" style="color:'+_shc+'">'+_shn+' trades \u00B7 '+_shw+'W \u00B7 '+fmt(_shp)+'pts</span></div>';
mh+='</div>';

document.getElementById('p-mkt').innerHTML=mh;

// Trades
var th='';
var cum=parseFloat(td.pnl||0),tw2=td.wins||0,tl2=td.losses||0,tt2=td.trades||0;
var wr=tt2>0?Math.round(tw2/tt2*100):0;
th+='<div class="sum '+(cum>=0?'up':'dn')+'">';
th+='<div class="mono" style="font-size:32px;font-weight:900;color:'+(cum>=0?'var(--gn)':'var(--rd)')+';letter-spacing:-1px">'+fmt(cum)+'pts</div>';
th+='<div style="font-size:13px;color:var(--tx2);margin-top:4px;font-weight:600">'+rs(cum)+' \u00B7 '+tt2+' trades \u00B7 '+wr+'% win</div></div>';

if(trades&&trades.length){
  trades.slice().reverse().forEach(function(t){
    var p=parseFloat(t.pnl_pts||t.pnl||0),w=p>0;
    th+='<div class="tr '+(w?'w':'l')+'">';
    th+='<div class="tp2 mono '+(w?'gn':'rd')+'">'+fmt(p)+'</div>';
    th+='<div class="ti"><div class="tn">'+esc(shortSym(t.symbol,t.direction,t.strike));
    var em2=t.entry_mode||t.mode||'';
    // v15.x mode is EMA9_BREAKOUT; older modes show as LEGACY
    if(em2&&em2!=='EMA9_BREAKOUT')em2='LEGACY';
    var _bc2=em2==='LEGACY'?'':'bc';
    var _bstyle=em2==='LEGACY'?'background:var(--bg2);color:var(--tx3);box-shadow:none':'';
    if(em2)th+=' <span class="bg '+_bc2+'" style="font-size:7px;padding:2px 8px;'+_bstyle+'">'+esc(em2)+'</span>';
    // v15.2: replay straddle Δ if logged
    var _t_sd=t.entry_straddle_delta;
    var _sd_str='';
    if(_t_sd!=null&&_t_sd!==''){
      var _v=parseFloat(_t_sd);
      _sd_str=' \u00B7 \u0394 '+(_v>=0?'+':'')+_v.toFixed(1);
    }
    th+='</div><div class="tt">'+(t.entry_time||'')+' \u2192 '+(t.exit_time||'')+' \u00B7 '+(t.candles_held||0)+'c \u00B7 Peak '+fmt(t.peak_pnl||0)+_sd_str+'</div></div>';
    th+='<div class="tre">'+esc(t.exit_reason||'')+'</div></div>';
  });
}
if(!(trades&&trades.length)){th+='<div style="text-align:center;color:var(--tx3);padding:30px 12px;font-size:12px">\u270b No trades today yet \u2014 watching for entry signals</div>';}
document.getElementById('p-trd').innerHTML=th;
document.getElementById('ts').textContent=d.ts||new Date().toLocaleTimeString('en-IN');
}

function loadFiles(folder){
  fetch('/api/files'+(folder?'?folder='+folder:'')).then(function(r){return r.json()}).then(function(data){
    var h='';
    if(data.folders){
      data.folders.forEach(function(f){
        h+='<div class="ff" onclick="loadFiles(\''+f.key+'\')"><span class="fi2">\uD83D\uDCC1</span><span class="fn">'+esc(f.name)+'</span></div>';
      });
    }else{
      h+='<div class="bk" onclick="loadFiles(\'\')">← Back</div>';
      if(data.files&&data.files.length){
        data.files.forEach(function(f){
          h+='<a class="fi3" href="/api/download/'+f.path+'" target="_blank"><span>'+esc(f.name)+'</span><span class="fsz">'+f.size+'KB</span></a>';
        });
      }else h+='<div style="text-align:center;color:var(--tx3);padding:20px">No files</div>';
    }
    document.getElementById('p-fil').innerHTML=h;
  }).catch(function(){});
}

function go(){
  Promise.all([
    fetch('/api/dashboard').then(function(r){return r.json()}).catch(function(){return null}),
    fetch('/api/trades').then(function(r){return r.json()}).catch(function(){return[]}),
    fetch('/api/zones').then(function(r){return r.json()}).catch(function(){return{}}),
    fetch('/api/multitf').then(function(r){return r.json()}).catch(function(){return{}})
  ]).then(function(a){render(a[0],a[1],a[2],a[3])});
}
loadFiles('');go();setInterval(go,10000);
</script>
</body>
</html>
