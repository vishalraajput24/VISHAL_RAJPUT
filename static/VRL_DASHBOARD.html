<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VISHAL RAJPUT TRADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f0;--bg2:#eeeee8;--white:#ffffff;
  --card:#ffffff;--card-hover:#fafaf8;
  --green:#16a34a;--green-bg:rgba(22,163,74,0.08);--green-border:rgba(22,163,74,0.2);--green-light:#dcfce7;
  --red:#dc2626;--red-bg:rgba(220,38,38,0.06);--red-border:rgba(220,38,38,0.15);--red-light:#fef2f2;
  --orange:#ea580c;--orange-bg:rgba(234,88,12,0.08);--orange-border:rgba(234,88,12,0.2);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,0.06);--blue-border:rgba(37,99,235,0.15);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.06);
  --yellow:#ca8a04;--yellow-bg:rgba(202,138,4,0.08);--yellow-border:rgba(202,138,4,0.2);
  --text:#1a1a1a;--text2:#525252;--text3:#a3a3a3;--text4:#d4d4d4;
  --border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.1);
  --shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.03);
  --shadow-lg:0 4px 16px rgba(0,0,0,0.06),0 8px 32px rgba(0,0,0,0.04);
  --shadow-green:0 4px 16px rgba(22,163,74,0.1);
  --shadow-red:0 4px 16px rgba(220,38,38,0.08);
}
html{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:var(--bg)}
.mono{font-family:'JetBrains Mono',monospace}

.container{max-width:540px;margin:0 auto;padding-bottom:24px}

/* Header */
.header{padding:14px 16px 12px;background:var(--white);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,0.03)}
.logo{display:flex;align-items:baseline;gap:8px}
.logo h1{font-size:16px;font-weight:900;letter-spacing:0.5px;color:var(--text)}
.logo h1 span{color:var(--orange)}
.logo .ver{font-size:10px;color:var(--text3);font-weight:600;background:var(--bg);padding:2px 8px;border-radius:10px}
.tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.3px}
.tag-paper{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.tag-live{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tag-dte{background:var(--bg);color:var(--text2);border:1px solid var(--border2)}
.tag-lock{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.tag-vix{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.tag-bear{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.tag-bull{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tag-regime{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(124,58,237,0.15)}

/* Position Card */
.pos-card{margin:12px;border-radius:16px;padding:18px 20px;background:var(--white);
  border:1px solid var(--border);box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.pos-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.pos-card.profit{border-color:var(--green-border)}.pos-card.profit::before{background:linear-gradient(90deg,var(--green),#22c55e)}
.pos-card.loss{border-color:var(--red-border)}.pos-card.loss::before{background:linear-gradient(90deg,var(--red),#f87171)}
.pos-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pos-symbol{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px;color:var(--text)}
.pos-dot{width:8px;height:8px;border-radius:50%;animation:dotPulse 1.5s infinite}
.pos-dot.green{background:var(--green);box-shadow:0 0 6px rgba(22,163,74,0.4)}
.pos-dot.split{background:var(--orange);box-shadow:0 0 6px rgba(234,88,12,0.4)}
.pos-pnl{font-size:32px;font-weight:900;letter-spacing:-1px}
.pos-pnl.green{color:var(--green)}.pos-pnl.red{color:var(--red)}
.pos-rs{font-size:13px;color:var(--text2);font-weight:600;margin-left:4px}
.pos-entry{font-size:11px;color:var(--text3);font-weight:500}
.pos-lots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.lot-card{padding:10px 12px;border-radius:10px;background:var(--bg);border:1px solid var(--border)}
.lot-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.lot-status{font-size:11px;font-weight:700;margin-top:3px}
.lot-sl{font-size:10px;color:var(--text2);margin-top:2px}
.rsi-bar{margin-top:12px}
.rsi-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600}
.rsi-track{height:8px;border-radius:4px;background:var(--bg2);overflow:hidden}
.rsi-fill{height:100%;border-radius:4px;transition:width 0.8s ease;background:linear-gradient(90deg,var(--blue),var(--green))}
.rsi-fill.hot{background:linear-gradient(90deg,var(--orange),var(--red));animation:heatPulse 1s infinite}
.pos-meta{display:flex;gap:16px;margin-top:10px;font-size:10px;color:var(--text3);font-weight:500}
.pos-meta b{color:var(--text2)}
.floors{margin-top:10px;display:flex;gap:6px}
.floor{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700}
.floor.hit{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.floor.next{background:var(--bg);color:var(--text3);border:1px solid var(--border)}

@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
@keyframes heatPulse{0%,100%{opacity:1}50%{opacity:0.7}}

/* Stats Bar */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px;margin-top:8px}
.stat{background:var(--white);border-radius:14px;padding:14px 10px;text-align:center;
  border:1px solid var(--border);box-shadow:var(--shadow)}
.stat .label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;font-weight:700}
.stat .value{font-size:20px;font-weight:900;margin-top:4px;letter-spacing:-0.5px}
.stat .sub{font-size:9px;color:var(--text3);margin-top:2px;font-weight:500}
.stat .value.green{color:var(--green)}.stat .value.red{color:var(--red)}

/* Tabs */
.tab-bar{display:flex;margin:0 12px;background:var(--white);border-radius:12px;padding:4px;
  border:1px solid var(--border);box-shadow:var(--shadow);position:sticky;top:60px;z-index:40}
.tab{flex:1;padding:10px 0;text-align:center;font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;border-radius:8px;transition:all 0.2s}
.tab:hover{color:var(--text2);background:var(--bg)}
.tab.active{color:var(--orange);background:var(--orange-bg);box-shadow:0 1px 4px rgba(234,88,12,0.1)}
.tab-icon{font-size:11px;margin-right:3px}
.tab-content{display:none;animation:fadeIn 0.3s ease}.tab-content.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Refresh */
.refresh{text-align:center;padding:8px;font-size:9px;color:var(--text3);font-weight:500}
.refresh-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
  margin-right:4px;animation:dotPulse 2s infinite}

/* Signal Cards */
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 12px}
.sig-card{border-radius:14px;overflow:hidden;background:var(--white);border:1px solid var(--border);
  box-shadow:var(--shadow);transition:all 0.3s}
.sig-card.ready{border-color:var(--green-border);box-shadow:var(--shadow-green)}
.sig-card.fired{border-color:var(--green);box-shadow:0 0 0 2px var(--green),var(--shadow-green);animation:firePulse 1s}
.sig-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:center}
.sig-type{font-size:12px;font-weight:800;color:var(--text);letter-spacing:0.3px}
.sig-ltp{font-size:13px;font-weight:700;color:var(--text)}
.sig-row{display:flex;justify-content:space-between;align-items:center;padding:5px 14px}
.sig-k{font-size:10px;color:var(--text3);font-weight:600}
.sig-v{font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.sig-v .ok{color:var(--green)}.sig-v .fail{color:var(--red)}
.ema-bar{margin:2px 14px 6px;height:5px;border-radius:3px;background:var(--bg2);overflow:hidden}
.ema-fill{height:100%;border-radius:3px;transition:width 0.5s}
.ema-fill.high{background:var(--green)}.ema-fill.mid{background:var(--yellow)}.ema-fill.low{background:var(--red)}
.sig-verdict{padding:10px 14px;text-align:center;font-size:11px;font-weight:800;letter-spacing:0.3px;
  border-top:1px solid var(--border);margin-top:4px}
.sig-verdict.ready{color:var(--green);background:var(--green-bg)}
.sig-verdict.wait{color:var(--text3);background:var(--bg)}
.sig-verdict.fired{color:#fff;background:var(--green)}
.sig-verdict.cooldown{color:var(--orange);background:var(--orange-bg)}

@keyframes firePulse{0%{transform:scale(1)}50%{transform:scale(1.01)}100%{transform:scale(1)}}

/* Cooldown */
.cooldown-banner{margin:10px 12px;padding:12px 16px;border-radius:12px;text-align:center;
  background:var(--yellow-bg);border:1px solid var(--yellow-border);
  color:var(--yellow);font-size:12px;font-weight:700}

/* Market */
.mkt-section{margin:8px 12px;border-radius:14px;overflow:hidden;background:var(--white);
  border:1px solid var(--border);box-shadow:var(--shadow)}
.mkt-header{padding:12px 16px;font-size:11px;font-weight:800;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg)}
.mkt-row{display:flex;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border)}
.mkt-row:last-child{border:none}
.mkt-k{font-size:11px;color:var(--text3);font-weight:500}.mkt-v{font-size:12px;font-weight:700}

/* Trades */
.trade-card{margin:6px 12px;padding:14px 16px;border-radius:12px;background:var(--white);
  border:1px solid var(--border);display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow);transition:transform 0.2s}
.trade-card:hover{transform:translateX(2px)}
.trade-card.win{border-left:4px solid var(--green)}
.trade-card.loss{border-left:4px solid var(--red)}
.trade-pnl{font-size:18px;font-weight:900;min-width:75px}
.trade-pnl.green{color:var(--green)}.trade-pnl.red{color:var(--red)}
.trade-info{flex:1}
.trade-sym{font-size:12px;font-weight:700;color:var(--text)}
.trade-detail{font-size:9px;color:var(--text3);margin-top:2px;font-weight:500}
.trade-reason{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;
  background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.trade-summary{margin:10px 12px;padding:16px;border-radius:14px;background:var(--white);
  border:1px solid var(--border);box-shadow:var(--shadow);text-align:center}

/* Files */
.file-folder{margin:6px 12px;padding:14px 16px;border-radius:12px;background:var(--white);
  border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);transition:all 0.2s}
.file-folder:hover{border-color:var(--orange-border);transform:translateX(2px);box-shadow:var(--shadow-lg)}
.file-icon{font-size:18px}.file-name{font-size:13px;font-weight:600;flex:1;color:var(--text)}
.file-count{font-size:10px;color:var(--text3);font-weight:500}
.file-item{margin:4px 12px 4px 24px;padding:10px 14px;border-radius:10px;background:var(--white);
  border:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;
  cursor:pointer;transition:all 0.2s;text-decoration:none;color:var(--text)}
.file-item:hover{background:var(--orange-bg);border-color:var(--orange-border)}
.file-size{color:var(--text3);font-size:10px;font-weight:500}
.back-btn{margin:10px 12px;padding:10px 16px;border-radius:10px;background:var(--white);
  border:1px solid var(--border);color:var(--orange);font-size:12px;font-weight:700;
  cursor:pointer;display:inline-block;transition:all 0.2s;box-shadow:var(--shadow)}
.back-btn:hover{background:var(--orange-bg)}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.4}
.empty-text{font-size:13px;font-weight:600}
.empty-sub{font-size:11px;margin-top:6px;opacity:0.6}

/* Footer */
.footer{text-align:center;padding:16px;font-size:9px;color:var(--text4);font-weight:500;margin-top:12px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <h1><span>VISHAL RAJPUT</span> TRADE</h1>
      <span class="ver mono" id="ver">v13.0</span>
    </div>
    <div class="tags" id="tags"></div>
  </div>

  <div id="pos-area"></div>

  <div class="stats">
    <div class="stat"><div class="label">Day P&L</div><div class="value mono" id="st-pnl">—</div><div class="sub mono" id="st-rs"></div></div>
    <div class="stat"><div class="label">Trades</div><div class="value mono" id="st-trades">0</div><div class="sub" id="st-wl"></div></div>
    <div class="stat"><div class="label">Status</div><div class="value" id="st-status">⚡</div><div class="sub" id="st-status-text">Loading</div></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-tab="sig" onclick="switchTab('sig')"><span class="tab-icon">⚡</span>SIGNALS</div>
    <div class="tab" data-tab="mkt" onclick="switchTab('mkt')"><span class="tab-icon">📊</span>MARKET</div>
    <div class="tab" data-tab="trd" onclick="switchTab('trd')"><span class="tab-icon">📦</span>TRADES</div>
    <div class="tab" data-tab="fil" onclick="switchTab('fil')"><span class="tab-icon">📁</span>FILES</div>
  </div>

  <div class="refresh"><span class="refresh-dot"></span>Auto-refresh 10s · <span class="mono" id="ts"></span></div>

  <div class="tab-content show" id="p-sig"></div>
  <div class="tab-content" id="p-mkt"></div>
  <div class="tab-content" id="p-trd"></div>
  <div class="tab-content" id="p-fil"></div>

  <div class="footer">VISHAL RAJPUT TRADE · Powered by data, driven by discipline</div>
</div>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function fmt(n){return n>=0?'+'+n.toFixed(1):n.toFixed(1)}
function rs(pts){return '₹'+(pts*65).toLocaleString('en-IN',{maximumFractionDigits:0})}

var currentTab='sig',currentFolder='';

function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(el){el.classList.toggle('active',el.dataset.tab===t)});
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('show')});
  document.getElementById('p-'+t).classList.add('show');
  if(t==='fil'&&!currentFolder)loadFiles();
}

function render(d,trades,zones,mtf){
  if(!d||!d.market){
    var wm='<div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-text">Waiting for bot data...</div><div class="empty-sub">Bot writes data during market hours (9:15–15:30 IST)</div></div>';
    ['p-sig','p-mkt','p-trd'].forEach(function(id){document.getElementById(id).innerHTML=wm});
    document.getElementById('pos-area').innerHTML='';return;
  }

  var mk=d.market||{},ce=d.ce||{},pe=d.pe||{},pos=d.position||{},td=d.today||{},str=d.straddle||{},cd=d.cooldown||{};

  document.getElementById('ver').textContent=d.version||'v13.0';
  document.getElementById('ts').textContent=(d.ts||'').slice(11)||'';

  // Tags
  var mCls=d.mode==='LIVE'?'tag-live':'tag-paper';
  var bCls=mk.bias==='BEAR'?'tag-bear':mk.bias==='BULL'?'tag-bull':'tag-dte';
  var tg='<span class="tag '+mCls+'">'+esc(d.mode)+'</span>';
  tg+='<span class="tag tag-dte">DTE '+mk.dte+'</span>';
  if(mk.locked_ce)tg+='<span class="tag tag-lock">CE '+mk.locked_ce+' · PE '+mk.locked_pe+' 🔒</span>';
  tg+='<span class="tag tag-vix">VIX '+mk.vix+'</span>';
  if(mk.bias)tg+='<span class="tag '+bCls+'">'+mk.bias+'</span>';
  if(mk.regime)tg+='<span class="tag tag-regime">'+mk.regime+'</span>';
  document.getElementById('tags').innerHTML=tg;

  // Position
  var pa='';
  if(pos.in_trade){
    var pnl=pos.pnl||0,pcls=pnl>=0?'profit':'loss',pcol=pnl>=0?'green':'red';
    var dotCls=pos.lots_split?'split':'green';
    var sym=(pos.direction||'')+' '+(pos.strike||mk.locked_ce||'');
    var stxt=pos.lots_split?(pos.lot1_active?'⚡ SPLIT':'🏃 LOT2 RIDING'):'🟢 IN TRADE';
    pa='<div class="pos-card '+pcls+'">';
    pa+='<div class="pos-header"><div class="pos-symbol"><span class="pos-dot '+dotCls+'"></span>'+stxt+' — '+esc(sym)+'</div>';
    pa+='<div class="pos-entry mono">₹'+pos.entry+' → ₹'+pos.ltp+'</div></div>';
    pa+='<div><span class="pos-pnl mono '+pcol+'">'+fmt(pnl)+'pts</span><span class="pos-rs mono">'+rs(pnl)+'</span></div>';
    // Single SL card — v13.3 both lots same path
    var _sl=pos.current_floor||pos.sl||0;
    var _gb=pos.current_giveback||8;
    var _pk=pos.peak||0;
    var _slLab='HARD SL';
    if(_pk>=10){var _lk=Math.round(_pk-_gb);_slLab='TRAIL +'+_lk+' ('+_gb+'pt give)';}
    var _slBorder=_pk>=10?'var(--green)':'var(--text3)';
    pa+='<div class="pos-lots"><div class="lot-card" style="border-left:3px solid '+_slBorder+';flex:1">';
    pa+='<div class="lot-label">2 LOTS · 130 qty</div>';
    pa+='<div class="lot-status" style="color:var(--green)">Both Active 🟢</div>';
    pa+='<div class="lot-sl mono" style="margin-top:4px">SL ₹'+_sl+'</div>';
    pa+='<div class="lot-sl mono" style="font-size:10px;color:var(--text3)">'+_slLab+'</div>';
    pa+='</div></div>';
    var rv=pos.current_rsi||pos.rsi||0,rp=Math.min(Math.max((rv/80)*100,0),100);
    var rsiClr=rv>=70?'var(--red)':rv>=60?'var(--yellow)':'var(--green)';
    pa+='<div class="rsi-bar"><div class="rsi-label"><span>RSI '+rv+(pos.lots_split?' ⚡':'')+'</span><span>'+Math.round(rp)+'%</span></div>';
    pa+='<div class="rsi-track"><div class="rsi-fill '+(rv>=70?'hot':'')+'" style="width:'+rp+'%;background:'+rsiClr+'"></div></div></div>';
    var pk=pos.peak||0;
    pa+='<div class="floors">';
    pa+='<div class="floor '+(pk>=10?'hit':'next')+'">+10'+(pk>=10?' ✅':'')+'</div>';
    pa+='<div class="floor '+(pk>=20?'hit':'next')+'">+20'+(pk>=20?' ✅':'')+'</div>';
    pa+='<div class="floor '+(pk>=30?'hit':'next')+'">+30'+(pk>=30?' ✅':'')+'</div></div>';
    pa+='<div class="pos-meta"><span>Peak: <b>'+fmt(pk)+'</b></span><span>Candles: <b>'+(pos.candles||0)+'</b></span></div>';
    // Fib + VWAP context for traded direction
    var ts=pos.direction==='CE'?ce:pe;
    if(ts&&(ts.vwap||ts.fib_nearest)){
      pa+='<div style="padding:6px 14px;font-size:10px;color:var(--text3);border-top:1px solid var(--border)">';
      if(ts.vwap){var _vc=ts.above_vwap?'var(--green)':'var(--red)';pa+='<span style="color:'+_vc+'">VWAP '+(ts.above_vwap?'✅':'✗')+'</span> ';}
      if(ts.fib_nearest){pa+='<span style="color:var(--orange)">Fib '+ts.fib_nearest+' '+(ts.fib_distance>0?'+':'')+ts.fib_distance+'pts</span> ';}
      if(ts.vol_spike){pa+='<span style="color:var(--orange)">Vol '+ts.vol_ratio+'x 🔥</span>';}
      pa+='</div>';
    }
    pa+='</div>';
  }
  document.getElementById('pos-area').innerHTML=pa;

  // Stats
  var dp=td.pnl||0,dc=dp>=0?'green':'red';
  document.getElementById('st-pnl').className='value mono '+dc;
  document.getElementById('st-pnl').textContent=fmt(dp)+'pts';
  document.getElementById('st-rs').textContent=rs(dp);
  document.getElementById('st-trades').textContent=td.trades||0;
  var wr=td.trades>0?Math.round((td.wins||0)/td.trades*100):0;
  document.getElementById('st-wl').textContent=(td.wins||0)+'W '+(td.losses||0)+'L · '+wr+'%';
  document.getElementById('st-status').textContent=pos.in_trade?'🟢':'⚡';
  document.getElementById('st-status-text').textContent=pos.in_trade?'IN TRADE':'SCANNING';

  // Signals
  var sh='';
  if(cd&&cd.remaining>0)sh+='<div class="cooldown-banner">⏳ COOLDOWN '+Math.ceil(cd.remaining)+'min — '+(cd.direction||'')+' blocked</div>';
  sh+='<div class="sig-grid">';
  [['CE',ce],['PE',pe]].forEach(function(p){
    var t=p[0],s=p[1],sk=s.strike||mk['locked_'+t.toLowerCase()]||mk.atm||'';
    var eg=s.ema_gap||0,rv=s.rsi||0,eo=s.ema_ok,ro=s.rsi_ok,fi=s.fired;
    var cc=fi?'fired':(eo&&ro?'ready':''),vc=fi?'fired':(eo&&ro?'ready':'wait');
    if(cd&&cd.remaining>0&&cd.direction===t)vc='cooldown';
    var ebw=Math.min(Math.abs(eg)/10*100,100),ebc=eg>=3?'high':(eg>=1.5?'mid':'low');
    sh+='<div class="sig-card '+cc+'">';
    sh+='<div class="sig-header"><span class="sig-type">'+t+' '+sk+'</span><span class="sig-ltp mono">₹'+(s.ltp||0)+'</span></div>';
    sh+='<div class="ema-bar"><div class="ema-fill '+ebc+'" style="width:'+ebw+'%"></div></div>';
    sh+='<div class="sig-row"><span class="sig-k">EMA GAP</span><span class="sig-v '+(eo?'ok':'fail')+' mono">'+eg.toFixed(1)+' '+(eo?'✅':'❌')+'</span></div>';
    sh+='<div class="sig-row"><span class="sig-k">RSI</span><span class="sig-v '+(ro?'ok':'fail')+' mono">'+rv.toFixed(1)+' '+(ro?'↑ ✅':'❌')+'</span></div>';
    sh+='<div class="sig-row"><span class="sig-k">CANDLE</span><span class="sig-v '+(s.candle_green?'ok':'fail')+'">'+(s.candle_green?'GREEN ✅':'RED ❌')+'</span></div>';
    sh+='<div class="sig-row"><span class="sig-k">GAP TREND</span><span class="sig-v '+(s.gap_widening?'ok':'fail')+'">'+(s.gap_widening?'GROWING ✅':'SHRINK ❌')+'</span></div>';
    // Bonus indicators
    if(s.vwap||s.fib_nearest||s.vol_ratio){
      sh+='<div style="border-top:1px solid var(--border);padding:6px 14px;font-size:10px;color:var(--text3)">';
      if(s.vwap){var vc2=s.above_vwap?'var(--green)':'var(--red)';sh+='<div style="display:flex;justify-content:space-between;margin:2px 0"><span>VWAP ₹'+s.vwap+'</span><span style="color:'+vc2+'">'+(s.above_vwap?'ABOVE ✅':'BELOW ✗')+' ('+(s.vwap_dist>0?'+':'')+s.vwap_dist+')</span></div>';}
      if(s.fib_pivot){
        // Find nearest resistance above and support below
        var _ltp=s.ltp||0,_resN='',_resP=0,_supN='',_supP=0;
        var _rlvls=[['R3',s.fib_R3],['R2',s.fib_R2],['R1',s.fib_R1],['P',s.fib_pivot]];
        var _slvls=[['P',s.fib_pivot],['S1',s.fib_S1],['S2',s.fib_S2],['S3',s.fib_S3]];
        for(var _i=_rlvls.length-1;_i>=0;_i--){if(_rlvls[_i][1]>_ltp){_resN=_rlvls[_i][0];_resP=_rlvls[_i][1];break;}}
        for(var _j=0;_j<_slvls.length;_j++){if(_slvls[_j][1]<_ltp){_supN=_slvls[_j][0];_supP=_slvls[_j][1];break;}}
        var _fibLine='Fib: ';
        if(_resN)_fibLine+='<span style="color:var(--red)">↑'+_resN+' ₹'+_resP+' (+'+((_resP-_ltp).toFixed(0))+')</span>';
        if(_resN&&_supN)_fibLine+=' · ';
        if(_supN)_fibLine+='<span style="color:var(--green)">↓'+_supN+' ₹'+_supP+' ('+((_supP-_ltp).toFixed(0))+')</span>';
        if(!_resN&&!_supN)_fibLine+='No prev day data';
        sh+='<div style="margin:2px 0">'+_fibLine+'</div>';
      }else if(s.fib_nearest){
        sh+='<div style="margin:2px 0">Fib: <span style="color:var(--orange)">'+s.fib_nearest+' '+(s.fib_distance>0?'+':'')+s.fib_distance+'pts</span></div>';
      }else{
        sh+='<div style="margin:2px 0;color:var(--text3)">Fib: No prev day data</div>';
      }
      var vr=s.vol_ratio||0;if(vr>0){sh+='<div style="display:flex;justify-content:space-between;margin:2px 0"><span>Vol</span><span style="color:'+(s.vol_spike?'var(--orange)':'var(--text3)')+'">'+vr+'x'+(s.vol_spike?' 🔥':'')+'</span></div>';}
      if(s.prev_high){sh+='<div style="display:flex;justify-content:space-between;margin:2px 0"><span>PDH/L</span><span>'+(s.pdh_break?'<span style="color:var(--green)">PDH ↑</span>':s.pdl_break?'<span style="color:var(--red)">PDL ↓</span>':'—')+'</span></div>';}
      sh+='</div>';
    }
    // Show path status
    var mp=s.momentum_pts||0;
    if(s.path_a||s.path_b||mp>5){
      sh+='<div style="display:flex;justify-content:space-around;padding:4px 14px;font-size:9px;border-top:1px solid var(--border)">';
      sh+='<span style="color:'+(s.path_a?'var(--green)':'var(--text3)')+'">EMA '+(s.path_a?'✅':'❌')+'</span>';
      var sr=s.spike_ratio||0,sq=sr>0.6?'spike ⚡':'steady',mt=s.momentum_threshold||15;
      sh+='<span style="color:'+(s.path_b?'var(--green)':'var(--text3)')+'">MOM '+(s.path_b?'✅ +'+mp+'pts ('+sq+')':'❌ +'+mp+'/'+mt+'pts')+'</span>';
      sh+='</div>';
    }
    sh+='<div class="sig-verdict '+vc+'">'+esc(s.verdict||'NO DATA')+'</div></div>';
  });
  sh+='</div>';
  document.getElementById('p-sig').innerHTML=sh;

  // Market
  var mh='<div class="mkt-section"><div class="mkt-header">📈 Spot</div>';
  var sc=mk.spot_ema9>mk.spot_ema21?'color:var(--green)':'color:var(--red)';
  mh+='<div class="mkt-row"><span class="mkt-k">Price</span><span class="mkt-v mono">'+mk.spot+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">EMA9</span><span class="mkt-v mono" style="'+sc+'">'+Number(mk.spot_ema9||0).toFixed(1)+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">EMA21</span><span class="mkt-v mono">'+Number(mk.spot_ema21||0).toFixed(1)+'</span></div>';
  var spc=mk.spot_spread>0?'color:var(--green)':'color:var(--red)';
  mh+='<div class="mkt-row"><span class="mkt-k">Spread</span><span class="mkt-v mono" style="'+spc+'">'+Number(mk.spot_spread||0).toFixed(1)+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">RSI 3m</span><span class="mkt-v mono">'+Number(mk.spot_rsi||0).toFixed(1)+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">H.RSI</span><span class="mkt-v mono">'+mk.hourly_rsi+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">Gap</span><span class="mkt-v mono" style="'+(mk.gap>0?'color:var(--green)':'color:var(--red)')+'">'+mk.gap+'pts</span></div></div>';
  if(mtf&&mtf.spot&&mtf.spot.length){
    mh+='<div class="mkt-section"><div class="mkt-header">📊 Spot Multi-TF</div>';
    mtf.spot.forEach(function(r){
      mh+='<div class="mkt-row"><span class="mkt-k">'+r.tf+'</span><span class="mkt-v mono">ADX '+Number(r.adx||0).toFixed(0)+' · RSI '+Number(r.rsi||0).toFixed(0)+' · Spr '+Number(r.spread||0).toFixed(0)+'</span></div>';
    });mh+='</div>';
  }
  if(mk.fib_nearest){
    mh+='<div class="mkt-section"><div class="mkt-header">📐 Fib Pivots</div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Nearest</span><span class="mkt-v mono">'+mk.fib_nearest+' ('+mk.fib_distance+'pts)</span></div></div>';
  }
  // Option Fib + VWAP for CE and PE
  [['CE',ce],['PE',pe]].forEach(function(p){
    var t=p[0],s=p[1];
    if(s.fib_pivot||s.vwap){
      mh+='<div class="mkt-section"><div class="mkt-header">'+(t==='CE'?'🟢':'🔴')+' '+t+' '+(s.strike||'')+' — Fib + VWAP</div>';
      if(s.vwap){var vc3=s.above_vwap?'color:var(--green)':'color:var(--red)';mh+='<div class="mkt-row"><span class="mkt-k">VWAP</span><span class="mkt-v mono" style="'+vc3+'">₹'+s.vwap+' ('+(s.above_vwap?'above':'below')+' '+(s.vwap_dist>0?'+':'')+s.vwap_dist+')</span></div>';}
      if(s.fib_pivot){
        var ltp=s.ltp||0;
        var lvls=[['R3',s.fib_R3],['R2',s.fib_R2],['R1',s.fib_R1],['P',s.fib_pivot],['S1',s.fib_S1],['S2',s.fib_S2],['S3',s.fib_S3]];
        lvls.forEach(function(l){
          var nm=l[0],pr=l[1];if(!pr)return;
          var dist=ltp-pr,near=s.fib_nearest===nm;
          var lc=nm.charAt(0)==='R'?'#ef4444':nm.charAt(0)==='S'?'#22c55e':'#f59e0b';
          mh+='<div class="mkt-row" style="'+(near?'background:var(--orange-bg);font-weight:700':'')+'"><span class="mkt-k" style="color:'+lc+'">'+nm+(near?' ◄':'')+'</span><span class="mkt-v mono">₹'+pr.toFixed(1)+' <span style="color:var(--text3);font-size:9px">'+(dist>0?'+':'')+dist.toFixed(0)+'pts</span></span></div>';
        });
        mh+='<div class="mkt-row" style="background:var(--card-hover);font-weight:700"><span class="mkt-k" style="color:var(--primary)">LTP</span><span class="mkt-v mono">₹'+ltp+'</span></div>';
      }
      if(s.prev_high){mh+='<div class="mkt-row"><span class="mkt-k">PDH/PDL</span><span class="mkt-v mono">H ₹'+s.prev_high+' L ₹'+s.prev_low+(s.pdh_break?' ↑BREAK':'')+'</span></div>';}
      if(s.vol_ratio){mh+='<div class="mkt-row"><span class="mkt-k">Volume</span><span class="mkt-v mono">'+(s.vol_ratio||0)+'x avg'+(s.vol_spike?' 🔥':'')+'</span></div>';}
      mh+='</div>';
    }
  });
  if(str&&str.open_price){
    var dcy=str.decay_pct||0;
    mh+='<div class="mkt-section"><div class="mkt-header">📉 Straddle</div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Open</span><span class="mkt-v mono">₹'+str.open_price+'</span></div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Now</span><span class="mkt-v mono">₹'+(str.current||0)+'</span></div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Decay</span><span class="mkt-v mono" style="'+(dcy<-3?'color:var(--green)':'color:var(--red)')+'">'+dcy.toFixed(1)+'%</span></div></div>';
  }
  document.getElementById('p-mkt').innerHTML=mh;

  // Trades
  var th='';
  if(trades&&trades.length){
    var tw=0,tl=0,tp=0;trades.forEach(function(t){var p=parseFloat(t.pnl_pts||0);if(p>0)tw++;else tl++;tp+=p;});
    th+='<div class="trade-summary"><div style="font-size:22px;font-weight:900;color:'+(tp>=0?'var(--green)':'var(--red)')+'" class="mono">'+fmt(tp)+'pts</div>';
    th+='<div style="font-size:12px;color:var(--text2);margin-top:3px;font-weight:600">'+rs(tp)+' · '+tw+'W '+tl+'L</div></div>';
    trades.slice().reverse().forEach(function(t){
      var p=parseFloat(t.pnl_pts||0),c=p>0?'win':'loss',pc=p>0?'green':'red';
      th+='<div class="trade-card '+c+'"><div class="trade-pnl mono '+pc+'">'+fmt(p)+'</div>';
      var lotTag=t.lot_id&&t.lot_id!=='ALL'?' <span style="font-size:9px;color:var(--text3);font-weight:400">'+t.lot_id+'</span>':'';
      th+='<div class="trade-info"><div class="trade-sym">'+(t.direction||'')+' '+(t.strike||'')+lotTag+'</div>';
      th+='<div class="trade-detail">'+esc(t.entry_time||'').slice(-8)+' → '+esc(t.exit_time||'')+' · ₹'+t.entry_price+' → ₹'+t.exit_price+'</div></div>';
      th+='<span class="trade-reason">'+esc(t.exit_reason||'')+'</span></div>';
    });
  }else{
    th='<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No trades today</div><div class="empty-sub">Entries fire when EMA gap ≥3 + RSI ≥50 rising</div></div>';
  }
  document.getElementById('p-trd').innerHTML=th;
}

function loadFiles(folder){
  currentFolder=folder||'';
  fetch(folder?'/api/files?folder='+folder:'/api/files').then(function(r){return r.json()}).then(function(data){
    var h='';
    if(data.folders){
      data.folders.forEach(function(f){
        h+='<div class="file-folder" onclick="loadFiles(\''+f.key+'\')"><span class="file-icon">📁</span><span class="file-name">'+esc(f.name)+'</span></div>';
      });
    }else{
      h+='<div class="back-btn" onclick="loadFiles()">← Back</div>';
      if(data.files&&data.files.length){
        data.files.forEach(function(f){
          h+='<a class="file-item" href="/api/download?path='+encodeURIComponent(f.path)+'" target="_blank">';
          h+='<span>'+esc(f.name)+'</span><span class="file-size">'+f.size+'KB</span></a>';
        });
      }else h+='<div class="empty-state"><div class="empty-text">Empty</div></div>';
    }
    document.getElementById('p-fil').innerHTML=h;
  }).catch(function(){});
}

function refresh(){
  Promise.all([
    fetch('/api/dashboard').then(function(r){return r.json()}).catch(function(){return null}),
    fetch('/api/trades').then(function(r){return r.json()}).catch(function(){return[]}),
    fetch('/api/zones').then(function(r){return r.json()}).catch(function(){return{}}),
    fetch('/api/multitf').then(function(r){return r.json()}).catch(function(){return{}})
  ]).then(function(a){render(a[0],a[1],a[2],a[3])});
}

loadFiles();refresh();setInterval(refresh,10000);
</script>
</body>
</html>
