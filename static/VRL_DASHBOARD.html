<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VISHAL RAJPUT TRADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#faf8f4;--bg2:#f3f0ea;--bg3:#ede9e0;--white:#fff;--card:#fff;
--gn:#10b981;--gn2:#059669;--gn-bg:#ecfdf5;--gn-bd:#a7f3d0;
--rd:#ef4444;--rd2:#dc2626;--rd-bg:#fef2f2;--rd-bd:#fecaca;
--or:#f97316;--or2:#ea580c;--or-bg:#fff7ed;--or-bd:#fed7aa;
--bl:#3b82f6;--bl-bg:#eff6ff;--bl-bd:#bfdbfe;
--pu:#8b5cf6;--pu-bg:#f5f3ff;--yl:#f59e0b;--yl-bg:#fffbeb;
--tx:#1a1a2e;--tx2:#4a4a6a;--tx3:#8888a0;--tx4:#b0b0c0;
--bd:rgba(0,0,0,0.06);--bd2:rgba(0,0,0,0.1);
--sh:0 1px 3px rgba(0,0,0,0.04),0 6px 16px rgba(0,0,0,0.04);
--sh-lg:0 4px 20px rgba(0,0,0,0.06),0 12px 40px rgba(0,0,0,0.04);
--sh-gn:0 4px 20px rgba(16,185,129,0.15);--sh-rd:0 4px 20px rgba(239,68,68,0.12);
--sh-or:0 4px 20px rgba(249,115,22,0.15);
--or-grad:linear-gradient(135deg,#f97316,#fb923c);
--bl-grad:linear-gradient(135deg,#3b82f6,#60a5fa);
}
html{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:linear-gradient(180deg,var(--bg),var(--bg2))}
.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:540px;margin:0 auto;padding-bottom:60px}

.header{padding:16px 16px 14px;background:var(--white);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,0.03)}
.logo{display:flex;align-items:center;justify-content:space-between}
.logo-left{display:flex;align-items:baseline;gap:8px}
.logo h1{font-size:16px;font-weight:900;letter-spacing:0.5px}
.logo h1 span{background:var(--or-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ver{font-size:9px;color:#fff;font-weight:800;background:var(--or-grad);padding:3px 12px;border-radius:20px;box-shadow:var(--sh-or)}
.ldot{width:10px;height:10px;border-radius:50%;background:var(--gn);animation:lp 2s infinite;box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
@keyframes lp{0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,0.15)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0.08)}}
@keyframes wmpulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes wmtag{0%,100%{opacity:1}50%{opacity:0.55}}
.tags{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.tag{padding:4px 12px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.3px}
.tp{background:var(--bl-bg);color:var(--bl);border:1px solid var(--bl-bd)}
.tl{background:var(--gn-bg);color:var(--gn2);border:1px solid var(--gn-bd)}
.td{background:var(--bg2);color:var(--tx2);border:1px solid var(--bd2)}
.tk{background:var(--or-bg);color:var(--or2);border:1px solid var(--or-bd)}
.tv{color:var(--yl);background:var(--yl-bg);border:1px solid rgba(245,158,11,0.3)}
.tbull{color:var(--gn2);background:var(--gn-bg);border:1px solid var(--gn-bd)}
.tbear{color:var(--rd2);background:var(--rd-bg);border:1px solid var(--rd-bd)}
.tpu{color:var(--pu);background:var(--pu-bg);border:1px solid rgba(139,92,246,0.2)}
.tw{background:var(--yl-bg);color:#b45309;border:1px solid rgba(245,158,11,0.2);animation:wmtag 2s ease-in-out infinite;title:"Indicators warming up"}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 12px 0}
.stat{background:var(--white);border-radius:18px;padding:16px 12px;text-align:center;border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.stat .la{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.stat .va{font-size:24px;font-weight:900;margin-top:4px;letter-spacing:-0.5px}
.stat .su{font-size:9px;color:var(--tx3);margin-top:2px;font-weight:500}
.va.gn{color:var(--gn)}.va.rd{color:var(--rd)}
.st-up{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:var(--gn-bd);box-shadow:var(--sh-gn)}
.st-dn{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:var(--rd-bd);box-shadow:var(--sh-rd)}

.tbar{display:flex;margin:12px;background:var(--white);border-radius:16px;padding:4px;border:1px solid var(--bd);box-shadow:var(--sh);position:sticky;top:68px;z-index:40}
.tb{flex:1;padding:10px 0;text-align:center;font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:0.3px;cursor:pointer;border-radius:12px;transition:all 0.3s}
.tb:hover{color:var(--tx2);background:var(--bg2)}
.tb.on{color:#fff;background:var(--or-grad);box-shadow:var(--sh-or)}
.tc{display:none;animation:fi 0.4s ease}.tc.show{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.ref{text-align:center;padding:8px;font-size:9px;color:var(--tx3);font-weight:500}
.rd2{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gn);margin-right:4px;animation:lp 2s infinite}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 12px}
.sc{border-radius:18px;overflow:hidden;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh);transition:all 0.3s}
.sc.fired{border-color:var(--gn-bd);box-shadow:0 0 0 3px rgba(16,185,129,0.12),var(--sh-gn)}
.sh2{padding:14px 14px 8px;display:flex;justify-content:space-between;align-items:center}
.st2{font-size:14px;font-weight:900;letter-spacing:0.3px}.sl2{font-size:14px;font-weight:700}

.ms{margin:6px 12px 8px;padding:12px;border-radius:14px;background:var(--bg);border:1px solid var(--bd)}
.mt2{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;font-weight:800;margin-bottom:8px}
.mr{display:flex;align-items:center;margin:5px 0;font-size:10px}
.ml{min-width:56px;font-weight:700}.ml.f{color:var(--or2)}.ml.c{color:var(--bl)}.ml.e{color:var(--tx4)}
.mb{flex:1;margin:0 8px;height:6px;border-radius:3px;background:var(--bg2);overflow:hidden}
.mf{height:100%;border-radius:3px;transition:width 0.6s}
.mf.or{background:var(--or-grad)}.mf.bl{background:var(--bl-grad)}.mf.gy{background:var(--tx4)}.mf.re{background:linear-gradient(90deg,var(--rd),#f87171)}
.mv{min-width:34px;text-align:right;font-weight:700;font-size:9px}

.sr{display:flex;justify-content:space-between;align-items:center;padding:5px 14px;font-size:11px}
.sk{color:var(--tx3);font-weight:600}.sv{font-weight:700;display:flex;align-items:center;gap:4px}
.ok{color:var(--gn2)}.fl{color:var(--rd)}

.db{margin:6px 12px 8px;padding:10px;border-radius:12px;font-size:10px;font-weight:700;text-align:center}
.dok{background:var(--gn-bg);color:var(--gn2);border:1.5px solid var(--gn-bd)}
.dbd{background:var(--rd-bg);color:var(--rd2);border:1.5px solid var(--rd-bd)}

.vd{padding:12px 14px;text-align:center;font-size:11px;font-weight:800;letter-spacing:0.5px;border-top:1px solid var(--bd);margin-top:4px}
.vf{color:#fff;background:linear-gradient(135deg,var(--gn),var(--gn2))}.vr{color:var(--gn2);background:var(--gn-bg)}
.vw{color:var(--tx3);background:var(--bg2)}.vc{color:var(--or2);background:var(--or-bg)}

.pos{margin:12px;border-radius:20px;padding:20px;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh-lg);position:relative;overflow:hidden}
.pos::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0}
.pos.profit{border-color:var(--gn-bd)}.pos.profit::before{background:linear-gradient(90deg,var(--gn),#34d399,var(--gn))}
.pos.loss{border-color:var(--rd-bd)}.pos.loss::before{background:linear-gradient(90deg,var(--rd),#f87171,var(--rd))}
.ph{display:flex;justify-content:space-between;align-items:center;margin:4px 0 4px}
.ps{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
.pd{width:10px;height:10px;border-radius:50%;animation:lp 2s infinite}
.pd.g{background:var(--gn)}.pd.s{background:var(--or)}
.bg{font-size:8px;padding:4px 10px;border-radius:20px;font-weight:800;letter-spacing:0.5px;color:#fff}
.bg.bf{background:var(--or-grad);box-shadow:var(--sh-or)}.bg.bc{background:var(--bl-grad);box-shadow:0 4px 12px rgba(59,130,246,0.2)}
.pp{font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1}.pp.gn{color:var(--gn)}.pp.rd{color:var(--rd)}
.pr{font-size:15px;color:var(--tx2);font-weight:700;margin-top:2px}
.pe{font-size:11px;color:var(--tx3);margin-top:6px}
.pl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.lt{padding:14px;border-radius:14px;background:var(--bg);border:1px solid var(--bd)}
.ll{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px}
.lv{font-size:12px;font-weight:700;margin-top:4px}
.ls{font-size:10px;color:var(--tx2);margin-top:3px;font-weight:600}

.rb{margin-top:16px}.rl{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-bottom:5px;font-weight:600}
.rt{height:10px;border-radius:5px;background:var(--bg2);overflow:hidden;position:relative}
.rf{height:100%;border-radius:5px;transition:width 0.8s}
.rm{position:absolute;top:-1px;bottom:-1px;width:3px;background:var(--or);border-radius:2px;box-shadow:0 0 6px rgba(249,115,22,0.4)}

.fls{display:flex;gap:0;margin-top:16px;align-items:center;padding:0 8px}
.fd{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
.fd.h{background:var(--gn-bg);border:2px solid var(--gn);color:var(--gn2);box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.fd.n{background:var(--bg2);border:2px solid var(--bd2);color:var(--tx4)}
.fln{flex:1;height:3px;border-radius:2px;background:var(--bg2)}.fln.h{background:linear-gradient(90deg,var(--gn),var(--gn-bd))}
.pm{display:flex;gap:16px;margin-top:14px;font-size:10px;color:var(--tx3)}.pm b{color:var(--tx2);font-weight:700}

.sum{margin:10px 12px;padding:20px;border-radius:20px;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh);text-align:center;position:relative;overflow:hidden}
.sum::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sum.up::before{background:linear-gradient(90deg,transparent,var(--gn),transparent)}
.sum.dn::before{background:linear-gradient(90deg,transparent,var(--rd),transparent)}

.tr{margin:6px 12px;padding:14px 16px;border-radius:16px;background:var(--white);border:1px solid var(--bd);display:flex;align-items:center;gap:14px;box-shadow:var(--sh)}
.tr.w{border-left:4px solid var(--gn)}.tr.l{border-left:4px solid var(--rd)}
.tp2{font-size:22px;font-weight:900;min-width:72px;letter-spacing:-0.5px}.tp2.gn{color:var(--gn)}.tp2.rd{color:var(--rd)}
.ti{flex:1}.tn{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.tt{font-size:9px;color:var(--tx3);margin-top:3px}.tre{font-size:8px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--bg);color:var(--tx2);border:1px solid var(--bd)}

.ms2{margin:8px 12px;border-radius:18px;overflow:hidden;background:var(--white);border:1px solid var(--bd);box-shadow:var(--sh)}
.mh{padding:14px 16px;font-size:10px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bd);background:var(--bg)}
.mw{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd)}
.mw:last-child{border:none}.mk2{font-size:11px;color:var(--tx3)}.mv2{font-size:12px;font-weight:700}

.ff{margin:6px 12px;padding:16px 18px;border-radius:16px;background:var(--white);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:var(--sh)}
.fi2{font-size:20px}.fn{font-size:13px;font-weight:700;flex:1}
.fi3{margin:4px 12px;padding:10px 14px;border-radius:10px;background:var(--white);border:1px solid var(--bd);display:flex;justify-content:space-between;font-size:12px;text-decoration:none;color:var(--tx)}
.fi3:active{background:var(--or-bg)}.fsz{color:var(--tx3);font-size:10px}
.bk{margin:8px 12px;padding:10px 16px;border-radius:10px;background:var(--white);border:1px solid var(--bd);color:var(--or);font-size:12px;font-weight:700;cursor:pointer;display:inline-block}

.ft{text-align:center;padding:24px 12px;font-size:9px;color:var(--tx4);letter-spacing:0.5px}

.cb{margin:10px 12px;padding:12px 16px;border-radius:12px;text-align:center;background:var(--yl-bg);border:1px solid rgba(245,158,11,0.3);color:#b45309;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo"><div class="logo-left"><h1><span>VISHAL RAJPUT</span> TRADE</h1><span class="ver" id="ver">v15.2</span></div><div class="ldot"></div></div>
<div class="tags" id="tags"></div>
</div>
<div class="stats" id="stats-area">
<div class="stat" id="st-pnl-card"><div class="la">Day P&L</div><div class="va mono" id="st-pnl">0pts</div><div class="su" id="st-rs">₹0</div></div>
<div class="stat"><div class="la">Trades</div><div class="va mono" id="st-trades">0</div><div class="su" id="st-wl">0W 0L</div></div>
<div class="stat"><div class="la">Status</div><div class="va" id="st-icon">⚡</div><div class="su" id="st-status">SCANNING</div></div>
</div>
<div class="tbar">
<div class="tb on" data-t="sig" onclick="stab(0)">⚡ Signals</div>
<div class="tb" data-t="mkt" onclick="stab(1)">📊 Market</div>
<div class="tb" data-t="trd" onclick="stab(2)">📋 Trades</div>
<div class="tb" data-t="fil" onclick="stab(3)">📁 Files</div>
</div>
<div class="ref"><span class="rd2"></span>Auto-refresh 10s · <span class="mono" style="font-size:9px" id="ts">--:--:--</span></div>
<div id="pos-area"></div>
<div class="tc show" id="p-sig"></div>
<div class="tc" id="p-mkt"></div>
<div class="tc" id="p-trd"></div>
<div class="tc" id="p-fil"></div>
<div class="ft">VISHAL RAJPUT TRADE · Powered by data, driven by discipline</div>
</div>
<script>
function stab(n){document.querySelectorAll('.tb').forEach(function(t,i){t.classList.toggle('on',i===n)});document.querySelectorAll('.tc').forEach(function(t,i){t.classList.toggle('show',i===n)});if(n===3)loadFiles('')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(v){v=parseFloat(v||0);return(v>=0?'+':'')+v.toFixed(1)}
function rs(p){var v=Math.round(parseFloat(p||0)*65*2);return '\u20B9'+(v>=0?'':'-')+Math.abs(v).toLocaleString('en-IN')}
function tagC(b){if(!b)return'td';b=String(b).toUpperCase();if(b.includes('BULL'))return'tbull';if(b.includes('BEAR'))return'tbear';return'td'}
function regC(r){if(!r)return'td';if(r.includes('TREND'))return'tbull';if(r==='NEUTRAL')return'tpu';return'tw'}
function shortSym(sym,dir,strike){if(strike>0)return(dir||'')+ ' '+strike;return sym||''}

function render(d,trades,zones,mtf){
if(!d)return;
var mk=d.market||{},pos=d.position||{},ce=d.signals_ce||d.ce||{},pe=d.signals_pe||d.pe||{},cd=d.cooldown||{},td=d.today||{};

document.getElementById('ver').textContent=d.version||mk.version||'v15.2';
var tg='';
tg+='<span class="tag '+(mk.mode==='live'?'tl':'tp')+'">'+(mk.mode==='live'?'LIVE':'PAPER')+'</span>';
tg+='<span class="tag td">DTE '+(mk.dte||0)+'</span>';
tg+='<span class="tag tk">CE '+(mk.locked_ce||mk.atm||0)+' · PE '+(mk.locked_pe||mk.atm||0)+' 🔒</span>';
if(mk.vix>0)tg+='<span class="tag tv">VIX '+mk.vix+'</span>';
if(mk.bias)tg+='<span class="tag '+tagC(mk.bias)+'">'+esc(mk.bias)+'</span>';
if(mk.regime){tg+='<span class="tag '+regC(mk.regime)+'">'+esc(mk.regime)+'</span>';}
// v15.2 — period indicator (OPENING / MIDDAY / CLOSING)
if(d.period){tg+='<span class="tag tpu">'+esc(d.period)+'</span>';}
if(mk.market_open&&!mk.indicators_warm){var _wtxt='Indicators warming up';if(mk.warmup_progress!=null)_wtxt+=' ('+mk.warmup_progress+'/'+mk.warmup_needed+' candles, ETA '+(mk.warmup_eta||'—')+')';tg+='<span class="tag tw" title="'+_wtxt+'">WARMUP</span>';}
document.getElementById('tags').innerHTML=tg;

// BUG-025: include floating open PNL in day total
var _realized=parseFloat(td.pnl||0);
var _open=pos.in_trade?parseFloat(pos.pnl||0):0;
var dp=_realized+_open,dc=dp>=0?'gn':'rd';
document.getElementById('st-pnl').className='va mono '+dc;
document.getElementById('st-pnl').textContent=fmt(dp)+'pts';
var _rs_sub=rs(dp);
if(pos.in_trade&&_open!==0)_rs_sub+='<br><span style="font-size:8px;color:var(--tx3)">Realized '+fmt(_realized)+' Open '+fmt(_open)+'</span>';
document.getElementById('st-rs').innerHTML=_rs_sub;
document.getElementById('st-pnl-card').className='stat '+(dp>=0?'st-up':'st-dn');
document.getElementById('st-trades').textContent=td.trades||0;
var _w=td.wins||0,_l=td.losses||0,_tc=td.trades||0;
var wlh='';for(var i=0;i<_w;i++)wlh+='<span style="display:inline-block;width:14px;height:6px;border-radius:3px;background:var(--gn);margin:0 1px"></span>';
for(var i=0;i<_l;i++)wlh+='<span style="display:inline-block;width:14px;height:6px;border-radius:3px;background:var(--rd);margin:0 1px"></span>';
if(!_tc)wlh='0W 0L';
document.getElementById('st-wl').innerHTML=wlh||(_w+'W '+_l+'L');
document.getElementById('st-icon').textContent=pos.in_trade?'🟢':'⚡';
document.getElementById('st-status').textContent=pos.in_trade?'IN TRADE':'SCANNING';

// Position card
var pa='';
if(pos.in_trade){
  var sym=shortSym(pos.symbol,pos.direction,pos.strike);
  var pnl=parseFloat(pos.pnl||0),pk=parseFloat(pos.peak||0);
  var entry=parseFloat(pos.entry||0),ltp=parseFloat(pos.ltp||0);
  var rsi=parseFloat(pos.current_rsi||pos.rsi||0);
  var cn=pos.candles||0;
  // v16: both lots always exit together at the same SL
  var prs=Math.round(pnl*65*2),pc=pnl>=0?'profit':'loss',nc=pnl>=0?'gn':'rd';
  var sl=parseFloat(pos.stop||0);
  if(sl<=0)sl=Math.round((entry-12)*100)/100;
  var em=pos.entry_mode||'EMA9_BREAKOUT',bc='bc';
  pa+='<div class="pos '+pc+'">';
  pa+='<div class="ph"><div class="ps"><div class="pd g"></div>'+esc(sym)+' IN TRADE</div>';
  if(em)pa+='<span class="bg '+bc+'">'+esc(em)+'</span>';
  pa+='</div>';
  pa+='<div class="pp mono '+nc+'">'+fmt(pnl)+'<span style="font-size:16px;font-weight:700">pts</span></div>';
  pa+='<div class="pr mono">\u20B9'+prs.toLocaleString('en-IN')+'</div>';
  pa+='<div class="pe">Entry \u20B9'+entry+' \u2192 \u20B9'+ltp+' · '+cn+' candles</div>';
  // v16: two lots, same SL, no split display
  pa+='<div class="pl">';
  pa+='<div class="lt"><div class="ll">Lot 1 · 65 qty</div><div class="lv" style="color:var(--gn)">Active \u25CF</div><div class="ls mono">SL \u20B9'+sl+'</div></div>';
  pa+='<div class="lt"><div class="ll">Lot 2 · 65 qty</div><div class="lv" style="color:var(--gn)">Active \u25CF</div><div class="ls mono">SL \u20B9'+sl+'</div></div>';
  pa+='</div>';
  // v15.2: dynamic EMA9-low trailing stop + BE+2 lock display
  var _cur_el=parseFloat(pos.current_ema9_low||0);
  var _cur_eh=parseFloat(pos.current_ema9_high||0);
  var _dist_stop=_cur_el>0?(ltp-_cur_el):0;
  var _be2_thresh=parseInt(pos.be2_threshold||10);
  var _be2_active=!!pos.be2_active||(pk>=_be2_thresh);
  var _be2_level=parseFloat(pos.be2_level||0)||(entry+2);
  pa+='<div class="rb"><div class="rl"><span>Stop: EMA9-low \u20B9'+_cur_el.toFixed(1)+' ('+(_dist_stop>=0?'+':'')+_dist_stop.toFixed(1)+'pts away)</span><span style="color:var(--rd)">\u20B9'+_cur_eh.toFixed(1)+'\u2191</span></div>';
  var _band_range=Math.max(1,_cur_eh-_cur_el);
  var _price_pct=_cur_el>0?Math.min(100,Math.max(0,((ltp-_cur_el)/_band_range)*100)):50;
  pa+='<div class="rt" style="background:linear-gradient(90deg,var(--rd-bg),var(--gn-bg))"><div class="rf" style="width:'+_price_pct+'%;background:'+(ltp>_cur_eh?'var(--gn)':ltp<_cur_el?'var(--rd)':'var(--yl)')+'"></div></div></div>';
  // BE+2 badge — peak ≥ 10 (v15.2)
  if(_be2_active){
    pa+='<div style="margin-top:8px;padding:6px 12px;border-radius:8px;background:var(--gn-bg);border:1px solid var(--gn-bd);color:var(--gn2);font-size:10px;font-weight:800;text-align:center">\uD83D\uDD12 BE+2 ACTIVE @ \u20B9'+_be2_level.toFixed(1)+' (locks if reverses)</div>';
  }else{
    pa+='<div style="margin-top:8px;padding:6px 12px;border-radius:8px;background:var(--bg2);color:var(--tx3);font-size:9px;text-align:center">BE+2 INACTIVE (peak '+fmt(pk)+', need +'+_be2_thresh+')</div>';
  }
  // v15.2: replay the straddle Δ + VWAP that fired this entry
  var _esd=pos.entry_straddle_delta;
  var _esp=pos.entry_straddle_period||'';
  if(_esd!=null||_esp){
    var _esd_str=(_esd==null)?'n/a':((_esd>=0?'+':'')+parseFloat(_esd).toFixed(1));
    pa+='<div style="margin-top:6px;padding:6px 10px;border-radius:8px;background:var(--bl-bg);border:1px solid var(--bl-bd);color:var(--bl);font-size:9px;text-align:center">Entry straddle Δ '+_esd_str+'pts ['+esc(_esp)+']</div>';
  }
  var _evb=pos.entry_vwap_bonus||'';
  if(_evb){
    var _vwc=_evb==='CONFLUENCE'?'var(--gn2)':'var(--or2)';
    var _vbg=_evb==='CONFLUENCE'?'var(--gn-bg)':'var(--or-bg)';
    pa+='<div style="margin-top:6px;padding:6px 10px;border-radius:8px;background:'+_vbg+';color:'+_vwc+';font-size:9px;text-align:center;font-weight:700">VWAP '+esc(_evb)+'</div>';
  }
  // v15.2.5 velocity indicator — smoothed 3-candle growth rate + sparkline
  var _vel=parseFloat(pos.current_velocity||0);
  var _ph=(pos.peak_history||[]);
  var _vel_clr=_vel>0?'var(--gn2)':(_vel<0?'var(--rd)':'var(--yl)');
  var _vel_lbl=_vel>0?'\u2713':(_vel<0?'stalled':'0 (warning)');
  var _spark='';
  if(_ph.length){
    var _min=Math.min.apply(null,_ph),_max=Math.max.apply(null,_ph),_rng=Math.max(1,_max-_min);
    _ph.forEach(function(p){
      var _h=Math.max(4,Math.round(((p-_min)/_rng)*20)+4);
      _spark+='<span style="display:inline-block;width:8px;height:'+_h+'px;margin:0 1px;background:'+_vel_clr+';vertical-align:bottom;border-radius:1px"></span>';
    });
  }
  pa+='<div style="margin-top:8px;padding:6px 10px;border-radius:8px;background:var(--bg2);font-size:10px;display:flex;justify-content:space-between;align-items:center">'
    + '<span>Velocity: <b style="color:'+_vel_clr+'">'+(_vel>=0?'+':'')+_vel.toFixed(2)+' pts/candle '+_vel_lbl+'</b></span>'
    + '<span style="line-height:24px">'+_spark+'</span>'
    + '</div>';
  pa+='<div class="pm"><span>Peak: <b>'+fmt(pk)+'</b></span><span>Candles: <b>'+cn+'</b></span>'+(em?'<span>Mode: <b>'+em+'</b></span>':'')+'</div>';
  pa+='</div>';
}
document.getElementById('pos-area').innerHTML=pa;

// Signals
var sh='';
if(cd&&cd.remaining>0)sh+='<div class="cb">\u23F3 COOLDOWN '+Math.ceil(cd.remaining)+'min \u2014 '+(cd.direction||'')+' blocked</div>';
sh+='<div class="sg">';
[['CE',ce],['PE',pe]].forEach(function(p){
  var t=p[0],s=p[1],sk=s.strike||mk['locked_'+t.toLowerCase()]||mk.atm||'';
  // BUG-030: WARMUP card during indicator warmup period
  if(s.status==='WARMUP'){
    var _wp=parseInt(s.warmup_progress||0),_wn=parseInt(s.warmup_needed||14);
    var _we=s.warmup_eta||'—';
    var _pct=Math.min(Math.round((_wp/_wn)*100),100);
    sh+='<div class="sc warmup" style="border-color:#fed7aa;box-shadow:0 0 0 3px rgba(249,115,22,0.08)">';
    sh+='<div class="sh2"><span class="st2">'+t+' '+sk+'</span><span class="sl2" style="color:var(--or2);font-size:11px">WARMUP</span></div>';
    sh+='<div style="padding:18px 14px;text-align:center;animation:wmpulse 2s ease-in-out infinite">';
    sh+='<div style="font-size:36px;line-height:1">\u231B</div>';
    sh+='<div style="font-size:12px;font-weight:700;color:var(--tx2);margin-top:8px">Indicator warmup in progress</div>';
    sh+='<div style="font-size:10px;color:var(--tx3);margin-top:4px">Trades blocked until stable</div>';
    sh+='<div style="margin:14px 8px 6px"><div style="height:8px;border-radius:4px;background:var(--bg2);overflow:hidden"><div style="height:100%;background:var(--or-grad);width:'+_pct+'%;transition:width 0.6s"></div></div></div>';
    sh+='<div class="mono" style="font-size:10px;font-weight:700;color:var(--or2)">'+_wp+'/'+_wn+' candles</div>';
    sh+='<div style="font-size:10px;color:var(--tx3);margin-top:4px">Trading resumes '+_we+'</div>';
    sh+='</div></div>';
    return;
  }
  var fi=s.fired,cc=fi?'fired':'';
  // v15.0: Dual EMA9 Band Breakout display
  var _close=parseFloat(s.close||s.ltp||0);
  var _eh=parseFloat(s.ema9_high||0);
  var _el=parseFloat(s.ema9_low||0);
  var _gap=parseFloat(s.gap_from_ema9h||(_close-_eh));
  var _body=parseFloat(s.body_pct||0);
  var _green=s.candle_green;
  var _pos=s.band_position||'';
  var _bodyok=(_body>=30);
  var _width=parseFloat(s.band_width||(_eh-_el));
  var _widthok=(_width>=8);

  // Band position visual
  var _posColor='var(--tx3)',_posLabel='—',_posBg='var(--bg2)';
  if(_pos==='ABOVE'){_posColor='var(--gn2)';_posLabel='ABOVE BAND ✓';_posBg='var(--gn-bg)';}
  else if(_pos==='IN'){_posColor='var(--yl)';_posLabel='IN BAND ⚠';_posBg='var(--yl-bg)';}
  else if(_pos==='BELOW'){_posColor='var(--rd)';_posLabel='BELOW BAND ✗';_posBg='var(--rd-bg)';}

  sh+='<div class="sc '+cc+'">';
  sh+='<div class="sh2"><span class="st2">'+t+' '+sk+'</span><span class="sl2 mono">\u20B9'+(s.ltp||0)+'</span></div>';

  sh+='<div class="ms"><div class="mt2">EMA9 Band</div>';
  sh+='<div class="mr"><span class="ml f" style="color:var(--rd)">EMA9-high</span><span class="mv mono" style="margin-left:auto">\u20B9'+_eh.toFixed(1)+'</span></div>';
  sh+='<div class="mr"><span class="ml c">Close</span><span class="mv mono" style="margin-left:auto;color:'+(_pos==='ABOVE'?'var(--gn2)':'var(--tx2)')+'">\u20B9'+_close.toFixed(1)+' ('+(_gap>=0?'+':'')+_gap.toFixed(1)+')</span></div>';
  sh+='<div class="mr"><span class="ml e" style="color:var(--bl)">EMA9-low</span><span class="mv mono" style="margin-left:auto">\u20B9'+_el.toFixed(1)+'</span></div>';
  sh+='</div>';

  sh+='<div class="sr"><span class="sk">Body</span><span class="sv '+(_bodyok?'ok':'fl')+' mono">'+_body.toFixed(0)+'% '+(_bodyok?'\u2713':'\u2717 (&lt;30%)')+'</span></div>';
  sh+='<div class="sr"><span class="sk">Band width</span><span class="sv mono" style="color:'+(_widthok?'var(--gn2)':'var(--yl)')+';font-weight:800">'+_width.toFixed(1)+'pts '+(_widthok?'\u2713':'\u26A0')+'</span></div>';
  sh+='<div class="sr"><span class="sk">Candle</span><span class="sv '+(_green?'ok':'fl')+'">'+(_green?'GREEN \u2713':'RED \u2717')+'</span></div>';
  sh+='<div class="sr"><span class="sk">Position</span><span class="sv" style="color:'+_posColor+';background:'+_posBg+';padding:2px 10px;border-radius:8px;font-size:9px;font-weight:800">'+_posLabel+'</span></div>';

  // v15.2.5 Fix 5 — Straddle is display only (never blocks). Classification
  // STRONG / NEUTRAL / WEAK / NA with color coding so the operator can
  // eyeball momentum quality per side without threshold math.
  var _sd=s.straddle_delta;
  var _sinfo=(s.straddle_info||'').toString();
  var _spr=s.straddle_period||(d.period||'');
  var _savail=(s.straddle_available!==false);
  if(_sd!=null || _sinfo){
    var _sd_v=(_sd==null)?null:parseFloat(_sd);
    var _label, _bg, _fg;
    if(!_savail || _sd_v==null || _sinfo==='NA'){
      _label='NA'; _bg='var(--or-bg)';  _fg='var(--or2)';
    } else if(_sinfo==='STRONG'){
      _label='STRONG';  _bg='var(--gn-bg)';  _fg='var(--gn2)';
    } else if(_sinfo==='WEAK'){
      _label='WEAK';    _bg='var(--yl-bg)';  _fg='#b45309';
    } else {
      _label='NEUTRAL'; _bg='var(--bg2)';    _fg='var(--tx2)';
    }
    var _sd_str=(_sd_v==null)?'n/a'
                :((_sd_v>=0?'\u0394 +':'\u0394 ')+_sd_v.toFixed(1));
    sh+='<div class="sr"><span class="sk">Straddle</span>'
      + '<span class="sv mono" style="font-weight:800;color:'+_fg
      + ';background:'+_bg
      + ';padding:2px 8px;border-radius:6px">'+_sd_str
      + ' ['+_label+'] ('+esc(_spr)+')</span></div>';
  }
  // v15.2 — VWAP confluence bonus (display only)
  var _vw=parseFloat(s.spot_vwap||0);
  var _vd=parseFloat(s.spot_vs_vwap||0);
  var _vbn=s.vwap_bonus||'';
  if(_vw>0||_vbn){
    var _vbn_clr=_vbn==='CONFLUENCE'?'ok':_vbn==='AGAINST'?'fl':'';
    var _vbn_icon=_vbn==='CONFLUENCE'?'\u2713':_vbn==='AGAINST'?'\u26A0':'';
    sh+='<div class="sr"><span class="sk">VWAP</span><span class="sv mono '+_vbn_clr+'" style="font-weight:700">spot vs '+_vw.toFixed(0)+' ('+(_vd>=0?'+':'')+_vd.toFixed(0)+') '+esc(_vbn)+' '+_vbn_icon+'</span></div>';
  }

  // Verdict
  var vc='vw',vt='WAIT';
  if(fi){vc='vf';vt='READY TO FIRE \u2192 '+(s.entry_mode||'EMA9_BREAKOUT');}
  else if(cd&&cd.remaining>0&&cd.direction===t){vc='vc';vt='COOLDOWN '+Math.ceil(cd.remaining)+'m';}
  else if(s.reject_reason){vt=esc(s.reject_reason);}
  else if(_pos==='ABOVE'&&_green&&_bodyok&&_widthok){vc='vr';vt='READY';}
  sh+='<div class="vd '+vc+'">'+vt+'</div></div>';
});
sh+='</div>';
document.getElementById('p-sig').innerHTML=sh;

// Market
var mh='';
mh+='<div class="ms2"><div class="mh">\uD83D\uDCC8 Spot</div>';
mh+='<div class="mw"><span class="mk2">Price</span><span class="mv2 mono">'+mk.spot+'</span></div>';
var spc=parseFloat(mk.spot_ema9||0)>parseFloat(mk.spot_ema21||0)?'color:var(--gn)':'color:var(--rd)';
mh+='<div class="mw"><span class="mk2">EMA9</span><span class="mv2 mono" style="'+spc+'">'+Number(mk.spot_ema9||0).toFixed(1)+'</span></div>';
mh+='<div class="mw"><span class="mk2">EMA21</span><span class="mv2 mono">'+Number(mk.spot_ema21||0).toFixed(1)+'</span></div>';
var sprc=parseFloat(mk.spot_spread||0)>0?'color:var(--gn)':'color:var(--rd)';
mh+='<div class="mw"><span class="mk2">Spread</span><span class="mv2 mono" style="'+sprc+'">'+Number(mk.spot_spread||0).toFixed(1)+'</span></div>';
mh+='<div class="mw"><span class="mk2">RSI 3m</span><span class="mv2 mono">'+Number(mk.spot_rsi||0).toFixed(1)+'</span></div>';
mh+='<div class="mw"><span class="mk2">Hourly RSI</span><span class="mv2 mono">'+Number(mk.hourly_rsi||0).toFixed(1)+'</span></div>';
var gc=parseFloat(mk.gap||0)>0?'color:var(--gn)':'color:var(--rd)';
mh+='<div class="mw"><span class="mk2">Gap</span><span class="mv2 mono" style="'+gc+'">'+(parseFloat(mk.gap||0)>0?'+':'')+Number(mk.gap||0).toFixed(0)+'pts</span></div>';
mh+='</div>';

// Multi-TF
if(mtf&&(mtf.spot&&mtf.spot.length||mtf.ce&&mtf.ce.length)){
  mh+='<div class="ms2"><div class="mh">\uD83D\uDD0D Multi-TF</div>';
  var tfs=mtf.spot||[];
  tfs.forEach(function(r){
    mh+='<div class="mw"><span class="mk2">'+esc(r.tf||'')+'</span><span class="mv2 mono" style="color:'+(parseFloat(r.spread||0)>0?'var(--gn)':'var(--rd)')+'">'+Number(r.spread||0).toFixed(1)+' | RSI '+Number(r.rsi||0).toFixed(0)+'</span></div>';
  });
  mh+='</div>';
}

// v15.2 Part 4: silent 1-min shadow strategy — one-line A/B comparison
var _sh=d.shadow||{};
var _shn=parseInt(_sh.trades||0),_shw=parseInt(_sh.wins||0);
var _shp=parseFloat(_sh.pnl||0);
var _shc=_shp>=0?'var(--gn)':'var(--rd)';
mh+='<div class="ms2"><div class="mh">\uD83C\uDF17 Shadow 1-min (silent A/B)</div>';
mh+='<div class="mw"><span class="mk2">Today</span><span class="mv2 mono" style="color:'+_shc+'">'+_shn+' trades \u00B7 '+_shw+'W \u00B7 '+fmt(_shp)+'pts</span></div>';
mh+='</div>';

document.getElementById('p-mkt').innerHTML=mh;

// Trades
var th='';
var cum=parseFloat(td.pnl||0),tw2=td.wins||0,tl2=td.losses||0,tt2=td.trades||0;
var wr=tt2>0?Math.round(tw2/tt2*100):0;
th+='<div class="sum '+(cum>=0?'up':'dn')+'">';
th+='<div class="mono" style="font-size:32px;font-weight:900;color:'+(cum>=0?'var(--gn)':'var(--rd)')+';letter-spacing:-1px">'+fmt(cum)+'pts</div>';
th+='<div style="font-size:13px;color:var(--tx2);margin-top:4px;font-weight:600">'+rs(cum)+' \u00B7 '+tt2+' trades \u00B7 '+wr+'% win</div></div>';

if(trades&&trades.length){
  trades.slice().reverse().forEach(function(t){
    var p=parseFloat(t.pnl_pts||t.pnl||0),w=p>0;
    th+='<div class="tr '+(w?'w':'l')+'">';
    th+='<div class="tp2 mono '+(w?'gn':'rd')+'">'+fmt(p)+'</div>';
    th+='<div class="ti"><div class="tn">'+esc(shortSym(t.symbol,t.direction,t.strike));
    var em2=t.entry_mode||t.mode||'';
    // v15.x mode is EMA9_BREAKOUT; older modes show as LEGACY
    if(em2&&em2!=='EMA9_BREAKOUT')em2='LEGACY';
    var _bc2=em2==='LEGACY'?'':'bc';
    var _bstyle=em2==='LEGACY'?'background:var(--bg2);color:var(--tx3);box-shadow:none':'';
    if(em2)th+=' <span class="bg '+_bc2+'" style="font-size:7px;padding:2px 8px;'+_bstyle+'">'+esc(em2)+'</span>';
    // v15.2: replay straddle Δ if logged
    var _t_sd=t.entry_straddle_delta;
    var _sd_str='';
    if(_t_sd!=null&&_t_sd!==''){
      var _v=parseFloat(_t_sd);
      _sd_str=' \u00B7 \u0394 '+(_v>=0?'+':'')+_v.toFixed(1);
    }
    th+='</div><div class="tt">'+(t.entry_time||'')+' \u2192 '+(t.exit_time||'')+' \u00B7 '+(t.candles_held||0)+'c \u00B7 Peak '+fmt(t.peak_pnl||0)+_sd_str+'</div></div>';
    th+='<div class="tre">'+esc(t.exit_reason||'')+'</div></div>';
  });
}
document.getElementById('p-trd').innerHTML=th;
document.getElementById('ts').textContent=d.ts||new Date().toLocaleTimeString('en-IN');
}

function loadFiles(folder){
  fetch('/api/files'+(folder?'?folder='+folder:'')).then(function(r){return r.json()}).then(function(data){
    var h='';
    if(data.folders){
      data.folders.forEach(function(f){
        h+='<div class="ff" onclick="loadFiles(\''+f.key+'\')"><span class="fi2">\uD83D\uDCC1</span><span class="fn">'+esc(f.name)+'</span></div>';
      });
    }else{
      h+='<div class="bk" onclick="loadFiles(\'\')">← Back</div>';
      if(data.files&&data.files.length){
        data.files.forEach(function(f){
          h+='<a class="fi3" href="/api/download/'+f.path+'" target="_blank"><span>'+esc(f.name)+'</span><span class="fsz">'+f.size+'KB</span></a>';
        });
      }else h+='<div style="text-align:center;color:var(--tx3);padding:20px">No files</div>';
    }
    document.getElementById('p-fil').innerHTML=h;
  }).catch(function(){});
}

function go(){
  Promise.all([
    fetch('/api/dashboard').then(function(r){return r.json()}).catch(function(){return null}),
    fetch('/api/trades').then(function(r){return r.json()}).catch(function(){return[]}),
    fetch('/api/zones').then(function(r){return r.json()}).catch(function(){return{}}),
    fetch('/api/multitf').then(function(r){return r.json()}).catch(function(){return{}})
  ]).then(function(a){render(a[0],a[1],a[2],a[3])});
}
loadFiles('');go();setInterval(go,10000);
</script>
</body>
