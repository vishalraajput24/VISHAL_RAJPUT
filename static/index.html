<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VISHAL RAJPUT TRADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c16;--bg2:#0d1321;--bg3:#111827;
  --card:rgba(17,24,39,0.7);--card-border:rgba(99,102,241,0.15);
  --green:#10b981;--green-glow:rgba(16,185,129,0.3);
  --red:#ef4444;--red-glow:rgba(239,68,68,0.3);
  --yellow:#f59e0b;--yellow-glow:rgba(245,158,11,0.2);
  --blue:#6366f1;--blue-glow:rgba(99,102,241,0.3);
  --cyan:#06b6d4;--purple:#a855f7;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(148,163,184,0.08);
}
html{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:var(--bg);overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* Animated background */
.bg-grid{position:fixed;inset:0;z-index:0;opacity:0.03;
  background-image:linear-gradient(rgba(99,102,241,0.3) 1px,transparent 1px),
  linear-gradient(90deg,rgba(99,102,241,0.3) 1px,transparent 1px);
  background-size:60px 60px}
.bg-glow{position:fixed;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,0.08),transparent 70%);z-index:0;pointer-events:none}
.bg-glow2{position:fixed;bottom:-300px;left:-200px;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,0.05),transparent 70%);z-index:0;pointer-events:none}

.container{position:relative;z-index:1;max-width:540px;margin:0 auto;padding-bottom:20px}

/* Header */
.header{padding:16px 16px 12px;border-bottom:1px solid var(--border);
  background:rgba(8,12,22,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:baseline;gap:8px}
.logo h1{font-size:15px;font-weight:800;letter-spacing:1.5px}
.logo h1 span{color:var(--blue);text-shadow:0 0 30px var(--blue-glow)}
.logo .ver{font-size:10px;color:var(--text3);font-weight:500}
.tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.5px;
  backdrop-filter:blur(4px);transition:all 0.3s}
.tag-paper{background:rgba(99,102,241,0.12);color:var(--blue);border:1px solid rgba(99,102,241,0.25)}
.tag-live{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.25);animation:livePulse 2s infinite}
.tag-dte{background:rgba(148,163,184,0.08);color:var(--text2);border:1px solid var(--border)}
.tag-lock{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.2)}
.tag-vix{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.tag-bear{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.tag-bull{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.tag-regime{background:rgba(168,85,247,0.1);color:var(--purple);border:1px solid rgba(168,85,247,0.2)}

@keyframes livePulse{0%,100%{box-shadow:0 0 4px var(--green-glow)}50%{box-shadow:0 0 16px var(--green-glow)}}

/* Position Card */
.pos-card{margin:10px 12px;border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(17,24,39,0.8),rgba(30,41,59,0.5));
  border:1px solid rgba(99,102,241,0.2);backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.03)}
.pos-card.profit{border-color:rgba(16,185,129,0.3);box-shadow:0 4px 24px rgba(16,185,129,0.1)}
.pos-card.loss{border-color:rgba(239,68,68,0.3);box-shadow:0 4px 24px rgba(239,68,68,0.1)}
.pos-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--green))}
.pos-card.profit::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.pos-card.loss::before{background:linear-gradient(90deg,var(--red),var(--yellow))}
.pos-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pos-symbol{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.pos-dot{width:8px;height:8px;border-radius:50%;animation:dotPulse 1.5s infinite}
.pos-dot.green{background:var(--green);box-shadow:0 0 8px var(--green-glow)}
.pos-dot.split{background:var(--yellow);box-shadow:0 0 8px var(--yellow-glow)}
.pos-pnl{font-size:28px;font-weight:800;letter-spacing:-1px}
.pos-pnl.green{color:var(--green);text-shadow:0 0 20px var(--green-glow)}
.pos-pnl.red{color:var(--red);text-shadow:0 0 20px var(--red-glow)}
.pos-rs{font-size:12px;color:var(--text2);font-weight:600;margin-left:6px}
.pos-entry{font-size:11px;color:var(--text3)}
.pos-lots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.lot-card{padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border)}
.lot-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.lot-status{font-size:11px;font-weight:600;margin-top:2px}
.lot-sl{font-size:10px;color:var(--text2);margin-top:1px}
.rsi-bar{margin-top:10px}
.rsi-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:4px}
.rsi-track{height:6px;border-radius:3px;background:rgba(255,255,255,0.05);overflow:hidden;position:relative}
.rsi-fill{height:100%;border-radius:3px;transition:width 0.8s ease;
  background:linear-gradient(90deg,var(--blue),var(--green),var(--yellow))}
.rsi-fill.hot{background:linear-gradient(90deg,var(--yellow),var(--red));animation:heatPulse 1s infinite}
.pos-meta{display:flex;gap:16px;margin-top:8px;font-size:10px;color:var(--text3)}
.pos-meta b{color:var(--text2)}
.floors{margin-top:8px;display:flex;gap:4px}
.floor{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700}
.floor.hit{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.floor.next{background:rgba(255,255,255,0.03);color:var(--text3);border:1px solid var(--border)}

@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
@keyframes heatPulse{0%,100%{opacity:1}50%{opacity:0.7}}

/* Stats Bar */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;margin:10px 12px;border-radius:12px;overflow:hidden;
  background:var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.stat{background:var(--bg3);padding:12px 8px;text-align:center;backdrop-filter:blur(8px)}
.stat .label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.stat .value{font-size:18px;font-weight:800;margin-top:3px;letter-spacing:-0.5px}
.stat .sub{font-size:9px;color:var(--text3);margin-top:1px}
.stat .value.green{color:var(--green)}.stat .value.red{color:var(--red)}

/* Tabs */
.tab-bar{display:flex;margin:0 12px;border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:40;
  background:rgba(8,12,22,0.95);backdrop-filter:blur(12px)}
.tab{flex:1;padding:10px 0;text-align:center;font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.8px;cursor:pointer;border-bottom:2px solid transparent;
  transition:all 0.2s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--blue);border-color:var(--blue);text-shadow:0 0 10px var(--blue-glow)}
.tab-icon{font-size:12px;margin-right:4px}
.tab-content{display:none;animation:fadeIn 0.3s ease}.tab-content.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Refresh indicator */
.refresh{text-align:center;padding:6px;font-size:9px;color:var(--text3)}
.refresh-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);
  margin-right:4px;animation:dotPulse 2s infinite}

/* Signal Cards */
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 12px}
.sig-card{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--border);
  backdrop-filter:blur(8px);transition:border-color 0.3s}
.sig-card.ready{border-color:rgba(16,185,129,0.3);box-shadow:0 0 12px rgba(16,185,129,0.05)}
.sig-card.fired{border-color:var(--green);box-shadow:0 0 20px var(--green-glow);animation:firePulse 1s}
.sig-header{padding:10px 12px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02);display:flex;justify-content:space-between;align-items:center}
.sig-type{font-size:11px;font-weight:700;letter-spacing:0.5px}
.sig-ltp{font-size:12px;font-weight:700;color:var(--text)}
.sig-row{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;
  border-bottom:1px solid rgba(255,255,255,0.02)}
.sig-row:last-child{border:none}
.sig-k{font-size:10px;color:var(--text3);font-weight:500}
.sig-v{font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.sig-v .ok{color:var(--green)}.sig-v .fail{color:var(--red)}
.sig-icon{font-size:10px}
.sig-verdict{padding:8px 12px;text-align:center;font-size:11px;font-weight:700;
  border-top:1px solid var(--border)}
.sig-verdict.ready{color:var(--green);background:rgba(16,185,129,0.05)}
.sig-verdict.wait{color:var(--text3);background:rgba(255,255,255,0.01)}
.sig-verdict.fired{color:var(--green);background:rgba(16,185,129,0.1);animation:firePulse 2s}
.sig-verdict.cooldown{color:var(--yellow);background:rgba(245,158,11,0.05)}

/* EMA Gap Bar */
.ema-bar{margin:4px 12px 6px;height:4px;border-radius:2px;background:rgba(255,255,255,0.05);overflow:hidden}
.ema-fill{height:100%;border-radius:2px;transition:width 0.5s;background:var(--green)}
.ema-fill.low{background:var(--red)}
.ema-fill.mid{background:var(--yellow)}

@keyframes firePulse{0%{box-shadow:0 0 0 rgba(16,185,129,0)}50%{box-shadow:0 0 30px var(--green-glow)}100%{box-shadow:0 0 12px rgba(16,185,129,0.05)}}

/* Cooldown banner */
.cooldown-banner{margin:8px 12px;padding:10px 14px;border-radius:10px;text-align:center;
  background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);
  color:var(--yellow);font-size:11px;font-weight:700}

/* Market Tab */
.mkt-section{margin:8px 12px;border-radius:12px;overflow:hidden;background:var(--card);
  border:1px solid var(--border);backdrop-filter:blur(8px)}
.mkt-header{padding:10px 14px;font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02)}
.mkt-row{display:flex;justify-content:space-between;padding:7px 14px;border-bottom:1px solid rgba(255,255,255,0.02)}
.mkt-row:last-child{border:none}
.mkt-k{font-size:10px;color:var(--text3)}.mkt-v{font-size:11px;font-weight:600}

/* Trade Cards */
.trade-card{margin:6px 12px;padding:12px 14px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);display:flex;align-items:center;gap:12px;
  transition:transform 0.2s,border-color 0.2s;backdrop-filter:blur(8px)}
.trade-card:hover{transform:translateX(2px)}
.trade-card.win{border-left:3px solid var(--green)}
.trade-card.loss{border-left:3px solid var(--red)}
.trade-pnl{font-size:16px;font-weight:800;min-width:70px}
.trade-pnl.green{color:var(--green)}.trade-pnl.red{color:var(--red)}
.trade-info{flex:1}
.trade-sym{font-size:11px;font-weight:700}
.trade-detail{font-size:9px;color:var(--text3);margin-top:2px}
.trade-reason{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;
  background:rgba(255,255,255,0.05);color:var(--text2)}
.trade-summary{margin:8px 12px;padding:12px 14px;border-radius:10px;
  background:linear-gradient(135deg,rgba(17,24,39,0.8),rgba(30,41,59,0.4));
  border:1px solid var(--border);text-align:center}

/* File List */
.file-folder{margin:6px 12px;padding:12px 14px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;gap:10px;transition:all 0.2s}
.file-folder:hover{border-color:var(--blue);transform:translateX(2px)}
.file-icon{font-size:16px}.file-name{font-size:12px;font-weight:600;flex:1}
.file-count{font-size:10px;color:var(--text3);font-weight:500}
.file-item{margin:3px 12px 3px 28px;padding:8px 12px;border-radius:8px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  display:flex;justify-content:space-between;font-size:11px;cursor:pointer;transition:all 0.2s}
.file-item:hover{background:rgba(99,102,241,0.05);border-color:rgba(99,102,241,0.2)}
.file-size{color:var(--text3);font-size:10px}
.back-btn{margin:8px 12px;padding:8px 14px;border-radius:8px;background:rgba(99,102,241,0.1);
  border:1px solid rgba(99,102,241,0.2);color:var(--blue);font-size:11px;font-weight:600;
  cursor:pointer;display:inline-block;transition:all 0.2s}
.back-btn:hover{background:rgba(99,102,241,0.2)}

/* Footer */
.footer{text-align:center;padding:12px;font-size:8px;color:var(--text3);opacity:0.5;
  border-top:1px solid var(--border);margin-top:20px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:2px}

/* No data state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:0.4}
.empty-text{font-size:12px}
.empty-sub{font-size:10px;margin-top:4px;opacity:0.6}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <h1><span>VISHAL RAJPUT</span> TRADE</h1>
      <span class="ver mono" id="ver">v13.0</span>
    </div>
    <div class="tags" id="tags"></div>
  </div>

  <!-- Position (when in trade) -->
  <div id="pos-area"></div>

  <!-- Stats Bar -->
  <div class="stats" id="stats-bar">
    <div class="stat"><div class="label">Day P&L</div><div class="value mono" id="st-pnl">—</div><div class="sub mono" id="st-rs"></div></div>
    <div class="stat"><div class="label">Trades</div><div class="value mono" id="st-trades">0</div><div class="sub" id="st-wl"></div></div>
    <div class="stat"><div class="label">Status</div><div class="value" id="st-status">⚡</div><div class="sub" id="st-status-text">Loading</div></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab active" data-tab="sig" onclick="switchTab('sig')"><span class="tab-icon">⚡</span>SIGNALS</div>
    <div class="tab" data-tab="mkt" onclick="switchTab('mkt')"><span class="tab-icon">📊</span>MARKET</div>
    <div class="tab" data-tab="trd" onclick="switchTab('trd')"><span class="tab-icon">📦</span>TRADES</div>
    <div class="tab" data-tab="fil" onclick="switchTab('fil')"><span class="tab-icon">📁</span>FILES</div>
  </div>

  <div class="refresh"><span class="refresh-dot"></span>Auto-refresh 10s · <span class="mono" id="ts"></span></div>

  <!-- Signal Tab -->
  <div class="tab-content show" id="p-sig"></div>
  <!-- Market Tab -->
  <div class="tab-content" id="p-mkt"></div>
  <!-- Trades Tab -->
  <div class="tab-content" id="p-trd"></div>
  <!-- Files Tab -->
  <div class="tab-content" id="p-fil"></div>

  <div class="footer">VISHAL RAJPUT TRADE · Powered by data, driven by discipline</div>
</div>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function fmt(n){return n>=0?'+'+n.toFixed(1):n.toFixed(1)}
function rs(pts){return '₹'+(pts*65).toLocaleString('en-IN',{maximumFractionDigits:0})}

var currentTab='sig';
var currentFolder='';

function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(el){el.classList.toggle('active',el.dataset.tab===t)});
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('show')});
  document.getElementById('p-'+t).classList.add('show');
  if(t==='fil'&&!currentFolder)loadFiles();
}

function render(d,trades,zones,mtf){
  if(!d||!d.market){
    var wm='<div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-text">Waiting for bot data...</div><div class="empty-sub">Bot writes data during market hours (9:15–15:30 IST)</div></div>';
    document.getElementById('p-sig').innerHTML=wm;
    document.getElementById('p-mkt').innerHTML=wm;
    document.getElementById('p-trd').innerHTML=wm;
    document.getElementById('pos-area').innerHTML='';
    return;
  }

  var mk=d.market||{},ce=d.ce||{},pe=d.pe||{},pos=d.position||{},td=d.today||{},str=d.straddle||{},cd=d.cooldown||{};

  // Version + timestamp
  document.getElementById('ver').textContent=d.version||'v13.0';
  document.getElementById('ts').textContent=d.ts||'';

  // Tags
  var modeClass=d.mode==='LIVE'?'tag-live':'tag-paper';
  var biasClass=mk.bias==='BEAR'?'tag-bear':mk.bias==='BULL'?'tag-bull':'tag-dte';
  var thtml='<span class="tag '+modeClass+'">'+esc(d.mode)+'</span>';
  thtml+='<span class="tag tag-dte">DTE '+mk.dte+'</span>';
  if(mk.locked_ce)thtml+='<span class="tag tag-lock">CE '+mk.locked_ce+' · PE '+mk.locked_pe+' 🔒</span>';
  thtml+='<span class="tag tag-vix">VIX '+mk.vix+'</span>';
  if(mk.bias)thtml+='<span class="tag '+biasClass+'">'+mk.bias+'</span>';
  if(mk.regime)thtml+='<span class="tag tag-regime">'+mk.regime+'</span>';
  document.getElementById('tags').innerHTML=thtml;

  // Position
  var pa='';
  if(pos.in_trade){
    var pnl=pos.pnl||0;var pcls=pnl>=0?'profit':'loss';var pcol=pnl>=0?'green':'red';
    var dotCls=pos.lots_split?'split':'green';
    var symClean=(pos.direction||'')+' '+(pos.strike||mk.locked_ce||'');
    var statusText=pos.lots_split?(pos.lot1_active?'⚡ SPLIT':'🏃 LOT2 RIDING'):'🟢 IN TRADE';
    pa='<div class="pos-card '+pcls+'">';
    pa+='<div class="pos-header"><div class="pos-symbol"><span class="pos-dot '+dotCls+'"></span>'+statusText+' — '+esc(symClean)+'</div>';
    pa+='<div class="pos-entry mono">₹'+pos.entry+' → ₹'+pos.ltp+'</div></div>';
    pa+='<div><span class="pos-pnl mono '+pcol+'">'+fmt(pnl)+'pts</span><span class="pos-rs mono">'+rs(pnl)+'</span></div>';

    // Lot cards
    pa+='<div class="pos-lots">';
    if(pos.lot1_active!==undefined){
      var l1s=pos.lot1_active?'<span style="color:var(--green)">Active</span>':'<span style="color:var(--text3)">Sold ✅</span>';
      pa+='<div class="lot-card"><div class="lot-label">LOT 1</div><div class="lot-status">'+l1s+'</div>';
      pa+='<div class="lot-sl mono">SL ₹'+(pos.lot1_sl||pos.sl||'—')+'</div></div>';
    }
    if(pos.lot2_active!==undefined){
      var l2s=pos.lot2_active?'<span style="color:var(--green)">Active</span>':'<span style="color:var(--text3)">Sold ✅</span>';
      var l2sl=pos.lot2_trail||pos.sl||'—';
      pa+='<div class="lot-card"><div class="lot-label">LOT 2'+(pos.lots_split?' (ATR)':'')+'</div><div class="lot-status">'+l2s+'</div>';
      pa+='<div class="lot-sl mono">SL ₹'+l2sl+'</div></div>';
    }
    pa+='</div>';

    // RSI progress to split
    var rsiVal=pos.rsi||0;var rsiPct=Math.min(Math.max((rsiVal-50)/(70-50)*100,0),100);
    var rsiFillCls=rsiPct>85?'hot':'';
    pa+='<div class="rsi-bar"><div class="rsi-label"><span>RSI '+rsiVal+(pos.lots_split?' ⚡ SPLIT':'')+'</span><span>'+Math.round(rsiPct)+'%</span></div>';
    pa+='<div class="rsi-track"><div class="rsi-fill '+rsiFillCls+'" style="width:'+rsiPct+'%"></div></div></div>';

    // Floors
    var peak=pos.peak||0;
    pa+='<div class="floors">';
    pa+='<div class="floor '+(peak>=10?'hit':'next')+'">+10'+(peak>=10?' ✅':'')+'</div>';
    pa+='<div class="floor '+(peak>=20?'hit':'next')+'">+20'+(peak>=20?' ✅':'')+'</div>';
    pa+='<div class="floor '+(peak>=30?'hit':'next')+'">+30'+(peak>=30?' ✅':'')+'</div>';
    pa+='</div>';

    pa+='<div class="pos-meta"><span>Peak: <b>'+fmt(peak)+'</b></span><span>Candles: <b>'+(pos.candles||0)+'</b></span>';
    pa+='<span>Held: <b>'+(pos.candles||0)+'min</b></span></div>';
    pa+='</div>';
  }
  document.getElementById('pos-area').innerHTML=pa;

  // Stats bar
  var dp=td.pnl||0;var dpCls=dp>=0?'green':'red';
  document.getElementById('st-pnl').className='value mono '+dpCls;
  document.getElementById('st-pnl').textContent=fmt(dp)+'pts';
  document.getElementById('st-rs').textContent=rs(dp);
  document.getElementById('st-trades').textContent=td.trades||0;
  var wr=td.trades>0?Math.round((td.wins||0)/(td.trades)*100):0;
  document.getElementById('st-wl').textContent=(td.wins||0)+'W '+(td.losses||0)+'L · '+wr+'%';
  var stIcon=pos.in_trade?'🟢':'⚡';var stText=pos.in_trade?'IN TRADE':'SCANNING';
  if(td.paused){stIcon='⏸';stText='PAUSED';}
  document.getElementById('st-status').textContent=stIcon;
  document.getElementById('st-status-text').textContent=stText;

  // Signals Tab
  var sh='';
  if(cd&&cd.remaining>0){
    sh+='<div class="cooldown-banner">⏳ COOLDOWN '+Math.ceil(cd.remaining)+'min — '+(cd.direction||'')+' blocked after +'+(cd.peak||0)+'pts win</div>';
  }
  sh+='<div class="sig-grid">';
  [['CE',ce],['PE',pe]].forEach(function(pair){
    var type=pair[0],s=pair[1];
    var strike=s.strike||mk['locked_'+type.toLowerCase()]||mk.atm||'';
    var ltp=s.ltp||0;
    var emaGap=s.ema_gap||0;var rsi=s.rsi||0;
    var emaOk=s.ema_ok;var rsiOk=s.rsi_ok;
    var fired=s.fired;var verdict=s.verdict||'NO DATA';
    var cardCls=fired?'fired':(emaOk&&rsiOk?'ready':'');
    var verdictCls=fired?'fired':(emaOk&&rsiOk?'ready':'wait');
    if(cd&&cd.remaining>0&&cd.direction===type)verdictCls='cooldown';

    sh+='<div class="sig-card '+cardCls+'">';
    sh+='<div class="sig-header"><span class="sig-type">'+type+' '+strike+'</span><span class="sig-ltp mono">₹'+ltp+'</span></div>';
    var emaBarW=Math.min(Math.abs(emaGap)/10*100,100);
    var emaBarCls=emaGap>=3?'':'low';if(emaGap>=1.5&&emaGap<3)emaBarCls='mid';
    sh+='<div class="ema-bar"><div class="ema-fill '+emaBarCls+'" style="width:'+emaBarW+'%"></div></div>';

    sh+='<div class="sig-row"><span class="sig-k">EMA GAP</span><span class="sig-v '+(emaOk?'ok':'fail')+' mono">'+emaGap.toFixed(1)+'pts '+(emaOk?'✅':'❌')+'</span></div>';
    sh+='<div class="sig-row"><span class="sig-k">RSI</span><span class="sig-v '+(rsiOk?'ok':'fail')+' mono">'+rsi.toFixed(1)+' '+(rsiOk?'↑ ✅':'❌')+'</span></div>';
    sh+='<div class="sig-row"><span class="sig-k">CANDLE</span><span class="sig-v '+(s.candle_green?'ok':'fail')+'">'+(s.candle_green?'GREEN ✅':'RED ❌')+'</span></div>';
    sh+='<div class="sig-row"><span class="sig-k">GAP TREND</span><span class="sig-v '+(s.gap_widening?'ok':'fail')+'">'+(s.gap_widening?'GROWING ✅':'SHRINKING ❌')+'</span></div>';
    sh+='<div class="sig-verdict '+verdictCls+'">'+esc(verdict)+'</div>';
    sh+='</div>';
  });
  sh+='</div>';
  document.getElementById('p-sig').innerHTML=sh;

  // Market Tab
  var mh='';
  mh+='<div class="mkt-section"><div class="mkt-header">📈 Spot</div>';
  mh+='<div class="mkt-row"><span class="mkt-k">Price</span><span class="mkt-v mono">'+mk.spot+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">EMA9</span><span class="mkt-v mono" style="color:'+(mk.spot_ema9>mk.spot_ema21?'var(--green)':'var(--red)')+'">'+Number(mk.spot_ema9||0).toFixed(1)+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">EMA21</span><span class="mkt-v mono">'+Number(mk.spot_ema21||0).toFixed(1)+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">Spread</span><span class="mkt-v mono" style="color:'+(mk.spot_spread>0?'var(--green)':'var(--red)')+'">'+Number(mk.spot_spread||0).toFixed(1)+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">RSI 3m</span><span class="mkt-v mono">'+Number(mk.spot_rsi||0).toFixed(1)+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">H.RSI</span><span class="mkt-v mono">'+mk.hourly_rsi+'</span></div>';
  mh+='<div class="mkt-row"><span class="mkt-k">Gap</span><span class="mkt-v mono" style="color:'+(mk.gap>0?'var(--green)':'var(--red)')+'">'+mk.gap+'pts</span></div>';
  mh+='</div>';

  // Multi-TF if available
  if(mtf&&mtf.spot&&mtf.spot.length){
    mh+='<div class="mkt-section"><div class="mkt-header">📊 Spot Multi-TF</div>';
    mtf.spot.forEach(function(r){
      mh+='<div class="mkt-row"><span class="mkt-k">'+r.tf+'</span><span class="mkt-v mono">ADX '+Number(r.adx||0).toFixed(0)+' RSI '+Number(r.rsi||0).toFixed(0)+' Spr '+Number(r.spread||0).toFixed(0)+'</span></div>';
    });
    mh+='</div>';
  }

  // Fib
  if(mk.fib_nearest){
    mh+='<div class="mkt-section"><div class="mkt-header">📐 Fib Pivots</div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Nearest</span><span class="mkt-v mono">'+mk.fib_nearest+' ('+mk.fib_distance+'pts)</span></div>';
    mh+='</div>';
  }

  // Straddle
  if(str&&str.open_price){
    var decay=str.decay_pct||0;var dcol=decay<-3?'var(--green)':decay>0?'var(--red)':'var(--text)';
    mh+='<div class="mkt-section"><div class="mkt-header">📉 Straddle</div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Open</span><span class="mkt-v mono">₹'+str.open_price+'</span></div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Now</span><span class="mkt-v mono">₹'+(str.current||0)+'</span></div>';
    mh+='<div class="mkt-row"><span class="mkt-k">Decay</span><span class="mkt-v mono" style="color:'+dcol+'">'+decay.toFixed(1)+'%</span></div>';
    mh+='</div>';
  }

  document.getElementById('p-mkt').innerHTML=mh;

  // Trades Tab
  var th='';
  if(trades&&trades.length){
    var tw=0,tl=0,tpnl=0;
    trades.forEach(function(t){var p=parseFloat(t.pnl_pts||0);if(p>0)tw++;else tl++;tpnl+=p;});
    th+='<div class="trade-summary"><div style="font-size:18px;font-weight:800;color:'+(tpnl>=0?'var(--green)':'var(--red)')+'" class="mono">'+fmt(tpnl)+'pts</div>';
    th+='<div style="font-size:11px;color:var(--text2);margin-top:2px">'+rs(tpnl)+' · '+tw+'W '+tl+'L</div></div>';

    trades.slice().reverse().forEach(function(t){
      var p=parseFloat(t.pnl_pts||0);var cls=p>0?'win':'loss';var pcol=p>0?'green':'red';
      var dir=t.direction||'';var strike=t.strike||'';
      th+='<div class="trade-card '+cls+'">';
      th+='<div class="trade-pnl mono '+pcol+'">'+fmt(p)+'</div>';
      th+='<div class="trade-info"><div class="trade-sym">'+dir+' '+strike+'</div>';
      th+='<div class="trade-detail">'+esc(t.entry_time||'').slice(-8)+' → '+esc(t.exit_time||'')+' · ₹'+t.entry_price+' → ₹'+t.exit_price+'</div></div>';
      th+='<span class="trade-reason">'+esc(t.exit_reason||'')+'</span>';
      th+='</div>';
    });
  }else{
    th='<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No trades today</div><div class="empty-sub">Entries fire when EMA gap ≥3 + RSI ≥50 rising</div></div>';
  }
  document.getElementById('p-trd').innerHTML=th;
}

// Files tab
function loadFiles(folder){
  currentFolder=folder||'';
  var url=folder?'/api/files?folder='+folder:'/api/files';
  fetch(url).then(function(r){return r.json()}).then(function(data){
    var h='';
    if(data.folders){
      data.folders.forEach(function(f){
        h+='<div class="file-folder" onclick="loadFiles(\''+f.key+'\')"><span class="file-icon">📁</span><span class="file-name">'+esc(f.name)+'</span></div>';
      });
    }else{
      h+='<div class="back-btn" onclick="loadFiles()">← Back</div>';
      if(data.files&&data.files.length){
        data.files.forEach(function(f){
          h+='<a class="file-item" href="/api/download?path='+encodeURIComponent(f.path)+'" target="_blank" style="text-decoration:none;color:var(--text)">';
          h+='<span>'+esc(f.name)+'</span><span class="file-size">'+f.size+'KB</span></a>';
        });
      }else{
        h+='<div class="empty-state"><div class="empty-text">Empty folder</div></div>';
      }
    }
    document.getElementById('p-fil').innerHTML=h;
  }).catch(function(){
    document.getElementById('p-fil').innerHTML='<div class="empty-state"><div class="empty-text">Failed to load files</div></div>';
  });
}

function refresh(){
  Promise.all([
    fetch('/api/dashboard').then(function(r){return r.json()}).catch(function(){return null}),
    fetch('/api/trades').then(function(r){return r.json()}).catch(function(){return[]}),
    fetch('/api/zones').then(function(r){return r.json()}).catch(function(){return{zones:[]}}),
    fetch('/api/multitf').then(function(r){return r.json()}).catch(function(){return{spot:[],ce:[],pe:[]}})
  ]).then(function(all){render(all[0],all[1],all[2],all[3])});
}

loadFiles();
refresh();
setInterval(refresh,10000);
</script>
</body>
</html>
