<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>VRL War Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#0a0f1c;--bg2:#141b2d;--card:rgba(255,255,255,0.05);--bd:rgba(255,255,255,0.1);--gn:#00ff88;--rd:#ff4466;--yl:#ffaa00;--bl:#4488ff;--tx:#e0e0e0;--dm:#666;--pr:#a855f7}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--tx);font-family:'SF Mono',Menlo,monospace;font-size:12px;max-width:520px;margin:0 auto;min-height:100vh}
.glass{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:10px}
.hd{padding:12px 14px;position:sticky;top:0;z-index:10;background:rgba(10,15,28,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd)}
.hd h1{font-size:14px;font-weight:700;letter-spacing:1px;text-shadow:0 0 20px rgba(68,136,255,0.3)}
.hd b{color:var(--bl)}
.tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700;letter-spacing:.3px}
.tg{background:rgba(0,255,136,0.15);color:var(--gn);border:1px solid rgba(0,255,136,0.2)}
.tr{background:rgba(255,68,102,0.15);color:var(--rd);border:1px solid rgba(255,68,102,0.2)}
.tb{background:rgba(68,136,255,0.15);color:var(--bl);border:1px solid rgba(68,136,255,0.2)}
.ta{background:rgba(255,170,0,0.15);color:var(--yl);border:1px solid rgba(255,170,0,0.2)}
.tp{background:rgba(168,85,247,0.15);color:var(--pr);border:1px solid rgba(168,85,247,0.2)}
.tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 8px;background:rgba(10,15,28,0.6)}
.tab{padding:8px 16px;font-size:10px;font-weight:700;color:var(--dm);border-bottom:2px solid transparent;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .2s}
.tab:hover{color:var(--bl)}
.tab.on{color:var(--bl);border-color:var(--bl);text-shadow:0 0 10px rgba(68,136,255,0.3)}
.H{display:none}
.row{display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.03)}
.row:last-child{border:none}
.row .k{color:var(--dm);font-size:10px}.row .v{font-weight:700;font-size:12px}
.sh{padding:8px 12px;font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,0.02)}
.sect{margin:8px;border-radius:10px;overflow:hidden}
.pos{margin:8px;padding:14px;border-radius:12px;position:relative;overflow:hidden}
.pos::before{content:'';position:absolute;inset:0;border-radius:12px;padding:1px;background:linear-gradient(135deg,var(--gn),var(--bl));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.pos.loss::before{background:linear-gradient(135deg,var(--rd),var(--yl))}
.big{font-size:24px;font-weight:700}
.prog{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.ctx-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:8px;border-radius:10px;overflow:hidden}
.ctx{text-align:center;padding:8px 4px;border-right:1px solid var(--bd);background:var(--card)}.ctx:last-child{border:none}
.ctx .k{font-size:8px;color:var(--dm);text-transform:uppercase;letter-spacing:.3px}
.ctx .v{font-size:12px;font-weight:700;margin-top:2px}
.tc{margin:4px 8px;padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;transition:transform .2s}
.tc:hover{transform:translateX(2px)}
.tc.w{border-left:3px solid var(--gn);background:rgba(0,255,136,0.03)}
.tc.l{border-left:3px solid var(--rd);background:rgba(255,68,102,0.03)}
.ft{text-align:center;padding:8px;font-size:8px;color:#444;border-top:1px solid var(--bd)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px}
.floor-step{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-right:3px}
.floor-hit{background:rgba(0,255,136,0.15);color:var(--gn)}
.floor-next{background:rgba(255,255,255,0.05);color:var(--dm)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.scanning{animation:pulse 2s infinite}
.glow{box-shadow:0 0 15px rgba(255,170,0,0.3)}
</style></head><body>
<div class="hd">
<h1><b>VISHAL RAJPUT</b> TRADE <span style="color:#444;font-size:9px" id="ver"></span></h1>
<div class="tags" id="tags"></div>
</div>
<div id="pos-area"></div>
<div class="tabs">
<div class="tab on" data-t="sig" onclick="st('sig')">&#9889; SIGNALS</div>
<div class="tab" data-t="mkt" onclick="st('mkt')">&#128202; MARKET</div>
<div class="tab" data-t="trd" onclick="st('trd')">&#128210; TRADES</div>
<div class="tab" data-t="fil" onclick="window.location.href='/files'">&#128193; FILES</div>
</div>
<div id="p-sig"></div>
<div id="p-mkt" class="H"></div>
<div id="p-trd" class="H"></div>
<div class="ft">Auto-refresh 10s &middot; <span id="ts"></span></div>
<script>
function st(t){document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('on',e.dataset.t===t));['sig','mkt','trd'].forEach(i=>{var el=document.getElementById('p-'+i);if(el)el.classList.toggle('H',i!==t)})}
function esc(s){return String(s||'').replace(/</g,'&lt;')}
function shortSym(sym,dir,strike){if(dir&&strike)return dir+' '+strike;if(!sym)return'';var m=sym.match(/(CE|PE)$/);if(m){var s=sym.replace(/^NIFTY\d+/,'').replace(/(CE|PE)$/,'');return m[1]+' '+s}return sym}
function tagC(v){if(v==='BULL')return'tg';if(v==='BEAR')return'tr';if(v==='SIDEWAYS'||v==='NEUTRAL')return'ta';return'tb'}

function render(d,trades,zones,mtf){
if(!d||!d.market){document.getElementById('p-sig').innerHTML='<div style="text-align:center;color:#555;padding:30px">Waiting for bot data...</div>';document.getElementById('pos-area').innerHTML='';return}
var mk=d.market||{},ce=d.ce||{},pe=d.pe||{},pos=d.position||{},td=d.today||{},str=d.straddle||{},cd=d.cooldown||{};

// Tags
document.getElementById('ver').textContent=d.version||'';
var tg='<span class="tag '+(d.mode==='LIVE'?'tg':'tb')+'">'+esc(d.mode)+'</span>';
tg+='<span class="tag '+((mk.dte||0)<=1?'tr':'tb')+'">DTE '+(mk.dte||0)+'</span>';
tg+='<span class="tag tb">CE '+(mk.locked_ce||mk.atm)+' &middot; PE '+(mk.locked_pe||mk.atm)+' &#128274;</span>';
if(mk.vix>0)tg+='<span class="tag '+(mk.vix>22?'tr':mk.vix>18?'ta':'tg')+'">VIX '+mk.vix+'</span>';
if(mk.bias)tg+='<span class="tag '+tagC(mk.bias)+'">'+esc(mk.bias)+'</span>';
if(mk.regime){var rc=(mk.regime||'').indexOf('TREND')>=0?'tg':(mk.regime||'')==='NEUTRAL'?'ta':'tr';tg+='<span class="tag '+rc+'">'+esc(mk.regime)+'</span>'}
document.getElementById('tags').innerHTML=tg;

// Position
var ph='';
if(pos.in_trade){
  var sym=shortSym(pos.symbol,pos.direction,pos.strike);
  var clr=pos.pnl>=0?'var(--gn)':'var(--rd)';
  var actLots=(pos.lot1_active?1:0)+(pos.lot2_active?1:0);
  var rs=Math.round(pos.pnl*65*actLots);
  var icon=!pos.lots_split?'&#128994; ':(!pos.lot1_active?'&#127939; ':'&#9889; ');
  var label=!pos.lots_split?'IN TRADE':(pos.lot1_active?'SPLIT':'LOT2 RIDING');
  var rsiPct=Math.min(100,((pos.current_rsi||0)/70)*100);
  var rsiClr=pos.current_rsi>=70?'var(--rd)':pos.current_rsi>=65?'var(--yl)':'var(--gn)';
  var pk=pos.peak||0;
  ph+='<div class="pos glass '+(pos.pnl<0?'loss':'')+'">';
  ph+='<div style="display:flex;justify-content:space-between;align-items:center">';
  ph+='<div style="font-size:13px;font-weight:700">'+icon+' '+esc(sym)+' <span style="color:var(--bl)">'+label+'</span></div>';
  ph+='<div style="font-size:10px;color:var(--dm)">Entry &#8377;'+pos.entry+' &rarr; &#8377;'+(pos.ltp||0)+'</div></div>';
  ph+='<div style="margin:8px 0"><span class="big" style="color:'+clr+'">'+(pos.pnl>=0?'+':'')+pos.pnl+'pts</span>';
  ph+=' <span style="color:var(--dm);font-size:13px">&#8377;'+(rs>=0?'+':'')+rs.toLocaleString()+'</span></div>';
  // RSI progress
  ph+='<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dm);margin-bottom:2px"><span>RSI '+(pos.current_rsi||0)+' (split at 70)</span><span>'+Math.round(rsiPct)+'%</span></div>';
  ph+='<div class="prog'+(pos.current_rsi>=67?' glow':'')+'"><div class="prog-fill" style="width:'+rsiPct+'%;background:linear-gradient(90deg,'+rsiClr+','+rsiClr+')"></div></div>';
  // Lot status
  var fl=pos.current_floor||0;
  if(!pos.lots_split){
    ph+='<div style="font-size:10px;color:var(--dm);margin-top:4px">LOT1: <span style="color:var(--gn)">Active</span> &nbsp; SL &#8377;'+fl+' &nbsp;&nbsp; LOT2: <span style="color:var(--gn)">Active</span> &nbsp; SL &#8377;'+fl+'</div>';
  }else if(pos.lot1_active&&pos.lot2_active){
    ph+='<div style="font-size:10px;color:var(--dm);margin-top:4px">LOT1: <span style="color:var(--yl)">Floor SL</span> &#8377;'+fl+' &nbsp;&nbsp; LOT2: <span style="color:var(--bl)">ATR Trail</span></div>';
  }else if(!pos.lot1_active){
    ph+='<div style="font-size:10px;margin-top:4px"><span style="color:var(--dm)">Lot1:</span> <span style="color:var(--gn)">SOLD &#10004;</span> &nbsp;&nbsp; <span style="color:var(--dm)">LOT2:</span> <span style="color:var(--bl)">ATR Trail</span></div>';
  }
  // Floors
  ph+='<div style="margin-top:6px">';
  ph+='<span class="floor-step '+(pk>=10?'floor-hit':'floor-next')+'">+10 '+(pk>=10?'&#10004;':'')+'</span>';
  ph+='<span class="floor-step '+(pk>=20?'floor-hit':'floor-next')+'">+20 '+(pk>=20?'&#10004;':'')+'</span>';
  ph+='<span class="floor-step '+(pk>=30?'floor-hit':'floor-next')+'">+30 '+(pk>=30?'&#10004;':'')+'</span>';
  ph+='<span class="floor-step '+(pk>=40?'floor-hit':'floor-next')+'">+40 '+(pk>=40?'&#10004;':'')+'</span>';
  ph+='</div>';
  ph+='<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dm);margin-top:6px">';
  ph+='<span>Peak: <b style="color:var(--gn)">+'+pk+'</b></span><span>RSI: <b style="color:'+rsiClr+'">'+(pos.current_rsi||0)+'</b></span><span>'+pos.candles+'min</span></div>';
  ph+='</div>';
}

// Stats bar
var dp=td.pnl||0;var wr=td.trades>0?Math.round(td.wins/td.trades*100):0;
ph+='<div style="margin:8px;display:flex;gap:6px">';
ph+='<div class="glass" style="flex:1;padding:8px 10px;text-align:center">';
ph+='<div style="font-size:8px;color:var(--dm)">DAY P&L</div>';
ph+='<div style="font-size:18px;font-weight:700;color:'+(dp>=0?'var(--gn)':'var(--rd)')+'">'+(dp>=0?'+':'')+dp+'pts</div>';
ph+='<div style="font-size:9px;color:var(--dm)">&#8377;'+Math.round(dp*65).toLocaleString()+'</div></div>';
ph+='<div class="glass" style="flex:1;padding:8px 10px;text-align:center">';
ph+='<div style="font-size:8px;color:var(--dm)">TRADES</div>';
ph+='<div style="font-size:18px;font-weight:700">'+(td.trades||0)+'</div>';
ph+='<div style="font-size:9px;color:var(--dm)">'+td.wins+'W '+td.losses+'L &nbsp; WR '+wr+'%</div></div>';
ph+='<div class="glass" style="flex:1;padding:8px 10px;text-align:center">';
ph+='<div style="font-size:8px;color:var(--dm)">STATUS</div>';
var stIcon=td.paused?'&#9208;':pos.in_trade?'&#128994;':'&#9889;';
var stTxt=td.paused?'PAUSED':pos.in_trade?'IN TRADE':'SCANNING';
ph+='<div style="font-size:18px" class="'+(pos.in_trade?'':'scanning')+'">'+stIcon+'</div>';
ph+='<div style="font-size:9px;color:var(--dm)">'+stTxt+'</div></div></div>';
document.getElementById('pos-area').innerHTML=ph;

// Signals tab
function sigBlock(label,sig){
  var vClr=sig.fired?'var(--gn)':sig.verdict==='READY'?'var(--bl)':'var(--yl)';
  var eClr=sig.ema_ok?'var(--gn)':'var(--rd)';
  var rClr=sig.rsi_ok?'var(--gn)':'var(--rd)';
  var gcClr=sig.candle_green?'var(--gn)':'var(--rd)';
  var gwClr=sig.gap_widening?'var(--gn)':'var(--rd)';
  var h='<div class="glass sect"><div class="sh">'+label+' '+(sig.strike||'')+' &middot; &#8377;'+(sig.ltp||0)+'</div>';
  h+='<div class="row"><div class="k">EMA9</div><div class="v">'+(sig.ema9||0)+'</div></div>';
  h+='<div class="row"><div class="k">EMA21</div><div class="v">'+(sig.ema21||0)+'</div></div>';
  h+='<div class="row"><div class="k">EMA GAP</div><div class="v" style="color:'+eClr+'">'+((sig.ema_gap||0)>0?'+':'')+(sig.ema_gap||0)+(sig.ema_ok?' &#10004;':' &#10008;')+'</div></div>';
  h+='<div class="row"><div class="k">RSI</div><div class="v" style="color:'+rClr+'">'+(sig.rsi||0)+(sig.rsi_ok?' &#8593; &#10004;':' &#10008;')+'</div></div>';
  h+='<div class="row"><div class="k">CANDLE</div><div class="v" style="color:'+gcClr+'">'+(sig.candle_green?'GREEN &#10004;':'RED &#10008;')+'</div></div>';
  h+='<div class="row"><div class="k">GAP TREND</div><div class="v" style="color:'+gwClr+'">'+(sig.gap_widening?'WIDENING &#10004;':'SHRINKING &#10008;')+'</div></div>';
  h+='<div style="padding:8px 12px;font-size:11px;font-weight:700;text-align:center;color:'+vClr+'">'+esc(sig.verdict||'NO DATA')+'</div></div>';
  return h}

var sigH='';
if(cd&&cd.remaining>0){
  sigH+='<div class="glass" style="margin:8px;padding:8px 12px;text-align:center;color:var(--yl);font-size:11px;font-weight:700">&#9203; COOLDOWN '+Math.ceil(cd.remaining)+'min &mdash; '+(cd.direction||'')+' blocked</div>';
}
sigH+='<div class="two">'+sigBlock('CE',ce)+sigBlock('PE',pe)+'</div>';
document.getElementById('p-sig').innerHTML=sigH;

// Market tab
var mh='<div class="glass sect"><div class="sh">&#128200; SPOT NIFTY (3-MIN) &middot; '+(mk.spot||0)+'</div>';
mh+='<div class="row"><div class="k">EMA 9</div><div class="v" style="color:var(--gn)">'+(mk.spot_ema9||0)+'</div></div>';
mh+='<div class="row"><div class="k">EMA 21</div><div class="v" style="color:var(--yl)">'+(mk.spot_ema21||0)+'</div></div>';
var sp=mk.spot_spread||0;
mh+='<div class="row"><div class="k">SPREAD</div><div class="v" style="color:'+(sp>0?'var(--gn)':'var(--rd)')+'">'+(sp>0?'+':'')+sp+'pts</div></div>';
var sr=mk.spot_rsi||0;
mh+='<div class="row"><div class="k">RSI (3m)</div><div class="v" style="color:'+(sr>60?'var(--gn)':sr<40?'var(--rd)':'var(--yl)')+'">'+sr+'</div></div>';
mh+='<div class="row"><div class="k">REGIME</div><div class="v" style="color:'+((mk.regime||'').indexOf('TREND')>=0?'var(--gn)':'var(--yl)')+'">'+esc(mk.regime||'')+'</div></div>';
mh+='<div class="row"><div class="k">GAP</div><div class="v">'+((mk.gap||0)>0?'+':'')+(mk.gap||0)+'pts</div></div>';
// Trend narrative
var narr=sp>10?'&#128640; Strong uptrend':sp>5?'&#128200; Uptrend':sp>0?'&#9888; Weak up':sp>-5?'&#9888; Weak down':sp>-10?'&#128201; Downtrend':'&#128315; Strong downtrend';
mh+='<div style="padding:6px 12px;font-size:10px;color:'+(sp>5?'var(--gn)':sp<-5?'var(--rd)':'var(--yl)')+'">'+narr+'</div></div>';

// Context rows
mh+='<div class="ctx-row">';
mh+='<div class="ctx glass"><div class="k">SPOT</div><div class="v" style="color:var(--bl)">'+(mk.spot||0)+'</div></div>';
mh+='<div class="ctx glass"><div class="k">EMA9</div><div class="v" style="color:var(--gn)">'+(mk.spot_ema9||0)+'</div></div>';
mh+='<div class="ctx glass"><div class="k">EMA21</div><div class="v" style="color:var(--yl)">'+(mk.spot_ema21||0)+'</div></div>';
mh+='<div class="ctx glass"><div class="k">SPREAD</div><div class="v" style="color:'+(sp>0?'var(--gn)':'var(--rd)')+'">'+(sp>0?'+':'')+sp+'</div></div></div>';
mh+='<div class="ctx-row">';
mh+='<div class="ctx glass"><div class="k">RSI</div><div class="v" style="color:'+(sr>60?'var(--gn)':sr<40?'var(--rd)':'var(--yl)')+'">'+sr+'</div></div>';
mh+='<div class="ctx glass"><div class="k">H.RSI</div><div class="v" style="color:'+((mk.hourly_rsi||0)>70?'var(--rd)':'')+'">'+(mk.hourly_rsi||0)+'</div></div>';
mh+='<div class="ctx glass"><div class="k">GAP</div><div class="v">'+((mk.gap||0)>0?'+':'')+(mk.gap||0)+'</div></div>';
mh+='<div class="ctx glass"><div class="k">SESSION</div><div class="v" style="font-size:10px">'+esc(mk.session||'')+'</div></div></div>';

// Multi-TF tables
var spm=mtf.spot||[],ceo=mtf.ce||[],peo=mtf.pe||[];
function ac(v){return v>=25?'var(--gn)':v>=18?'var(--yl)':'var(--rd)'}
function rc(v){return v>=60?'var(--gn)':v<=40?'var(--rd)':'var(--yl)'}
function sc(v){return v>0?'var(--gn)':v<0?'var(--rd)':'var(--dm)'}
function gr(n){return'display:grid;grid-template-columns:repeat('+n+',1fr);padding:4px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03)'}
function hdr(n,ns){var h='<div style="'+gr(n)+';font-size:8px;color:var(--dm);font-weight:700">';ns.forEach(function(n){h+='<div style="text-align:'+(n==='TF'?'left':'right')+'">'+n+'</div>'});return h+'</div>'}
if(spm.some(function(s){return s.adx>0||s.rsi>0})){
  mh+='<div class="glass sect"><div class="sh">&#128200; SPOT MULTI-TF</div>';
  mh+=hdr(4,['TF','ADX','RSI','SPREAD']);
  spm.forEach(function(t){if(!t.adx&&!t.rsi&&!t.spread)return;mh+='<div style="'+gr(4)+'"><div style="font-weight:700;color:var(--bl)">'+t.tf+'</div><div style="text-align:right;color:'+ac(t.adx)+'">'+t.adx+'</div><div style="text-align:right;color:'+rc(t.rsi)+'">'+t.rsi+'</div><div style="text-align:right;color:'+sc(t.spread)+'">'+(t.spread>0?'+':'')+t.spread+'</div></div>'});
  mh+='</div>'}

// Fib pivots
var fp=mk.fib_pivots||{};
mh+='<div class="glass sect"><div class="sh">&#128208; FIB PIVOTS &middot; Nearest: '+(mk.fib_nearest||'&#8212;')+' ('+((mk.fib_distance||0)>0?'+':'')+(mk.fib_distance||0)+'pts)</div>';
if(fp.R3||fp.pivot){
  var spt=mk.spot||0;
  function flvl(name,price){var dist=spt-price;var near=Math.abs(dist)<20;var clr=name.charAt(0)==='R'?'var(--gn)':name.charAt(0)==='S'?'var(--rd)':'var(--bl)';return'<div class="row" style="'+(near?'background:rgba(68,136,255,0.06)':'')+'"><div class="k" style="color:'+clr+'">'+name+'</div><div class="v" style="font-size:11px">'+price+(near?' &#9668; NEAR':' <span style="color:var(--dm);font-size:9px">'+(dist>0?'+':'')+dist.toFixed(0)+'pts</span>')+'</div></div>'}
  mh+=flvl('R3',fp.R3||0)+flvl('R2',fp.R2||0)+flvl('R1',fp.R1||0)+flvl('PIVOT',fp.pivot||0)+flvl('S1',fp.S1||0)+flvl('S2',fp.S2||0)+flvl('S3',fp.S3||0);
  if(fp.prev_high)mh+='<div style="padding:5px 12px;font-size:9px;color:var(--dm)">Prev: H='+fp.prev_high+' L='+fp.prev_low+' C='+fp.prev_close+'</div>';
}else{mh+='<div style="padding:10px 12px;color:var(--dm);font-size:10px">Loads on market open</div>'}
mh+='</div>';

// Straddle row
mh+='<div class="ctx-row">';
mh+='<div class="ctx glass"><div class="k">H.RSI</div><div class="v" style="color:'+((mk.hourly_rsi||0)>70?'var(--rd)':'')+'">'+(mk.hourly_rsi||0)+'</div></div>';
mh+='<div class="ctx glass"><div class="k">STRADDLE</div><div class="v">'+(str.captured?'&#8377;'+str.open:'&#8212;')+'</div></div>';
mh+='<div class="ctx glass"><div class="k">EXPIRY</div><div class="v" style="font-size:10px">'+esc(mk.expiry||'&#8212;')+'</div></div>';
mh+='<div class="ctx glass"><div class="k">VIX</div><div class="v" style="color:'+(mk.vix>22?'var(--rd)':mk.vix>18?'var(--yl)':'var(--gn)')+'">'+(mk.vix||0)+'</div></div></div>';

// Zones
var zl=(zones.zones||[]).filter(function(z){return Math.abs(z.distance_from_spot||999)<=100});
if(zl.length>0){
  mh+='<div class="glass sect"><div class="sh">&#128506; DEMAND/SUPPLY ZONES</div>';
  zl.forEach(function(z){var clr=z.zone_type==='DEMAND'?'var(--gn)':'var(--rd)';var icon=z.zone_type==='DEMAND'?'&#128994;':'&#128308;';mh+='<div class="row"><div class="k" style="color:'+clr+'">'+icon+' '+z.zone_type+'</div><div class="v" style="font-size:11px">'+z.zone_low+' - '+z.zone_high+' ['+z.strength+']</div></div>'});
  mh+='</div>'}
document.getElementById('p-mkt').innerHTML=mh;

// Trades tab
var th='';
if(!trades||!trades.length){th='<div style="text-align:center;color:var(--dm);padding:30px">No trades today</div>'}
else{
  var cum=0,w=0;
  trades.forEach(function(t){var p=parseFloat(t.pnl_pts||0);cum+=p;if(p>0)w++});
  var wr2=trades.length>0?Math.round(w/trades.length*100):0;
  th+='<div class="glass" style="margin:8px;padding:10px 12px;text-align:center;font-weight:700">';
  th+='<span style="color:'+(cum>=0?'var(--gn)':'var(--rd)');font-size:14px">'+(cum>=0?'+':'')+cum.toFixed(1)+'pts</span>';
  th+=' <span style="color:var(--dm)">&#8377;'+Math.round(cum*65).toLocaleString()+'</span>';
  th+=' <span style="color:var(--dm);font-size:10px"> | '+trades.length+' trades | '+w+'W '+(trades.length-w)+'L | WR '+wr2+'%</span></div>';
  th+=trades.map(function(t){
    var pts=parseFloat(t.pnl_pts||0),win=pts>0;
    var pk=parseFloat(t.peak_pnl||0);
    var held=t.candles_held||'?';
    var reason=(t.exit_reason||'').replace(/_/g,' ');
    var sym=(t.direction||'')+' '+(t.strike||'');
    var rs=Math.round(pts*65);
    return'<div class="tc glass '+(win?'w':'l')+'">'+
      '<div style="font-size:16px">'+(win?'&#10004;':'&#10008;')+'</div>'+
      '<div style="flex:1">'+
      '<div style="font-weight:700;font-size:11px;color:'+(t.direction==='CE'?'var(--gn)':'var(--rd)')+'">'+esc(sym)+' &nbsp;<span style="font-weight:700;color:'+(win?'var(--gn)':'var(--rd)')+'">'+(win?'+':'')+pts.toFixed(1)+'pts</span> <span style="color:var(--dm)">&#8377;'+rs+'</span></div>'+
      '<div style="font-size:9px;color:var(--dm)">'+esc(t.entry_time||'')+' &#8594; '+esc(t.exit_time||'')+' ('+held+'min) &middot; '+esc(reason)+'</div>'+
      '<div style="font-size:9px;color:var(--dm)">Peak: +'+pk.toFixed(1)+' | Entry: &#8377;'+t.entry_price+'</div>'+
      '</div></div>'}).join('')}
document.getElementById('p-trd').innerHTML=th;
document.getElementById('ts').textContent=d.ts||new Date().toLocaleTimeString('en-IN');
}

async function go(){
  try{
    var[d,t,z,m]=await Promise.all([
      fetch('/api/dashboard').then(function(r){return r.json()}).catch(function(){return null}),
      fetch('/api/trades').then(function(r){return r.json()}).catch(function(){return[]}),
      fetch('/api/zones').then(function(r){return r.json()}).catch(function(){return{zones:[]}}),
      fetch('/api/multitf').then(function(r){return r.json()}).catch(function(){return{spot:[],ce:[],pe:[]}})
    ]);
    render(d||{},t||[],z||{zones:[]},m||{});
  }catch(e){console.error(e)}
}
go();setInterval(go,10000);
</script></body></html>
